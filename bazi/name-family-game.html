<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی اسم و فامیل</title>
    <!-- Vazirmatn Persian Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf9f0;
            --card-bg: #ffffff;
            --primary: #1a3857;
            --primary-light: #2c5f8a;
            --gold: #c8963e;
            --gold-light: #e8c97a;
            --gold-pale: #fdf3d7;
            --text: #2c2c2c;
            --text-light: #5a5a5a;
            --border: #e0d8c8;
            --score-10: #3d9a6e;
            --score-10-bg: #e6f7ef;
            --score-5: #e09e2f;
            --score-5-bg: #fef7e6;
            --score-0: #d4525e;
            --score-0-bg: #fde8ea;
            --score-inactive: #e5e0d5;
            --timer-bg: #f0ebe0;
            --timer-fill: #c8963e;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.14);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            --faded-letter: #b5b5b5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Tahoma', 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(160deg, #fdf9f0 0%, #f7f1e3 30%, #fdf7ed 60%, #f9f2e4 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.025;
            background-image:
                radial-gradient(circle at 20% 25%, #c8963e 1px, transparent 1px),
                radial-gradient(circle at 75% 60%, #c8963e 1.2px, transparent 1.2px),
                radial-gradient(circle at 40% 80%, #1a3857 0.8px, transparent 0.8px),
                radial-gradient(circle at 85% 15%, #1a3857 1px, transparent 1px),
                radial-gradient(circle at 10% 70%, #c8963e 0.7px, transparent 0.7px);
            background-size: 180px 180px, 220px 220px, 200px 200px, 250px 250px, 160px 160px;
            background-position: 0 0, 40px 30px, 90px 10px, 20px 70px, 110px 50px;
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── screen management ── */
        .screen {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .screen.active {
            display: flex;
        }

        /* ── Header Card ── */
        .header-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 18px 20px 14px;
            text-align: center;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #c8963e, #e8c97a, #c8963e, #d4a54a, #c8963e);
            border-radius: 0 0 6px 6px;
        }
        .game-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-bottom: 2px;
            line-height: 1.3;
        }
        .game-title .icon {
            display: inline-block;
            font-size: 1.6rem;
            animation: bounce-icon 2s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%,100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
            50% { transform: translateY(0); }
            70% { transform: translateY(-4px); }
        }
        .game-subtitle {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* ── Letter Selection Card ── */
        .letter-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .letter-card-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 7px;
            justify-items: center;
        }
        @media (max-width: 400px) {
            .letter-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
        }
        @media (min-width: 460px) {
            .letter-grid { grid-template-columns: repeat(10, 1fr); gap: 7px; }
        }
        .letter-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 48px;
            max-height: 48px;
            border-radius: 50%;
            border: 2px solid #e0d8c8;
            background: #fdfcf8;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            min-width: 36px;
            min-height: 36px;
        }
        .letter-btn:hover {
            border-color: var(--gold);
            background: #fef9ef;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(200,150,62,0.18);
        }
        .letter-btn:active {
            transform: scale(0.93);
            transition: 0.08s;
        }
        .letter-btn.selected {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 18px rgba(26,56,87,0.35);
            transform: translateY(-2px);
            font-size: 1.15rem;
            animation: pulse-selected 2.2s ease-in-out infinite;
        }
        @keyframes pulse-selected {
            0%,100% { box-shadow: 0 4px 18px rgba(26,56,87,0.35); }
            50% { box-shadow: 0 6px 26px rgba(26,56,87,0.55); }
        }
        .letter-btn.used {
            color: var(--faded-letter);
            border-color: #e0ddd3;
            background: #f9f8f4;
            cursor: not-allowed;
            font-weight: 500;
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: #d5cfc0;
            opacity: 0.7;
        }

        /* ── Selected letter badge ── */
        .selected-letter-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--gold-pale);
            border-radius: 50px;
            border: 2px dashed var(--gold);
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
            transition: var(--transition);
            min-height: 44px;
        }
        .selected-letter-badge .big-letter {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }

        /* ── Time selection ── */
        .time-selection {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .time-label {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--primary);
            width: 100%;
            text-align: center;
            margin-bottom: 4px;
        }
        .time-option {
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid #e0d8c8;
            background: #fdfcf8;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .time-option:hover {
            border-color: var(--gold);
            background: #fef9ef;
        }
        .time-option.selected-time {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26,56,87,0.25);
        }

        /* Sound consent toggle */
        .sound-consent {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .sound-consent .label {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: var(--transition);
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: var(--transition);
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* ── Cumulative Score ── */
        .cumulative-score {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            font-weight: 700;
            color: var(--primary);
        }
        .cumulative-score .score-num {
            font-size: 1.6rem;
            margin: 0 4px;
            font-weight: 900;
        }

        /* ── Answer screen top bar ── */
        .answer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }
        .answer-top .letter-badge {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--primary);
            background: var(--gold-pale);
            padding: 6px 16px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .answer-timer {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back {
            background: transparent;
            border: 2px solid #d5cfc2;
            color: var(--text);
            padding: 6px 14px;
            border-radius: 30px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-back:hover { background: #fafaf7; border-color: #b5b0a5; }

        /* ── Answer fields ── */
        .categories-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 12px 14px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .categories-header {
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0ebe0;
        }
        .category-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 4px;
            border-radius: 8px;
            flex-wrap: nowrap;
        }
        .category-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            width: 26px;
            text-align: center;
        }
        .category-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
            flex-shrink: 0;
            min-width: 58px;
            white-space: nowrap;
        }
        .answer-input {
            flex: 1;
            min-width: 60px;
            padding: 9px 10px;
            border-radius: 8px;
            border: 2px solid #e8e2d4;
            font-family: inherit;
            font-size: 0.9rem;
            background: #fefefe;
            color: var(--text);
            transition: var(--transition);
            outline: none;
            text-align: right;
            -webkit-appearance: none;
            letter-spacing: 0.2px;
        }
        .answer-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(200,150,62,0.08);
            background: #fffefb;
        }

        /* ── Stop button ── */
        .btn-stop {
            background: var(--score-0);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(212,82,94,0.3);
            width: 100%;
            text-align: center;
        }
        .btn-stop:hover {
            background: #c43e4a;
        }

        /* ── Scoring screen cards ── */
        .score-cards-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .score-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .score-card .cat-label {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .score-card .answer-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            background: var(--gold-pale);
            padding: 6px 12px;
            border-radius: 8px;
            word-break: break-word;
        }
        .score-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .score-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #e0d8c8;
            background: #fafaf7;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9a9588;
            -webkit-tap-highlight-color: transparent;
        }
        .score-btn.active-10 {
            background: var(--score-10);
            color: #fff;
            border-color: var(--score-10);
            box-shadow: 0 2px 8px rgba(61,154,110,0.3);
        }
        .score-btn.active-5 {
            background: var(--score-5);
            color: #fff;
            border-color: var(--score-5);
            box-shadow: 0 2px 8px rgba(224,158,47,0.3);
        }
        .score-btn.active-0 {
            background: var(--score-0);
            color: #fff;
            border-color: var(--score-0);
            box-shadow: 0 2px 8px rgba(212,82,94,0.3);
        }

        .total-score-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            box-shadow: var(--shadow-md);
            border: 2px solid var(--gold);
        }
        .total-score-box .big-score {
            font-size: 2.8rem;
            font-weight: 900;
            display: block;
        }

        /* ── Buttons general ── */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 11px 22px;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(26,56,87,0.3);
        }
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26,56,87,0.4);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-light);
            border: 2px solid #e0d8c8;
        }
        .btn-ghost:hover {
            background: #fafaf7;
            border-color: #c5bfb0;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1a3857;
            color: #fff;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 100;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            letter-spacing: 0.3px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            15% { transform: translateX(-6px); }
            30% { transform: translateX(5px); }
            45% { transform: translateX(-4px); }
            60% { transform: translateX(3px); }
            75% { transform: translateX(-2px); }
            90% { transform: translateX(1px); }
        }
    </style>
</head>
<body>
    <div class="main-container" id="appRoot">
        <!-- SCREEN: MAIN PAGE -->
        <div class="screen active" id="screenMain">
            <div class="header-card">
                <div class="game-title"><span class="icon">✏️</span> اسم و فامیل</div>
                <div class="game-subtitle">بازی کلاسیک ایرانی — نسخهٔ تک‌نفره</div>
            </div>
            <div class="letter-card">
                <div class="letter-card-label">🔤 یک حرف انتخاب کن:</div>
                <div class="letter-grid" id="letterGrid"></div>
            </div>
            <div class="time-selection" id="timeSelection">
                <span class="time-label">⏱️ زمان بازی:</span>
                <button class="time-option" data-minutes="2">۲ دقیقه</button>
                <button class="time-option" data-minutes="4">۴ دقیقه</button>
                <button class="time-option" data-minutes="6">۶ دقیقه</button>
                <button class="time-option" data-minutes="8">۸ دقیقه</button>
                <button class="time-option" data-minutes="-1">بدون محدودیت</button>
            </div>
            <div class="sound-consent">
                <span class="label">🔊 هشدار صوتی ۵ ثانیه پایانی</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="soundConsentCheckbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="cumulative-score" id="cumulativeScoreBox">
                🏆 مجموع امتیازات تمام دورها: <span class="score-num" id="totalCumulativeScore">۰</span>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnStartGame">🎮 شروع بازی</button>
                <button class="btn btn-ghost" id="btnResetAll">🔄 صفر کردن کامل بازی</button>
            </div>
        </div>

        <!-- SCREEN: ANSWER PAGE -->
        <div class="screen" id="screenAnswer">
            <div class="answer-top">
                <div class="letter-badge" id="answerLetterBadge">حرف: <span id="answerLetterDisplay"></span></div>
                <div class="answer-timer" id="answerTimerDisplay">⏱️ <span id="timerValue"></span></div>
                <button class="btn-back" id="btnBackToMain">🏠 برگشت</button>
            </div>
            <div class="categories-card">
                <div class="categories-header">📋 دسته‌ها را با حرف <strong id="catLetterHint"></strong> پر کن</div>
                <div id="answerCategoriesContainer"></div>
            </div>
            <button class="btn-stop" id="btnStopGame">⏹️ استپ (اتمام بازی)</button>
        </div>

        <!-- SCREEN: SCORING PAGE -->
        <div class="screen" id="screenScore">
            <div class="header-card">
                <div class="game-title">⭐ نمره‌دهی</div>
                <div class="game-subtitle">به هر پاسخ خودت نمره بده</div>
            </div>
            <div class="score-cards-grid" id="scoreCardsContainer"></div>
            <div class="total-score-box" id="roundTotalBox">
                مجموع امتیاز این دور: <span class="big-score" id="roundTotalScore">۰</span>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnFinishScoring">✅ ثبت و بازگشت به صفحه اصلی</button>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // PERSIAN LETTERS
            const persianLetters = [
                'آ','ا','ب','پ','ت','ث','ج','چ','ح','خ','د','ذ','ر','ز','ژ','س',
                'ش','ص','ض','ط','ظ','ع','غ','ف','ق','ک','گ','ل','م','ن','و','ه','ی'
            ];

            // ──────────────────────────────────────
            // CATEGORIES
            const categories = [
                { id: 'name', label: 'اسم', icon: '👤' },
                { id: 'family', label: 'فامیل', icon: '👨‍👩‍👧‍👦' },
                { id: 'city', label: 'شهر', icon: '🏙️' },
                { id: 'country', label: 'کشور', icon: '🌍' },
                { id: 'animal', label: 'حیوان', icon: '🐾' },
                { id: 'food', label: 'غذا', icon: '🍲' },
                { id: 'color', label: 'رنگ', icon: '🎨' },
                { id: 'car', label: 'ماشین', icon: '🚗' },
                { id: 'fruit', label: 'میوه', icon: '🍎' },
                { id: 'thing', label: 'اشیاء', icon: '📦' },
                { id: 'job', label: 'شغل', icon: '💼' },
                { id: 'sport', label: 'ورزش', icon: '⚽' },
                { id: 'movie', label: 'فیلم/کارتون', icon: '🎬' },
                { id: 'singer', label: 'خواننده', icon: '🎤' },
                { id: 'flower', label: 'گل', icon: '🌸' }
            ];

            // ──────────────────────────────────────
            // DOM REFS
            const screenMain = document.getElementById('screenMain');
            const screenAnswer = document.getElementById('screenAnswer');
            const screenScore = document.getElementById('screenScore');
            const letterGrid = document.getElementById('letterGrid');
            const btnStartGame = document.getElementById('btnStartGame');
            const btnResetAll = document.getElementById('btnResetAll');
            const cumulativeScoreSpan = document.getElementById('totalCumulativeScore');
            const answerLetterDisplay = document.getElementById('answerLetterDisplay');
            const answerTimerDisplay = document.getElementById('answerTimerDisplay');
            const timerValueSpan = document.getElementById('timerValue');
            const answerCategoriesContainer = document.getElementById('answerCategoriesContainer');
            const btnStopGame = document.getElementById('btnStopGame');
            const btnBackToMain = document.getElementById('btnBackToMain');
            const scoreCardsContainer = document.getElementById('scoreCardsContainer');
            const roundTotalScoreSpan = document.getElementById('roundTotalScore');
            const btnFinishScoring = document.getElementById('btnFinishScoring');
            const toast = document.getElementById('toast');
            const catLetterHint = document.getElementById('catLetterHint');
            const timeOptions = document.querySelectorAll('.time-option');
            const soundConsentCheckbox = document.getElementById('soundConsentCheckbox');

            // ──────────────────────────────────────
            // STATE
            let selectedLetter = null;
            let selectedTime = 2; // minutes, -1 for unlimited
            let timerRemaining = 0;
            let timerInterval = null;
            let timerRunning = false;
            let usedLetters = []; // from localStorage
            let cumulativeTotalScore = 0;
            let currentRoundAnswers = []; // array of { categoryId, text }
            let currentRoundScores = {}; // categoryId -> 0|5|10
            let audioCtx = null; // Web Audio context
            let lastBeepSecond = -1; // to avoid multiple beeps in same second

            // ──────────────────────────────────────
            // LOCAL STORAGE
            function loadFromStorage() {
                try {
                    const storedUsed = localStorage.getItem('esm_famil_usedLetters');
                    if (storedUsed) usedLetters = JSON.parse(storedUsed);
                    else usedLetters = [];
                    const storedTotal = localStorage.getItem('esm_famil_totalScore');
                    if (storedTotal !== null) cumulativeTotalScore = parseInt(storedTotal, 10) || 0;
                    else cumulativeTotalScore = 0;
                } catch (e) {
                    usedLetters = [];
                    cumulativeTotalScore = 0;
                }
            }
            function saveToStorage() {
                localStorage.setItem('esm_famil_usedLetters', JSON.stringify(usedLetters));
                localStorage.setItem('esm_famil_totalScore', cumulativeTotalScore.toString());
            }
            function resetStorage() {
                localStorage.removeItem('esm_famil_usedLetters');
                localStorage.removeItem('esm_famil_totalScore');
                usedLetters = [];
                cumulativeTotalScore = 0;
                saveToStorage();
            }

            // ──────────────────────────────────────
            // AUDIO BEEP
            function initAudioContext() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('Web Audio API not supported');
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playBeep() {
                if (!soundConsentCheckbox.checked) return;
                if (!audioCtx) return;
                // Simple beep: 440Hz for 0.12s
                try {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.12);
                } catch (e) {
                    // ignore
                }
            }

            // ──────────────────────────────────────
            // TOAST
            let toastTimeout;
            function showToast(message) {
                clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimeout = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            // ──────────────────────────────────────
            // SCREEN SWITCHING (with scroll to top)
            function showScreen(screen) {
                [screenMain, screenAnswer, screenScore].forEach(s => s.classList.remove('active'));
                screen.classList.add('active');
                // Scroll to top of page so content starts from beginning
                window.scrollTo({ top: 0, behavior: 'instant' });
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
            }

            // ──────────────────────────────────────
            // BUILD LETTER GRID (main)
            function buildLetterGrid() {
                letterGrid.innerHTML = '';
                persianLetters.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'letter-btn';
                    if (usedLetters.includes(letter)) {
                        btn.classList.add('used');
                        btn.disabled = true;
                    }
                    btn.textContent = letter;
                    btn.setAttribute('aria-label', `حرف ${letter}`);
                    btn.addEventListener('click', () => {
                        if (usedLetters.includes(letter)) {
                            showToast('این حرف قبلاً بازی شده است.');
                            return;
                        }
                        // deselect all
                        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedLetter = letter;
                    });
                    letterGrid.appendChild(btn);
                });
                // update cumulative score display
                cumulativeScoreSpan.textContent = toPersianNum(cumulativeTotalScore);
            }

            function toPersianNum(num) {
                const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
                return String(num).replace(/\d/g, d => persianDigits[parseInt(d,10)]);
            }

            // ──────────────────────────────────────
            // TIME SELECTION
            function initTimeSelection() {
                timeOptions.forEach(opt => {
                    opt.classList.remove('selected-time');
                    if (parseInt(opt.getAttribute('data-minutes')) === selectedTime) {
                        opt.classList.add('selected-time');
                    }
                });
                timeOptions.forEach(opt => {
                    opt.addEventListener('click', function() {
                        timeOptions.forEach(o => o.classList.remove('selected-time'));
                        this.classList.add('selected-time');
                        selectedTime = parseInt(this.getAttribute('data-minutes'), 10);
                    });
                });
            }

            // ──────────────────────────────────────
            // START GAME
            btnStartGame.addEventListener('click', () => {
                if (!selectedLetter) {
                    showToast('⚠️ لطفاً یک حرف انتخاب کن.');
                    return;
                }
                // Initialize audio context on user gesture
                initAudioContext();
                // Proceed to answer screen
                setupAnswerScreen();
                showScreen(screenAnswer);
                startTimerIfNeeded();
            });

            function setupAnswerScreen() {
                // set letter displays
                answerLetterDisplay.textContent = selectedLetter;
                catLetterHint.textContent = selectedLetter;
                // build answer inputs
                answerCategoriesContainer.innerHTML = '';
                categories.forEach(cat => {
                    const row = document.createElement('div');
                    row.className = 'category-row';
                    row.innerHTML = `
                        <span class="category-icon">${cat.icon}</span>
                        <span class="category-name">${cat.label}</span>
                        <input type="text" class="answer-input" data-category="${cat.id}" value="${selectedLetter}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                    `;
                    answerCategoriesContainer.appendChild(row);
                });
                // enforce first character
                document.querySelectorAll('.answer-input').forEach(inp => {
                    inp.addEventListener('input', enforceFirstLetter);
                    inp.addEventListener('keydown', preventFirstDeletion);
                });
                // timer display initial
                if (selectedTime > 0) {
                    timerRemaining = selectedTime * 60;
                    timerValueSpan.textContent = formatTime(timerRemaining);
                } else {
                    timerRemaining = -1;
                    timerValueSpan.textContent = 'نامحدود';
                }
                answerTimerDisplay.style.display = 'flex';
                lastBeepSecond = -1;
            }

            function enforceFirstLetter(e) {
                const inp = e.target;
                const val = inp.value;
                if (!val.startsWith(selectedLetter)) {
                    // if completely empty, reset to selectedLetter
                    if (val.length === 0) {
                        inp.value = selectedLetter;
                    } else {
                        // replace first character(s) until it starts with the letter
                        let newVal = val;
                        while (newVal.length > 0 && !newVal.startsWith(selectedLetter)) {
                            newVal = newVal.substring(1);
                        }
                        if (newVal.length === 0) newVal = selectedLetter;
                        else if (!newVal.startsWith(selectedLetter)) newVal = selectedLetter + newVal;
                        inp.value = newVal;
                    }
                    // set cursor at end
                    setTimeout(() => {
                        inp.selectionStart = inp.selectionEnd = inp.value.length;
                    }, 0);
                }
            }

            function preventFirstDeletion(e) {
                const inp = e.target;
                const start = inp.selectionStart;
                if (start === 0 && (e.key === 'Backspace' || e.key === 'Delete')) {
                    e.preventDefault();
                }
            }

            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return toPersianNum(mins) + ':' + toPersianNum(secs).padStart(2, '۰');
            }

            function startTimerIfNeeded() {
                if (selectedTime <= 0) {
                    timerRunning = false;
                    clearInterval(timerInterval);
                    return;
                }
                timerRemaining = selectedTime * 60;
                timerRunning = true;
                updateTimerDisplay();
                lastBeepSecond = -1;
                timerInterval = setInterval(() => {
                    timerRemaining--;
                    updateTimerDisplay();
                    // Beep for last 5 seconds
                    if (timerRemaining <= 5 && timerRemaining > 0) {
                        if (timerRemaining !== lastBeepSecond) {
                            playBeep();
                            lastBeepSecond = timerRemaining;
                        }
                    }
                    if (timerRemaining <= 0) {
                        clearInterval(timerInterval);
                        timerRunning = false;
                        finishGame();
                    }
                }, 1000);
            }

            function updateTimerDisplay() {
                if (selectedTime <= 0) {
                    timerValueSpan.textContent = 'نامحدود';
                    return;
                }
                timerValueSpan.textContent = formatTime(timerRemaining);
            }

            function stopTimer() {
                clearInterval(timerInterval);
                timerRunning = false;
            }

            // ──────────────────────────────────────
            // FINISH GAME (manual or timer)
            function finishGame() {
                stopTimer();
                // collect answers
                currentRoundAnswers = [];
                const inputs = document.querySelectorAll('.answer-input');
                inputs.forEach(inp => {
                    const catId = inp.getAttribute('data-category');
                    const text = inp.value.trim();
                    currentRoundAnswers.push({ categoryId: catId, text: text });
                });
                // initialize scores to 0
                currentRoundScores = {};
                categories.forEach(cat => { currentRoundScores[cat.id] = 0; });
                // build scoring UI
                buildScoringCards();
                showScreen(screenScore);
            }

            btnStopGame.addEventListener('click', () => {
                finishGame();
            });

            btnBackToMain.addEventListener('click', () => {
                // Just go back without saving round
                stopTimer();
                showScreen(screenMain);
            });

            // ──────────────────────────────────────
            // SCORING PAGE
            function buildScoringCards() {
                scoreCardsContainer.innerHTML = '';
                currentRoundAnswers.forEach(item => {
                    const cat = categories.find(c => c.id === item.categoryId);
                    if (!cat) return;
                    const card = document.createElement('div');
                    card.className = 'score-card';
                    card.setAttribute('data-category', item.categoryId);
                    card.innerHTML = `
                        <div class="cat-label">${cat.icon} ${cat.label}</div>
                        <div class="answer-text">${item.text || '(بدون پاسخ)'}</div>
                        <div class="score-btns">
                            <button class="score-btn score-0" data-score="0">۰</button>
                            <button class="score-btn score-5" data-score="5">۵</button>
                            <button class="score-btn score-10" data-score="10">۱۰</button>
                        </div>
                    `;
                    scoreCardsContainer.appendChild(card);
                    // highlight default 0
                    const btns = card.querySelectorAll('.score-btn');
                    btns.forEach(b => {
                        if (parseInt(b.getAttribute('data-score')) === 0) b.classList.add('active-0');
                    });
                    // add event listeners
                    btns.forEach(btn => {
                        btn.addEventListener('click', function() {
                            const score = parseInt(this.getAttribute('data-score'), 10);
                            const catId = item.categoryId;
                            currentRoundScores[catId] = score;
                            // update button highlights within this card
                            const siblings = this.parentElement.querySelectorAll('.score-btn');
                            siblings.forEach(sib => sib.classList.remove('active-0','active-5','active-10'));
                            if (score === 0) this.classList.add('active-0');
                            if (score === 5) this.classList.add('active-5');
                            if (score === 10) this.classList.add('active-10');
                            updateRoundTotalDisplay();
                        });
                    });
                });
                updateRoundTotalDisplay();
            }

            function updateRoundTotalDisplay() {
                let total = 0;
                Object.values(currentRoundScores).forEach(s => total += s);
                roundTotalScoreSpan.textContent = toPersianNum(total);
            }

            btnFinishScoring.addEventListener('click', () => {
                // Finalize round: add used letter, add score to cumulative
                if (!usedLetters.includes(selectedLetter)) {
                    usedLetters.push(selectedLetter);
                }
                const roundTotal = Object.values(currentRoundScores).reduce((a,b)=>a+b,0);
                cumulativeTotalScore += roundTotal;
                saveToStorage();
                // rebuild letter grid to reflect used letters
                buildLetterGrid();
                // reset selection
                selectedLetter = null;
                document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('selected'));
                // go back to main
                showScreen(screenMain);
                showToast(`✅ دور تمام شد! امتیاز این دور: ${toPersianNum(roundTotal)}`);
            });

            // ──────────────────────────────────────
            // RESET ALL
            btnResetAll.addEventListener('click', () => {
                resetStorage();
                selectedLetter = null;
                document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('selected'));
                buildLetterGrid();
                showScreen(screenMain);
                showToast('🔄 تمام بازی صفر شد.');
            });

            // ──────────────────────────────────────
            // INIT
            function init() {
                loadFromStorage();
                buildLetterGrid();
                initTimeSelection();
                // default time selection
                selectedTime = 2;
                timeOptions.forEach(opt => {
                    opt.classList.remove('selected-time');
                    if (parseInt(opt.getAttribute('data-minutes')) === 2) opt.classList.add('selected-time');
                });
                // sound consent default is checked (already checked in HTML)
                showScreen(screenMain);
                cumulativeScoreSpan.textContent = toPersianNum(cumulativeTotalScore);
                // Initialize audio context on first user interaction (can be done here on click of start)
                // We'll let it be created on start click, but also resume if needed.
                document.addEventListener('click', initAudioContext, { once: true });
            }

            init();

            console.log('🎮 بازی اسم و فامیل با قابلیت‌های جدید آماده است.');
        })();
    </script>
</body>
</html>
