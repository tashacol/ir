<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>گوموکو | دوز ۵ تایی</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1e2b3a 0%, #0f1722 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Vazirmatn', Tahoma, sans-serif;
      padding: 15px;
      margin: 0;
    }
    .game-container {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(25px);
      border-radius: 48px;
      padding: 25px 20px;
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.7), inset 0 0 25px rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 100%;
    }
    h1 {
      color: #f5e6d3;
      margin-bottom: 5px;
      font-size: 2rem;
      text-shadow: 0 5px 15px rgba(0,0,0,0.5);
      letter-spacing: 2px;
    }
    .subtitle {
      color: #aaa;
      font-size: 0.8rem;
      margin-bottom: 15px;
    }
    .turn-indicator {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 10px 30px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .player1-color { color: #f7c35c; text-shadow: 0 0 12px #f7c35c; }
    .player2-color { color: #e94560; text-shadow: 0 0 12px #e94560; }
    
    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 30px;
      background: #faf4e8;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.15), 0 20px 35px rgba(0,0,0,0.6);
      cursor: pointer;
      touch-action: none;
      max-width: 100%;
    }
    
    .score-board {
      margin-top: 15px;
      display: flex;
      gap: 30px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(15px);
      border-radius: 50px;
      padding: 8px 35px;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn {
      margin-top: 12px;
      background: #f7c35c;
      border: none;
      color: #1e272e;
      font-weight: bold;
      font-size: 1rem;
      padding: 10px 35px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 18px rgba(247, 195, 92, 0.3);
      border: 1px solid rgba(255,255,255,0.25);
      font-family: inherit;
    }
    .btn:hover { background: #f5b042; transform: translateY(-2px); }
    
    @media (max-width: 500px) {
      .game-container { padding: 15px 10px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>⚡ گوموکو ⚡</h1>
    <div class="subtitle">دوز ۵ تایی (۱۹×۱۹)</div>
    
    <div class="turn-indicator" id="turnIndicator">
      <span>نوبت</span>
      <span id="currentPlayerDisplay" class="player1-color">🟡 زرد</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="score-board">
      <span>🟡 <span id="player1Score">0</span></span>
      <span>🔴 <span id="player2Score">0</span></span>
    </div>

    <button class="btn" id="restartButton">🔄 شروع دوباره</button>
  </div>

  <script>
    (function() {
      // ---------- تنظیمات ----------
      const BOARD_SIZE = 19; // اینجا بزرگ‌تر شد: ۱۹×۱۹
      let CELL_SIZE = 32; // اندازه هر خانه (پویا تنظیم می‌شود)
      let PADDING = 20;
      
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      
      function resizeCanvas() {
        // حداکثر عرض رو بیشتر کردم تا تخته بزرگ‌تر دیده بشه
        const maxWidth = Math.min(window.innerWidth - 40, 700);
        CELL_SIZE = Math.floor((maxWidth - PADDING * 2) / (BOARD_SIZE - 1));
        if (CELL_SIZE < 20) CELL_SIZE = 20; // حداقل برای موبایل‌های خیلی کوچک
        canvas.width = (BOARD_SIZE - 1) * CELL_SIZE + PADDING * 2;
        canvas.height = (BOARD_SIZE - 1) * CELL_SIZE + PADDING * 2;
        if (window.innerWidth < 500) {
          canvas.style.width = '95%';
          canvas.style.height = 'auto';
        } else {
          canvas.style.width = canvas.width + 'px';
          canvas.style.height = canvas.height + 'px';
        }
      }
      
      // ---------- حالت بازی ----------
      let gameState = {
        board: Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null)),
        currentPlayer: 1,
        gameOver: false,
        winner: null,
        scores: { 1: 0, 2: 0 },
        winningCells: [] // مختصات مهره‌های برنده
      };
      
      // بررسی برنده (۵ تایی)
      function checkWin(row, col, player) {
        const directions = [
          [0, 1],  // افقی
          [1, 0],  // عمودی
          [1, 1],  // مورب اصلی
          [1, -1]  // مورب فرعی
        ];
        
        for (let [dr, dc] of directions) {
          let count = 1;
          let cells = [{ row, col }];
          
          // جهت مثبت
          for (let i = 1; i < 5; i++) {
            const r = row + dr * i;
            const c = col + dc * i;
            if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && gameState.board[r][c] === player) {
              count++;
              cells.push({ row: r, col: c });
            } else break;
          }
          // جهت منفی
          for (let i = 1; i < 5; i++) {
            const r = row - dr * i;
            const c = col - dc * i;
            if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && gameState.board[r][c] === player) {
              count++;
              cells.push({ row: r, col: c });
            } else break;
          }
          
          if (count >= 5) {
            gameState.winningCells = cells;
            return true;
          }
        }
        return false;
      }
      
      function isBoardFull() {
        for (let r = 0; r < BOARD_SIZE; r++) {
          for (let c = 0; c < BOARD_SIZE; c++) {
            if (gameState.board[r][c] === null) return false;
          }
        }
        return true;
      }
      
      function placePiece(row, col) {
        if (gameState.gameOver || gameState.board[row][col] !== null) return;
        
        gameState.board[row][col] = gameState.currentPlayer;
        
        if (checkWin(row, col, gameState.currentPlayer)) {
          gameState.gameOver = true;
          gameState.winner = gameState.currentPlayer;
          gameState.scores[gameState.currentPlayer]++;
          updateScoreDisplay();
          drawBoard();
          setTimeout(() => {
            alert(`🎉 بازیکن ${gameState.winner === 1 ? '🟡 زرد' : '🔴 قرمز'} برنده شد!`);
          }, 50);
          return;
        }
        
        if (isBoardFull()) {
          gameState.gameOver = true;
          gameState.winner = null; // تساوی
          drawBoard();
          setTimeout(() => alert('🤝 بازی مساوی شد!'), 50);
          return;
        }
        
        gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
        drawBoard();
        updateTurnDisplay();
      }
      
      // ---------- رسم ----------
      function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // رسم خطوط شبکه
        ctx.strokeStyle = '#4a637a';
        ctx.lineWidth = 1;
        const startX = PADDING;
        const startY = PADDING;
        const endX = startX + (BOARD_SIZE - 1) * CELL_SIZE;
        const endY = startY + (BOARD_SIZE - 1) * CELL_SIZE;
        
        for (let i = 0; i < BOARD_SIZE; i++) {
          // افقی
          ctx.beginPath();
          ctx.moveTo(startX, startY + i * CELL_SIZE);
          ctx.lineTo(endX, startY + i * CELL_SIZE);
          ctx.stroke();
          // عمودی
          ctx.beginPath();
          ctx.moveTo(startX + i * CELL_SIZE, startY);
          ctx.lineTo(startX + i * CELL_SIZE, endY);
          ctx.stroke();
        }
        
        // رسم نقاط تقاطع (فقط برای راهنما، ولی برای ۱۹×۱۹ شاید شلوغ نشه)
        for (let r = 0; r < BOARD_SIZE; r++) {
          for (let c = 0; c < BOARD_SIZE; c++) {
            const x = startX + c * CELL_SIZE;
            const y = startY + r * CELL_SIZE;
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = '#2c3e50';
            ctx.fill();
          }
        }
        
        // رسم مهره‌ها
        for (let r = 0; r < BOARD_SIZE; r++) {
          for (let c = 0; c < BOARD_SIZE; c++) {
            if (gameState.board[r][c] !== null) {
              const x = startX + c * CELL_SIZE;
              const y = startY + r * CELL_SIZE;
              const isWinCell = gameState.winningCells.some(cell => cell.row === r && cell.col === c);
              
              ctx.beginPath();
              ctx.arc(x, y, CELL_SIZE * 0.4, 0, Math.PI * 2);
              
              if (gameState.board[r][c] === 1) {
                const grad = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, CELL_SIZE * 0.4);
                grad.addColorStop(0, '#ffe68f');
                grad.addColorStop(1, '#c7910b');
                ctx.fillStyle = grad;
              } else {
                const grad = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, CELL_SIZE * 0.4);
                grad.addColorStop(0, '#ff8c9a');
                grad.addColorStop(1, '#b31232');
                ctx.fillStyle = grad;
              }
              ctx.fill();
              ctx.strokeStyle = '#ffffff55';
              ctx.lineWidth = 1.5;
              ctx.stroke();
              
              // هاله برای مهره‌های برنده
              if (isWinCell) {
                ctx.beginPath();
                ctx.arc(x, y, CELL_SIZE * 0.45, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 12;
                ctx.stroke();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
              }
            }
          }
        }
      }
      
      function updateTurnDisplay() {
        const displayEl = document.getElementById('currentPlayerDisplay');
        if (gameState.gameOver) {
          if (gameState.winner) {
            displayEl.textContent = gameState.winner === 1 ? '🟡 زرد (برنده)' : '🔴 قرمز (برنده)';
            displayEl.className = gameState.winner === 1 ? 'player1-color' : 'player2-color';
          } else {
            displayEl.textContent = 'مساوی';
            displayEl.className = '';
          }
        } else {
          displayEl.textContent = gameState.currentPlayer === 1 ? '🟡 زرد' : '🔴 قرمز';
          displayEl.className = gameState.currentPlayer === 1 ? 'player1-color' : 'player2-color';
        }
      }
      
      function updateScoreDisplay() {
        document.getElementById('player1Score').textContent = gameState.scores[1];
        document.getElementById('player2Score').textContent = gameState.scores[2];
      }
      
      function restartGame() {
        gameState.board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        gameState.currentPlayer = 1;
        gameState.gameOver = false;
        gameState.winner = null;
        gameState.winningCells = [];
        updateTurnDisplay();
        drawBoard();
      }
      
      // ---------- رویدادها ----------
      canvas.addEventListener('click', (e) => {
        if (gameState.gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;
        
        const startX = PADDING;
        const startY = PADDING;
        const col = Math.round((clickX - startX) / CELL_SIZE);
        const row = Math.round((clickY - startY) / CELL_SIZE);
        
        if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
          placePiece(row, col);
        }
      });
      
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
        canvas.dispatchEvent(new MouseEvent('click', fakeEvent));
      }, { passive: false });
      
      document.getElementById('restartButton').addEventListener('click', restartGame);
      
      window.addEventListener('resize', () => {
        resizeCanvas();
        drawBoard();
      });
      
      // راه‌اندازی
      resizeCanvas();
      drawBoard();
    })();
  </script>
</body>
</html>
