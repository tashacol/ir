}
function formatJalaliDate(y,m,d) {
    return `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
}
function parseJalaliDate(str) {
    const parts = str.split('/');
    return { year: parseInt(parts[0]), month: parseInt(parts[1]), day: parseInt(parts[2]) };
}
function daysBetweenJalali(date1Str, date2Str) {
    const d1 = parseJalaliDate(date1Str);
    const d2 = parseJalaliDate(date2Str);
    const jd1 = jalaliToJd(d1.year, d1.month, d1.day);
    const jd2 = jalaliToJd(d2.year, d2.month, d2.day);
    return jd2 - jd1;
}
function addMonthsToJalali(dateStr, months) {
    const d = parseJalaliDate(dateStr);
    let m = d.month + months;
    let y = d.year;
    while (m > 12) { m -= 12; y++; }
    while (m < 1) { m += 12; y--; }
    const maxDay = getJalaliMonthLength(y, m);
    const day = Math.min(d.day, maxDay);
    return formatJalaliDate(y, m, day);
}
function getJalaliMonthLength(year, month) {
    if (month <= 6) return 31;
    if (month <= 11) return 30;
    // اسفند
    return isJalaliLeap(year) ? 30 : 29;
}
function isJalaliLeap(year) {
    const jd1 = jalaliToJd(year, 12, 30);
    const jd2 = jalaliToJd(year+1, 1, 1);
    return (jd2 - jd1) === 30; // if the next year starts after 30 days, it's leap
}
// دریافت تاریخ اینترنتی و تنظیم تاریخ جاری
let currentJalaliDate;
async function fetchInternetDate() {
    try {
        const resp = await fetch('https://worldtimeapi.org/api/timezone/Asia/Tehran', { signal: AbortSignal.timeout(5000) });
        const data = await resp.json();
        const gdate = new Date(data.datetime);
        const j = gregorianToJalaliDate(gdate);
        currentJalaliDate = { year: j.jy, month: j.jm, day: j.jd };
    } catch (e) {
        currentJalaliDate = getCurrentJalaliDate();
    }
    document.getElementById('current-date').textContent = '📅 ' + formatJalaliDate(currentJalaliDate.year, currentJalaliDate.month, currentJalaliDate.day);
}

// ===================== API ارتباط با Google Sheets =====================
async function apiCall(params) {
    const url = new URL(SCRIPT_URL);
    Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
    const resp = await fetch(url);
    const result = await resp.json();
    if (result.error) throw new Error(result.message);
    return result;
}

async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) {
        document.getElementById('login-error').textContent = 'نام کاربری و رمز عبور الزامی است.';
        return;

    try {
        const result = await apiCall({action: 'login', username, password});
        currentUser = result.user;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('display-username').textContent = currentUser.username;
        await fetchInternetDate();

        document.getElementById('login-error').textContent = e.message;
    }
}

function populateDateSelectors(prefix, startYear, endYear, dateStr) {
    const ySel = document.getElementById(prefix+'Year');
    const mSel = document.getElementById(prefix+'Month');
    const dSel = document.getElementById(prefix+'Day');
    ySel.innerHTML = '';
    for (let y = startYear; y <= endYear; y++) {
        ySel.innerHTML += `<option value="${y}">${y}</option>`;
    }
    for (let m = 1; m <= 12; m++) {
        mSel.innerHTML += `<option value="${m}">${m} - ${PERSIAN_MONTHS[m-1]}</option>`;
    }
    function updateDays() {
        const y = parseInt(ySel.value);
        const m = parseInt(mSel.value);
        const maxDay = getJalaliMonthLength(y, m);
        dSel.innerHTML = '';
        for (let d = 1; d <= maxDay; d++) dSel.innerHTML += `<option value="${d}">${d}</option>`;
    }
    ySel.addEventListener('change', updateDays);
    mSel.addEventListener('change', updateDays);
    if (dateStr) {
        const parts = dateStr.split('/');
        if (parts.length === 3) {
            ySel.value = parts[0];
            mSel.value = parseInt(parts[1]);
            dSel.value = parseInt(parts[2]);
        }
    } else {
        updateDays();
    }
}
async function saveTrainee(editId) {
    const data = {
        id: editId || '',
        firstName: document.getElementById('tfFirstName').value,
        lastName: document.getElementById('tfLastName').value,
        nationalId: document.getElementById('tfNationalId').value,

        birthDate: `${document.getElementById('tBirthYear').value}/${String(document.getElementById('tBirthMonth').value).padStart(2,'0')}/${String(document.getElementById('tBirthDay').value).padStart(2,'0')}`,
        phone: document.getElementById('tfPhone').value
    };
    try {
        if (editId) await apiCall({action:'editTrainee', ...data});
        else await apiCall({action:'addTrainee', ...data});
        closeModal('trainee-modal');
        await loadAllData();
    } catch(e) { alert(e.message); }
}
