<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه مدیریت آموزش</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #0d9488;
            --warning: #f59e0b;
            --danger: #dc2626;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --transition: 0.2s ease;
        }
        .dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }
        /* Login */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-light), var(--bg));
        }
        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 { font-size: 1.8rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text-light); }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn:hover { background: var(--primary-dark); }
        /* Dashboard */
        .dashboard { display: none; }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .header .logo { font-weight: 700; font-size: 1.2rem; }
        .header .controls i { font-size: 1.3rem; margin-left: 20px; cursor: pointer; color: var(--text-light); }
        .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 70px); }
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 20px 0;
        }
        .sidebar .menu-item {
            padding: 14px 25px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-light);
            transition: var(--transition);
        }
        .sidebar .menu-item.active, .sidebar .menu-item:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }
        .main { padding: 30px; overflow-y: auto; }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }
        .card h2 { font-size: 1.2rem; margin-bottom: 15px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-light); font-size: 0.85rem; }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef9c3; color: #854d0e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .flex-row > * { flex: 1; min-width: 180px; }
        select, input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: inherit; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="login-container" id="loginScreen">
    <div class="login-card">
        <h1>📚 ورود به سامانه</h1>
        <div class="form-group">
            <label>نام کاربری</label>
            <input type="text" id="username" placeholder="نام کاربری">
        </div>
        <div class="form-group">
            <label>رمز عبور</label>
            <input type="password" id="password" placeholder="رمز عبور">
        </div>
        <button class="btn" onclick="login()">ورود</button>
        <p id="loginError" style="color:var(--danger); margin-top:15px;"></p>
    </div>
</div>

<div class="dashboard" id="dashboardScreen">
    <header class="header">
        <div class="logo">سامانه مدیریت آموزش</div>
        <div class="controls">
            <span id="headerDate"></span>
            <i class="fas fa-moon" id="themeToggle" onclick="toggleTheme()"></i>
            <i class="fas fa-sign-out-alt" onclick="logout()"></i>
        </div>
    </header>
    <div class="layout">
        <aside class="sidebar">
            <div class="menu-item active" data-tab="trainees"><i class="fas fa-user-graduate"></i> متربیان</div>
            <div class="menu-item" data-tab="trainers"><i class="fas fa-chalkboard-teacher"></i> مربیان</div>
            <div class="menu-item" data-tab="classes"><i class="fas fa-book"></i> کلاس‌ها</div>
        </aside>
        <main class="main" id="mainContent">
            <!-- Dynamic content will be loaded here -->
        </main>
    </div>
</div>

<script>
// ==================== CONFIG ====================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkN-8nvXx68Psfc_qgMqSTjr3JVy7fmRq5tF-LVB3Cf1f0zZ4f7VMZm6ZlSxb56Sn6/exec'; // ← جایگزین کنید

// ==================== GLOBAL STATE ====================
let currentUser = null;
let trainees = [], trainers = [], classes = [];

// ==================== UTILS ====================
async function fetchAPI(params) {
    const url = new URL(SCRIPT_URL);
    Object.entries(params).forEach(([k,v]) => url.searchParams.append(k,v));
    const res = await fetch(url);
    return await res.json();
}

function showError(id, msg) {
    document.getElementById(id).textContent = msg;
}

// ==================== LOGIN ====================
async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) return showError('loginError', 'فیلدها را پر کنید');
    try {
        const result = await fetchAPI({ action: 'login', username, password });
        if (result.success) {
            currentUser = result.data;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            initDashboard();
        } else {
            showError('loginError', result.message);
        }
    } catch (e) {
        showError('loginError', 'خطا در ارتباط با سرور');
    }
}

function logout() {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboardScreen').style.display = 'none';
    // clear inputs
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
}

// ==================== DASHBOARD INIT ====================
async function initDashboard() {
    setupSidebar();
    await loadAllData();
    renderTraineesTab(); // default
    updateHeaderDate();
    setInterval(updateHeaderDate, 60000);
}

function setupSidebar() {
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const tab = item.dataset.tab;
            switch(tab) {
                case 'trainees': renderTraineesTab(); break;
                case 'trainers': renderTrainersTab(); break;
                case 'classes': renderClassesTab(); break;
            }
        });
    });
}

async function loadAllData() {
    try {
        const [t, r, c] = await Promise.all([
            fetchAPI({ action: 'getTrainees' }),
            fetchAPI({ action: 'getTrainers' }),
            fetchAPI({ action: 'getClasses' })
        ]);
        trainees = t.data || [];
        trainers = r.data || [];
        classes = c.data || [];
    } catch (e) { console.error(e); }
}

function updateHeaderDate() {
    const now = new Date();
    const options = { year: 'numeric', month: '2-digit', day: '2-digit', calendar: 'persian' };
    document.getElementById('headerDate').textContent = now.toLocaleDateString('fa-IR', options);
}

function toggleTheme() {
    document.documentElement.classList.toggle('dark-mode');
}

// ==================== RENDER TABS ====================
function renderTraineesTab() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>👨‍🎓 متربیان</h2>
                <button class="btn" style="width:auto;" onclick="openTraineeForm()">افزودن</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>نام</th><th>نام خانوادگی</th><th>کد ملی</th><th>نام پدر</th><th>تاریخ تولد</th><th>تلفن</th><th>عملیات</th></tr></thead>
                    <tbody id="traineesTableBody"></tbody>
                </table>
            </div>
        </div>`;
    populateTraineesTable();
}

function populateTraineesTable() {
    const tbody = document.getElementById('traineesTableBody');
    if (trainees.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">هیچ متربی‌ای وجود ندارد</td></tr>';
        return;
    }
    tbody.innerHTML = trainees.map(t => `
        <tr>
            <td>${t.firstName}</td>
            <td>${t.lastName}</td>
            <td>${t.nationalId}</td>
            <td>${t.fatherName}</td>
            <td>${t.birthDate}</td>
            <td><a href="tel:${t.phone}">${t.phone}</a></td>
            <td>
                <i class="fas fa-edit" onclick="openTraineeForm('${t.id}')"></i>
                <i class="fas fa-trash" onclick="deleteTrainee('${t.id}')"></i>
            </td>
        </tr>
    `).join('');
}

// ==================== FORM HANDLERS (sample for trainee) ====================
function openTraineeForm(id = null) {
    const trainee = id ? trainees.find(t => t.id === id) : null;
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="card">
            <h2>${trainee ? 'ویرایش' : 'افزودن'} متربی</h2>
            <div class="flex-row">
                <div><label>نام</label><input id="tfFirstName" value="${trainee?.firstName||''}"></div>
                <div><label>نام خانوادگی</label><input id="tfLastName" value="${trainee?.lastName||''}"></div>
            </div>
            <div class="flex-row">
                <div><label>کد ملی</label><input id="tfNationalId" value="${trainee?.nationalId||''}"></div>
                <div><label>نام پدر</label><input id="tfFatherName" value="${trainee?.fatherName||''}"></div>
            </div>
            <div class="flex-row">
                <div><label>تاریخ تولد (شمسی)</label>
                    <div class="flex-row">
                        <select id="tfYear">${generateYearOptions(trainee?.birthDate?.split('/')[0])}</select>
                        <select id="tfMonth" onchange="updateDays('tfYear','tfMonth','tfDay')">${generateMonthOptions(trainee?.birthDate?.split('/')[1])}</select>
                        <select id="tfDay">${generateDayOptions(31, trainee?.birthDate?.split('/')[2])}</select>
                    </div>
                </div>
                <div><label>شماره تماس</label><input id="tfPhone" value="${trainee?.phone||''}"></div>
            </div>
            <button class="btn" onclick="saveTrainee('${id||''}')">ذخیره</button>
            <button class="btn" style="background:gray;" onclick="renderTraineesTab()">انصراف</button>
        </div>`;
}

function generateYearOptions(selectedYear) {
    const currentYear = new Date().toLocaleDateString('fa-IR', {year:'numeric'});
    const years = [];
    for (let y = +currentYear; y >= +currentYear - 50; y--) {
        years.push(`<option value="${y}" ${y==selectedYear?'selected':''}>${y}</option>`);
    }
    return years.join('');
}

function generateMonthOptions(selectedMonth) {
    const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
    return months.map((m,i) => `<option value="${i+1}" ${(i+1)==selectedMonth?'selected':''}>${m}</option>`).join('');
}

function generateDayOptions(maxDay, selectedDay) {
    let opts = '';
    for (let d=1; d<=maxDay; d++) {
        opts += `<option value="${d}" ${d==selectedDay?'selected':''}>${d}</option>`;
    }
    return opts;
}

function updateDays(yearId, monthId, dayId) {
    const y = parseInt(document.getElementById(yearId).value);
    const m = parseInt(document.getElementById(monthId).value);
    const maxDay = getPersianMonthDays(y, m);
    document.getElementById(dayId).innerHTML = generateDayOptions(maxDay);
}

function getPersianMonthDays(year, month) {
    if (month <= 6) return 31;
    if (month <= 11) return 30;
    // اسفند: کبیسه؟
    return isPersianLeap(year) ? 30 : 29;
}

function isPersianLeap(year) {
    const a = (year - 474) % 128;
    const b = (year - 474) % 4;
    return a === 0 || (b === 0 && a !== 1 && a !== 2 && a !== 3 && a !== 4);
}

async function saveTrainee(id) {
    const data = {
        firstName: document.getElementById('tfFirstName').value,
        lastName: document.getElementById('tfLastName').value,
        nationalId: document.getElementById('tfNationalId').value,
        fatherName: document.getElementById('tfFatherName').value,
        birthDate: `${document.getElementById('tfYear').value}/${document.getElementById('tfMonth').value.padStart(2,'0')}/${document.getElementById('tfDay').value.padStart(2,'0')}`,
        phone: document.getElementById('tfPhone').value,
    };
    try {
        const action = id ? 'updateTrainee' : 'addTrainee';
        const result = await fetchAPI({ action, id, data: JSON.stringify(data) });
        if (result.success) {
            alert('ذخیره شد');
            await loadAllData();
            renderTraineesTab();
        } else {
            alert(result.message);
        }
    } catch (e) { alert('خطا'); }
}

async function deleteTrainee(id) {
    if (confirm('مطمئن هستید؟')) {
        await fetchAPI({ action: 'deleteTrainee', id });
        await loadAllData();
        renderTraineesTab();
    }
}

// ==================== INIT ====================
window.onload = () => {
    document.getElementById('dashboardScreen').style.display = 'none';
};
</script>
</body>
</html>
