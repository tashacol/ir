<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه مدیریت کلاس‌ها و متربیان</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-light: #e9f1ff;
            --primary-dark: #0b5ed7;
            --success: #198754;
            --warning: #ffc107;
            --danger: #dc3545;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #212529;
            --text-light: #6c757d;
            --border: #e9ecef;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }
        /* ===== LOGIN PAGE ===== */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .login-box .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .login-box h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #333;
        }
        .login-box p {
            color: #888;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .login-box input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            text-align: center;
        }
        .login-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(13, 110, 253, 0.4);
        }
        .login-error {
            color: var(--danger);
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 24px;
        }
        /* ===== HEADER ===== */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-display {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 4px;
            padding: 16px 24px 0;
            background: var(--bg);
            position: sticky;
            top: 56px;
            z-index: 90;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: var(--card);
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            color: var(--text-light);
            font-weight: 500;
            transition: var(--transition);
            border: 1px solid transparent;
            border-bottom: none;
            font-family: 'Vazirmatn', sans-serif;
        }
        .tab.active {
            background: var(--card);
            color: var(--primary);
            font-weight: 600;
            border-color: var(--border);
        }
        /* ===== CONTENT ===== */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 24px;
        }
        .panel { display: none; animation: fadeIn 0.3s; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-outline {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            pointer-events: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: var(--text-light);
            position: sticky;
            top: 0;
        }
        tbody tr:nth-child(even) {
            background: #fafbfc;
        }
        tbody tr:hover {
            background: #eef2f7;
        }
        td {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .badge-active { background: #d1e7ff; color: #0d6efd; }
        .badge-finished { background: #fff3cd; color: #664d03; }
        .badge-archived { background: #e2d9f3; color: #43285c; }
        .form-group { margin-bottom: 14px; }
        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            background: #fff;
        }
        .date-picker { display: flex; gap: 8px; }
        .date-picker select { flex: 1; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            left: 10px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }
        .payment-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .payment-chip {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.8rem;
            background: #fff;
        }
        .payment-chip.paid { background: #d1e7dd; border-color: #badbcc; }
        .payment-chip.unpaid { background: #f8d7da; border-color: #f1aeb5; }
        .empty { text-align: center; padding: 40px; color: var(--text-light); }
        .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .filter-chip {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.85rem;
            background: #fff;
            transition: 0.2s;
        }
        .filter-chip.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .student-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            background: #fafafa;
        }
        /* ===== SKELETON LOADING ===== */
        .skeleton-row td {
            padding: 12px;
        }
        .skeleton-line {
            height: 16px;
            background: linear-gradient(90deg, #e9ecef 25%, #f0f2f5 50%, #e9ecef 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: 6px;
            width: 100%;
            min-width: 60px;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @media (max-width: 768px) {
            .container { padding: 0 12px; }
            .tabs { padding: 12px 12px 0; top: 48px; }
            .tab { padding: 8px 12px; font-size: 0.8rem; }
            .date-picker { flex-direction: column; }
            th, td { padding: 8px 6px; font-size: 0.78rem; }
            .skeleton-line { height: 12px; }
        }
    </style>
</head>
<body>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="loginPage" class="login-page">
    <div class="login-box">
        <div class="icon">📚</div>
        <h2>سامانه مدیریت آموزش</h2>
        <p>برای ادامه، نام کاربری و رمز عبور خود را وارد کنید</p>
        <input type="text" id="loginUsername" placeholder="نام کاربری">
        <input type="password" id="loginPassword" placeholder="رمز عبور">
        <button class="login-btn" id="loginBtn">🔐 ورود به سامانه</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- ==================== DASHBOARD ==================== -->
<div id="dashboard" style="display: none;">
    <header class="header">
        <div class="logo">
            <i class="fas fa-book-open"></i>
            <span>مدیریت آموزش</span>
        </div>
        <div class="date-display" id="currentDate"></div>
    </header>

    <div class="tabs">
        <button class="tab active" data-tab="trainees">👨‍🎓 متربیان</button>
        <button class="tab" data-tab="trainers">👨‍🏫 مربیان</button>
        <button class="tab" data-tab="classes">📋 کلاس‌ها</button>
        <button class="btn btn-outline btn-sm" style="margin-right: auto;" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> خروج
        </button>
    </div>

    <div class="container">
        <!-- ===== متربیان ===== -->
        <div class="panel active" id="tab-trainees">
            <div class="card">
                <div class="card-header">
                    <h3>👨‍🎓 لیست متربیان</h3>
                    <button class="btn btn-primary" onclick="openTraineeForm()">
                        <i class="fas fa-plus"></i> افزودن متربی
                    </button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>نام</th><th>نام خانوادگی</th><th>کد ملی</th><th>نام پدر</th>
                                <th>تاریخ تولد</th><th>تلفن</th><th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody id="traineesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ===== مربیان ===== -->
        <div class="panel" id="tab-trainers">
            <div class="card">
                <div class="card-header">
                    <h3>👨‍🏫 لیست مربیان</h3>
                    <button class="btn btn-primary" onclick="openTrainerForm()">
                        <i class="fas fa-plus"></i> افزودن مربی
                    </button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>نام</th><th>نام خانوادگی</th><th>کد ملی</th><th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody id="trainersBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ===== کلاس‌ها ===== -->
        <div class="panel" id="tab-classes">
            <div class="card">
                <div class="card-header">
                    <h3>📋 کلاس‌ها</h3>
                    <button class="btn btn-primary" onclick="openClassForm()">
                        <i class="fas fa-plus"></i> افزودن کلاس
                    </button>
                </div>
                <div class="filter-chips" id="classFilters">
                    <span class="filter-chip active" data-filter="all">📋 همه</span>
                    <span class="filter-chip" data-filter="active">🟢 جاری</span>
                    <span class="filter-chip" data-filter="upcoming">⏳ آینده</span>
                    <span class="filter-chip" data-filter="finished">🟡 تمام شده</span>
                    <span class="filter-chip" data-filter="archived">🔵 بایگانی</span>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>عنوان</th><th>شروع</th><th>وضعیت</th><th>مربی</th>
                                <th>ظرفیت</th><th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody id="classesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ==================== MODAL ==================== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<script>
// ==================== CONFIG ====================
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwkN-8nvXx68Psfc_qgMqSTjr3JVy7fmRq5tF-LVB3Cf1f0zZ4f7VMZm6ZlSxb56Sn6/exec'; // ← URL خودتان را اینجا بگذارید

// ==================== DATA ====================
let trainees = [], trainers = [], classes = [];
let currentUser = null;
let currentClassFilter = 'all';

// ==================== PERSIAN DATE HELPERS ====================
function getTodayPersian() {
    const now = new Date();
    const parts = now.toLocaleDateString('fa-IR-u-nu-latn', {
        year: 'numeric', month: '2-digit', day: '2-digit'
    }).split('/');
    return { year: parseInt(parts[0]), month: parseInt(parts[1]), day: parseInt(parts[2]) };
}

function getMonthDays(y, m) {
    if (m <= 6) return 31;
    if (m <= 11) return 30;
    const isLeap = (y % 33 === 1) || (y % 33 === 5) || (y % 33 === 9) || (y % 33 === 13) ||
                   (y % 33 === 17) || (y % 33 === 22) || (y % 33 === 26) || (y % 33 === 30);
    return isLeap ? 30 : 29;
}

const MONTH_NAMES = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور',
                     'مهر','آبان','آذر','دی','بهمن','اسفند'];

function generateYearOptions(minYear, maxYear, selectedYear) {
    let html = '';
    for (let y = maxYear; y >= minYear; y--) {
        html += `<option value="${y}" ${y === selectedYear ? 'selected' : ''}>${y}</option>`;
    }
    return html;
}

function renderDatePicker(containerId, defaultDate = null) {
    const today = getTodayPersian();
    let defY = today.year, defM = today.month, defD = today.day;

    if (defaultDate && defaultDate.includes('/')) {
        const parts = defaultDate.split('/');
        defY = parseInt(parts[0]);
        defM = parseInt(parts[1]);
        defD = parseInt(parts[2]);
    }

    const minYear = today.year - 50;
    const maxYear = today.year - 3;

    const container = document.getElementById(containerId);
    if (!container) return null;

    const prefix = containerId;
    container.innerHTML = `
        <div class="date-picker">
            <select id="${prefix}_year">${generateYearOptions(minYear, maxYear, defY)}</select>
            <select id="${prefix}_month">${MONTH_NAMES.map((m, i) => 
                `<option value="${i+1}" ${(i+1) === defM ? 'selected' : ''}>${m}</option>`
            ).join('')}</select>
            <select id="${prefix}_day"></select>
        </div>
    `;

    const yearSel = document.getElementById(`${prefix}_year`);
    const monthSel = document.getElementById(`${prefix}_month`);
    const daySel = document.getElementById(`${prefix}_day`);

    function updateDays() {
        const y = parseInt(yearSel.value);
        const m = parseInt(monthSel.value);
        const days = getMonthDays(y, m);
        daySel.innerHTML = Array.from({length: days}, (_, i) => 
            `<option value="${i+1}" ${(i+1) === defD ? 'selected' : ''}>${i+1}</option>`
        ).join('');
    }

    yearSel.addEventListener('change', updateDays);
    monthSel.addEventListener('change', updateDays);
    updateDays();

    return {
        getValue: () => {
            const y = yearSel.value;
            const m = monthSel.value.padStart(2, '0');
            const d = daySel.value.padStart(2, '0');
            return `${y}/${m}/${d}`;
        }
    };
}

// ==================== SKELETON LOADING ====================
function showSkeletonLoading(tableBodyId, columns) {
    const tbody = document.getElementById(tableBodyId);
    if (!tbody) return;
    const skeletonRows = 5;
    let html = '';
    for (let i = 0; i < skeletonRows; i++) {
        html += '<tr class="skeleton-row">';
        for (let j = 0; j < columns; j++) {
            html += `<td><div class="skeleton-line"></div></td>`;
        }
        html += '</tr>';
    }
    tbody.innerHTML = html;
}

// ==================== API ====================
async function apiCall(action, params = {}) {
    const url = new URL(BACKEND_URL);
    url.searchParams.append('action', action);
    Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
    
    try {
        const res = await fetch(url);
        return await res.json();
    } catch (err) {
        return { success: false, message: 'خطا در ارتباط با سرور' };
    }
}

// ==================== LOGIN ====================
document.getElementById('loginBtn').addEventListener('click', async () => {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    if (!username || !password) {
        errorDiv.textContent = 'لطفاً نام کاربری و رمز عبور را وارد کنید.';
        return;
    }
    
    const btn = document.getElementById('loginBtn');
    btn.textContent = '⏳ در حال بررسی...';
    btn.disabled = true;
    
    const result = await apiCall('login', { username, password });
    
    if (result.success) {
        currentUser = { fullName: result.fullName, role: result.role };
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        initApp();
    } else {
        errorDiv.textContent = result.message || 'خطا در ورود';
        btn.textContent = '🔐 ورود به سامانه';
        btn.disabled = false;
    }
});

// ==================== INIT ====================
async function initApp() {
    setupTabs();
    updateCurrentDate();
    await loadAllData();
}

function setupTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
    });
}

function updateCurrentDate() {
    const today = getTodayPersian();
    document.getElementById('currentDate').textContent = 
        `📅 ${today.year}/${String(today.month).padStart(2,'0')}/${String(today.day).padStart(2,'0')}`;
}

async function loadAllData() {
    // نمایش اسکلتون لودینگ در هر سه جدول
    showSkeletonLoading('traineesBody', 7);
    showSkeletonLoading('trainersBody', 4);
    showSkeletonLoading('classesBody', 6);
    
    const [tRes, trRes, cRes] = await Promise.all([
        apiCall('getTrainees'),
        apiCall('getTrainers'),
        apiCall('getClasses')
    ]);
    
    trainees = tRes.data || [];
    trainers = trRes.data || [];
    classes = cRes.data || [];
    
    renderTrainees();
    renderTrainers();
    renderClasses();
}

// ==================== RENDER FUNCTIONS ====================
function renderTrainees() {
    const tbody = document.getElementById('traineesBody');
    if (trainees.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">📭 هیچ متربی‌ای ثبت نشده است</td></tr>';
        return;
    }
    tbody.innerHTML = trainees.map(t => `
        <tr>
            <td>${t.firstName || ''}</td>
            <td>${t.lastName || ''}</td>
            <td>${t.nationalId || ''}</td>
            <td>${t.fatherName || ''}</td>
            <td>${t.birthDate || '—'}</td>
            <td><a href="tel:${t.phone || ''}">${t.phone || '—'}</a></td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editTrainee('${t.id}')">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteTrainee('${t.id}')">🗑️</button>
            </td>
        </tr>
    `).join('');
}

function renderTrainers() {
    const tbody = document.getElementById('trainersBody');
    if (trainers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">📭 هیچ مربی‌ای ثبت نشده است</td></tr>';
        return;
    }
    tbody.innerHTML = trainers.map(t => `
        <tr>
            <td>${t.firstName || ''}</td>
            <td>${t.lastName || ''}</td>
            <td>${t.nationalId || ''}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editTrainer('${t.id}')">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteTrainer('${t.id}')">🗑️</button>
            </td>
        </tr>
    `).join('');
}

function renderClasses() {
    const tbody = document.getElementById('classesBody');
    let filtered = classes;
    
    if (currentClassFilter !== 'all') {
        filtered = classes.filter(c => {
            const status = c.status || 'active';
            if (currentClassFilter === 'upcoming') {
                if (status === 'archived' || status === 'finished') return false;
                const today = getTodayPersian();
                const todayStr = `${today.year}/${String(today.month).padStart(2,'0')}/${String(today.day).padStart(2,'0')}`;
                return (c.startDate || '') > todayStr;
            }
            return status === currentClassFilter;
        });
    }
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">📭 هیچ کلاسی یافت نشد</td></tr>';
        return;
    }
    
    tbody.innerHTML = filtered.map(c => {
        const status = c.status || 'active';
        let badgeClass = 'badge-active', badgeText = '🟢 جاری';
        if (status === 'finished') { badgeClass = 'badge-finished'; badgeText = '🟡 تمام شده'; }
        if (status === 'archived') { badgeClass = 'badge-archived'; badgeText = '🔵 بایگانی'; }
        
        const today = getTodayPersian();
        const todayStr = `${today.year}/${String(today.month).padStart(2,'0')}/${String(today.day).padStart(2,'0')}`;
        if (status === 'active' && (c.startDate || '') > todayStr) {
            badgeClass = 'badge-active';
            badgeText = '⏳ آینده';
        }
        
        const trainer = trainers.find(tr => tr.id == c.trainerId);
        const trainerName = trainer ? `${trainer.firstName} ${trainer.lastName}` : '—';
        
        let students = [];
        try { students = JSON.parse(c.students || '[]'); } catch(e) { students = []; }
        const count = students.length;
        
        return `
            <tr>
                <td><strong>${c.title || ''}</strong></td>
                <td>${c.startDate || '—'}</td>
                <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                <td>${trainerName}</td>
                <td>${count} نفر</td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="viewClassDetail('${c.id}')">🔍</button>
                    ${status === 'active' ? `<button class="btn btn-warning btn-sm" onclick="finishClass('${c.id}')">🏁</button>` : ''}
                    ${status === 'finished' ? `<button class="btn btn-success btn-sm" onclick="archiveClass('${c.id}')">📦</button>` : ''}
                    ${status === 'active' ? `<button class="btn btn-danger btn-sm" onclick="deleteClass('${c.id}')">🗑️</button>` : ''}
                </td>
            </tr>
        `;
    }).join('');
}

function showModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

function viewClassDetail(id) {
    const cls = classes.find(c => c.id == id);
    if (!cls) return;
    
    const trainer = trainers.find(t => t.id == cls.trainerId);
    const trainerName = trainer ? `${trainer.firstName} ${trainer.lastName}` : '—';
    
    let students = [];
    try { students = JSON.parse(cls.students || '[]'); } catch(e) { students = []; }
    
    showModal(`
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3>📋 ${cls.title || ''}</h3>
        <div style="margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px;">
            <strong>تاریخ شروع:</strong> ${cls.startDate || '—'} |
            <strong>مربی:</strong> ${trainerName} |
            <strong>وضعیت:</strong> ${cls.status || 'active'}
        </div>
        ${cls.description ? `<p style="margin-bottom: 10px; color: #666;">📝 ${cls.description}</p>` : ''}
        
        <h4 style="margin-bottom: 10px;">👨‍🎓 متربیان (${students.length} نفر)</h4>
        <div id="studentsList">
            ${students.map((s, i) => {
                const trainee = trainees.find(t => t.id == s.traineeId);
                const tName = trainee ? `${trainee.firstName} ${trainee.lastName}` : 'نامشخص';
                return `
                    <div class="student-card">
                        <strong>${i+1}.</strong> ${tName}
                        ${trainee ? `(کد ملی: ${trainee.nationalId})` : ''}
                    </div>
                `;
            }).join('')}
        </div>
    `);
}

document.getElementById('classFilters').addEventListener('click', function(e) {
    if (e.target.classList.contains('filter-chip')) {
        document.querySelectorAll('#classFilters .filter-chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentClassFilter = e.target.dataset.filter;
        renderClasses();
    }
});
