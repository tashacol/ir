<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اکسل ساز پیشرفته</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            direction: rtl;
            text-align: right;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1, h2, h3 {
            color: #2c3e50;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 10px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-secondary {
            background-color: #95a5a6;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: 'Vazirmatn', sans-serif;
        }

        input[type="checkbox"] {
            margin-left: 5px;
        }

        .form-builder-section, .form-list-section, .data-display-section {
            background-color: #f9f9f9;
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .field-item {
            display: flex;
            align-items: center;
            background-color: #eaf2f8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px solid #d4e6f1;
        }

        .field-item span {
            flex-grow: 1;
            padding-left: 10px;
        }

        .form-card {
            background-color: #e8f6f3;
            border: 1px solid #d1ede8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-card h4 {
            margin: 0;
            color: #218f7d;
        }

        .form-data-entry {
            background-color: #fdfefe;
            border: 1px solid #cce5ff;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: right;
        }

        .data-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
            padding-top: 60px;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto; /* 15% from the top and centered */
            padding: 20px;
            border: 1px solid #888;
            width: 80%; /* Could be more or less, depending on screen size */
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .close-button {
            color: #aaa;
            float: left; /* Align to the left in RTL */
            font-size: 28px;
            font-weight: bold;
        }

        .close-button:hover,
        .close-button:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ابزار اکسل ساز پیشرفته</h1>

        <div class="form-builder-section">
            <h2>ساخت فرم جدید</h2>
            <div class="form-group">
                <label for="newFormName">نام فرم:</label>
                <input type="text" id="newFormName" placeholder="مثال: فرم ثبت نام مشتریان" required>
            </div>

            <h3>افزودن فیلد به فرم</h3>
            <div class="form-group">
                <label for="fieldName">عنوان فیلد:</label>
                <input type="text" id="fieldName" placeholder="مثال: نام و نام خانوادگی">
            </div>
            <div class="form-group">
                <label for="fieldType">نوع فیلد:</label>
                <select id="fieldType">
                    <option value="text">متن</option>
                    <option value="number">عدد</option>
                    <option value="nationalId">کد ملی (10 رقم)</option>
                    <option value="phoneNumber">شماره تماس (11 رقم)</option>
                    <option value="dropdown-single">کشویی (تک انتخابی)</option>
                    <option value="dropdown-multi">کشویی (چند انتخابی)</option>
                    <option value="textarea">متن بلند</option>
                </select>
            </div>
            <div class="form-group" id="dropdownOptionsGroup" style="display:none;">
                <label for="dropdownOptions">گزینه‌های کشویی (با کاما جدا کنید):</label>
                <input type="text" id="dropdownOptions" placeholder="مثال: گزینه ۱,گزینه ۲,گزینه ۳">
                <div style="margin-top: 10px;">
                    <label>
                        <input type="checkbox" id="splitExcelByDropdown"> تفکیک اکسل بر اساس این فیلد انتخابی
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="fieldRequired"> فیلد اجباری
                </label>
            </div>
            <button class="btn" id="addFieldBtn">افزودن فیلد</button>

            <h3 style="margin-top: 30px;">فیلدهای فرم جاری:</h3>
            <div id="currentFormFields">
                <p>هنوز فیلدی اضافه نشده است.</p>
            </div>

            <button class="btn" id="saveFormBtn" style="margin-top: 20px;">ذخیره فرم</button>
        </div>

        <div class="form-list-section">
            <h2>فرم‌های ذخیره شده</h2>
            <div id="savedFormsList">
                <p>هنوز فرمی ساخته نشده است.</p>
            </div>
        </div>

        <div class="data-display-section" id="dataDisplaySection" style="display:none;">
            <h2>مشاهده و مدیریت داده‌ها</h2>
            <h3 id="currentFormDataTitle"></h3>
            <div id="formDataEntry" class="form-data-entry">
                <!-- Dynamic form for data entry will be loaded here -->
            </div>
            <div style="margin-top: 20px;">
                <button class="btn" id="saveFormDataBtn">ذخیره اطلاعات فرم</button>
                <button class="btn btn-secondary" id="cancelFormDataEntryBtn">بازگشت به لیست فرم‌ها</button>
            </div>

            <h3 style="margin-top: 30px;">داده‌های ثبت شده:</h3>
            <div id="recordedData">
                <p>هنوز داده‌ای برای این فرم ثبت نشده است.</p>
            </div>
            <div style="margin-top: 20px;">
                <button class="btn" id="exportToExcelBtn">دانلود اکسل</button>
                <button class="btn btn-secondary" id="printDataBtn">چاپ</button>
            </div>
        </div>
    </div>

    <!-- The Modal for full form view -->
    <div id="fullFormModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalFormTitle"></h2>
            <div id="modalFormContent">
                <!-- The form will be rendered here -->
            </div>
            <button class="btn" id="saveModalFormDataBtn" style="margin-top: 20px;">ذخیره اطلاعات</button>
            <button class="btn" id="viewModalDataBtn">مشاهده داده‌ها</button>
            <div id="modalRecordedData" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const MAX_FORMS = 5; // Maximum number of forms allowed

        let forms = JSON.parse(localStorage.getItem('forms')) || [];
        let currentFields = [];
        let editingFormId = null; // To keep track of which form is being viewed/edited

        const newFormNameInput = document.getElementById('newFormName');
        const fieldNameInput = document.getElementById('fieldName');
        const fieldTypeSelect = document.getElementById('fieldType');
        const dropdownOptionsGroup = document.getElementById('dropdownOptionsGroup');
        const dropdownOptionsInput = document.getElementById('dropdownOptions');
        const splitExcelByDropdownCheckbox = document.getElementById('splitExcelByDropdown');
        const fieldRequiredCheckbox = document.getElementById('fieldRequired');
        const addFieldBtn = document.getElementById('addFieldBtn');
        const saveFormBtn = document.getElementById('saveFormBtn');
        const currentFormFieldsDiv = document.getElementById('currentFormFields');
        const savedFormsListDiv = document.getElementById('savedFormsList');
        const dataDisplaySection = document.getElementById('dataDisplaySection');
        const currentFormDataTitle = document.getElementById('currentFormDataTitle');
        const formDataEntryDiv = document.getElementById('formDataEntry');
        const saveFormDataBtn = document.getElementById('saveFormDataBtn');
        const cancelFormDataEntryBtn = document.getElementById('cancelFormDataEntryBtn');
        const recordedDataDiv = document.getElementById('recordedData');
        const exportToExcelBtn = document.getElementById('exportToExcelBtn');
        const printDataBtn = document.getElementById('printDataBtn');

        const fullFormModal = document.getElementById('fullFormModal');
        const closeModalButton = fullFormModal.querySelector('.close-button');
        const modalFormTitle = document.getElementById('modalFormTitle');
        const modalFormContent = document.getElementById('modalFormContent');
        const saveModalFormDataBtn = document.getElementById('saveModalFormDataBtn');
        const viewModalDataBtn = document.getElementById('viewModalDataBtn');
        const modalRecordedData = document.getElementById('modalRecordedData');

        // Event Listeners
        fieldTypeSelect.addEventListener('change', () => {
            if (fieldTypeSelect.value === 'dropdown-single' || fieldTypeSelect.value === 'dropdown-multi') {
                dropdownOptionsGroup.style.display = 'block';
            } else {
                dropdownOptionsGroup.style.display = 'none';
                dropdownOptionsInput.value = ''; // Clear options if not a dropdown
                splitExcelByDropdownCheckbox.checked = false; // Uncheck
            }
        });

        addFieldBtn.addEventListener('click', addField);
        saveFormBtn.addEventListener('click', saveForm);
        cancelFormDataEntryBtn.addEventListener('click', () => {
            dataDisplaySection.style.display = 'none';
            editingFormId = null;
            renderSavedForms();
        });
        saveFormDataBtn.addEventListener('click', saveEntryData);
        exportToExcelBtn.addEventListener('click', exportCurrentFormToExcel);
        printDataBtn.addEventListener('click', printCurrentFormData);

        // Modal event listeners
        closeModalButton.addEventListener('click', () => {
            fullFormModal.style.display = 'none';
            modalRecordedData.innerHTML = ''; // Clear recorded data in modal
        });
        window.addEventListener('click', (event) => {
            if (event.target == fullFormModal) {
                fullFormModal.style.display = 'none';
                modalRecordedData.innerHTML = ''; // Clear recorded data in modal
            }
        });
        saveModalFormDataBtn.addEventListener('click', saveEntryData);
        viewModalDataBtn.addEventListener('click', () => {
            if (editingFormId) {
                renderRecordedData(editingFormId, modalRecordedData);
            }
        });

        // Functions
        function renderCurrentFields() {
            if (currentFields.length === 0) {
                currentFormFieldsDiv.innerHTML = '<p>هنوز فیلدی اضافه نشده است.</p>';
                return;
            }
            currentFormFieldsDiv.innerHTML = '';
            currentFields.forEach((field, index) => {
                const fieldItem = document.createElement('div');
                fieldItem.className = 'field-item';
                let optionsText = field.options ? ` (گزینه‌ها: ${field.options.join(', ')})` : '';
                let splitExcelText = field.splitExcel ? ' (تفکیک اکسل فعال)' : '';
                fieldItem.innerHTML = `
                    <span>${field.name} [${fieldTypeToPersian(field.type)}] ${field.required ? '(اجباری)' : ''} ${optionsText} ${splitExcelText}</span>
                    <button class="btn btn-danger btn-sm" onclick="removeField(${index})">حذف</button>
                `;
                currentFormFieldsDiv.appendChild(fieldItem);
            });
        }

        function addField() {
            const fieldName = fieldNameInput.value.trim();
            const fieldType = fieldTypeSelect.value;
            const fieldRequired = fieldRequiredCheckbox.checked;
            const dropdownOptions = dropdownOptionsInput.value.trim();
            const splitExcel = splitExcelByDropdownCheckbox.checked;

            if (!fieldName) {
                alert('لطفاً عنوان فیلد را وارد کنید.');
                return;
            }

            let options = [];
            if ((fieldType === 'dropdown-single' || fieldType === 'dropdown-multi') && dropdownOptions) {
                options = dropdownOptions.split(',').map(opt => opt.trim()).filter(opt => opt !== '');
                if (options.length === 0) {
                    alert('لطفاً گزینه‌های کشویی را وارد کنید.');
                    return;
                }
            } else if ((fieldType === 'dropdown-single' || fieldType === 'dropdown-multi') && !dropdownOptions) {
                 alert('لطفاً گزینه‌های کشویی را وارد کنید.');
                 return;
            }

            currentFields.push({
                id: Date.now(),
                name: fieldName,
                type: fieldType,
                required: fieldRequired,
                options: options,
                splitExcel: splitExcel
            });

            fieldNameInput.value = '';
            fieldTypeSelect.value = 'text';
            fieldRequiredCheckbox.checked = false;
            dropdownOptionsInput.value = '';
            splitExcelByDropdownCheckbox.checked = false;
            dropdownOptionsGroup.style.display = 'none';
            renderCurrentFields();
        }

        function removeField(index) {
            currentFields.splice(index, 1);
            renderCurrentFields();
        }

        function saveForm() {
            const formName = newFormNameInput.value.trim();
            if (!formName) {
                alert('لطفاً نام فرم را وارد کنید.');
                return;
            }
            if (currentFields.length === 0) {
                alert('لطفاً حداقل یک فیلد به فرم اضافه کنید.');
                return;
            }
            if (forms.length >= MAX_FORMS) {
                alert(`شما حداکثر تعداد فرم (${MAX_FORMS}) را ساخته‌اید. برای ساخت فرم جدید، ابتدا یکی از فرم‌های موجود را حذف کنید.`);
                return;
            }

            const newForm = {
                id: Date.now(),
                name: formName,
                fields: [...currentFields],
                data: [] // To store actual submitted data
            };
            forms.push(newForm);
            localStorage.setItem('forms', JSON.stringify(forms));

            alert('فرم با موفقیت ذخیره شد!');
            newFormNameInput.value = '';
            currentFields = [];
            renderCurrentFields();
            renderSavedForms();
        }

        function renderSavedForms() {
            if (forms.length === 0) {
                savedFormsListDiv.innerHTML = '<p>هنوز فرمی ساخته نشده است.</p>';
                return;
            }
            savedFormsListDiv.innerHTML = '';
            forms.forEach(form => {
                const formCard = document.createElement('div');
                formCard.className = 'form-card';
                formCard.innerHTML = `
                    <h4>${form.name}</h4>
                    <div>
                        <button class="btn" onclick="openFormForEntry('${form.id}')">پاسخ به فرم</button>
                        <button class="btn btn-secondary" onclick="viewFormData('${form.id}')">مشاهده داده‌ها</button>
                        <button class="btn btn-danger" onclick="deleteForm('${form.id}')">حذف فرم</button>
                    </div>
                `;
                savedFormsListDiv.appendChild(formCard);
            });
        }

        function deleteForm(formId) {
            if (confirm('آیا از حذف این فرم و تمام داده‌های مربوط به آن مطمئن هستید؟')) {
                forms = forms.filter(form => form.id != formId);
                localStorage.setItem('forms', JSON.stringify(forms));
                renderSavedForms();
                // If the deleted form was the one being viewed, hide the data section
                if (editingFormId == formId) {
                    dataDisplaySection.style.display = 'none';
                    editingFormId = null;
                }
            }
        }

        function openFormForEntry(formId) {
            editingFormId = formId;
            const formToEdit = forms.find(f => f.id == formId);
            if (!formToEdit) return;

            // Reset modal data view
            modalRecordedData.innerHTML = '';

            modalFormTitle.textContent = formToEdit.name;
            modalFormContent.innerHTML = ''; // Clear previous form

            formToEdit.fields.forEach(field => {
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';
                let inputElement;

                const label = document.createElement('label');
                label.textContent = field.name + (field.required ? ' *' : '');
                label.setAttribute('for', `modal-field-${field.id}`);
                formGroup.appendChild(label);

                switch (field.type) {
                    case 'text':
                    case 'nationalId':
                    case 'phoneNumber':
                    case 'number':
                        inputElement = document.createElement('input');
                        inputElement.type = field.type === 'number' ? 'number' : 'text';
                        inputElement.id = `modal-field-${field.id}`;
                        if (field.type === 'nationalId') inputElement.pattern = "\\d{10}";
                        if (field.type === 'phoneNumber') inputElement.pattern = "09\\d{9}";
                        if (field.type === 'number') inputElement.inputMode = 'numeric'; // For better mobile keyboard
                        break;
                    case 'textarea':
                        inputElement = document.createElement('textarea');
                        inputElement.id = `modal-field-${field.id}`;
                        inputElement.rows = 3;
                        break;
                    case 'dropdown-single':
                        inputElement = document.createElement('select');
                        inputElement.id = `modal-field-${field.id}`;
                        field.options.forEach(option => {
                            const opt = document.createElement('option');
                            opt.value = option;
                            opt.textContent = option;
                            inputElement.appendChild(opt);
                        });
                        break;
                    case 'dropdown-multi':
                        inputElement = document.createElement('div');
                        inputElement.id = `modal-field-${field.id}`; // Parent div for checkboxes
                        inputElement.className = 'checkbox-group';
                        field.options.forEach(option => {
                            const checkboxId = `modal-field-${field.id}-${option}`;
                            const checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.value = option;
                            checkbox.id = checkboxId;
                            checkbox.className = 'multi-select-checkbox'; // Add a class for easy selection
                            const checkboxLabel = document.createElement('label');
                            checkboxLabel.setAttribute('for', checkboxId);
                            checkboxLabel.textContent = option;

                            const div = document.createElement('div');
                            div.appendChild(checkbox);
                            div.appendChild(checkboxLabel);
                            inputElement.appendChild(div);
                        });
                        break;
                }

                if (inputElement) {
                    inputElement.required = field.required;
                    formGroup.appendChild(inputElement);
                }
                modalFormContent.appendChild(formGroup);
            });

            fullFormModal.style.display = 'block';
            dataDisplaySection.style.display = 'none'; // Ensure main data view is hidden
        }

        function viewFormData(formId) {
            editingFormId = formId;
            const formToView = forms.find(f => f.id == formId);
            if (!formToView) return;

            dataDisplaySection.style.display = 'block';
            currentFormDataTitle.textContent = `داده‌های فرم: ${formToView.name}`;
            formDataEntryDiv.innerHTML = ''; // Clear previous form
            recordedDataDiv.innerHTML = ''; // Clear previous data table

            // Render form for data entry (same as openFormForEntry but into formDataEntryDiv)
            formToView.fields.forEach(field => {
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';
                let inputElement;

                const label = document.createElement('label');
                label.textContent = field.name + (field.required ? ' *' : '');
                label.setAttribute('for', `entry-field-${field.id}`);
                formGroup.appendChild(label);

                switch (field.type) {
                    case 'text':
                    case 'nationalId':
                    case 'phoneNumber':
                    case 'number':
                        inputElement = document.createElement('input');
                        inputElement.type = field.type === 'number' ? 'number' : 'text';
                        inputElement.id = `entry-field-${field.id}`;
                        if (field.type === 'nationalId') inputElement.pattern = "\\d{10}";
                        if (field.type === 'phoneNumber') inputElement.pattern = "09\\d{9}";
                        if (field.type === 'number') inputElement.inputMode = 'numeric';
                        break;
                    case 'textarea':
                        inputElement = document.createElement('textarea');
                        inputElement.id = `entry-field-${field.id}`;
                        inputElement.rows = 3;
                        break;
                    case 'dropdown-single':
                        inputElement = document.createElement('select');
                        inputElement.id = `entry-field-${field.id}`;
                        field.options.forEach(option => {
                            const opt = document.createElement('option');
                            opt.value = option;
                            opt.textContent = option;
                            inputElement.appendChild(opt);
                        });
                        break;
                    case 'dropdown-multi':
                        inputElement = document.createElement('div');
                        inputElement.id = `entry-field-${field.id}`;
                        inputElement.className = 'checkbox-group';
                        field.options.forEach(option => {
                            const checkboxId = `entry-field-${field.id}-${option}`;
                            const checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.value = option;
                            checkbox.id = checkboxId;
                            checkbox.className = 'multi-select-checkbox';
                            const checkboxLabel = document.createElement('label');
                            checkboxLabel.setAttribute('for', checkboxId);
                            checkboxLabel.textContent = option;

                            const div = document.createElement('div');
                            div.appendChild(checkbox);
                            div.appendChild(checkboxLabel);
                            inputElement.appendChild(div);
                        });
                        break;
                }

                if (inputElement) {
                    inputElement.required = field.required;
                    formGroup.appendChild(inputElement);
                }
                formDataEntryDiv.appendChild(formGroup);
            });

            renderRecordedData(formId, recordedDataDiv);
        }

        function saveEntryData() {
            if (!editingFormId) return;

            const formIndex = forms.findIndex(f => f.id == editingFormId);
            if (formIndex === -1) return;

            const formToSave = forms[formIndex];
            const newEntry = {};
            let isValid = true;

            const targetElement = fullFormModal.style.display === 'block' ? modalFormContent : formDataEntryDiv;

            formToSave.fields.forEach(field => {
                let fieldValue;
                if (field.type === 'dropdown-multi') {
                    const checkboxes = targetElement.querySelectorAll(`#${fullFormModal.style.display === 'block' ? 'modal' : 'entry'}-field-${field.id} .multi-select-checkbox:checked`);
                    fieldValue = Array.from(checkboxes).map(cb => cb.value);
                } else {
                    const inputElement = targetElement.querySelector(`#${fullFormModal.style.display === 'block' ? 'modal' : 'entry'}-field-${field.id}`);
                    fieldValue = inputElement ? inputElement.value.trim() : '';
                }

                if (field.required && (!fieldValue || (Array.isArray(fieldValue) && fieldValue.length === 0))) {
                    alert(`فیلد "${field.name}" اجباری است.`);
                    isValid = false;
                    return;
                }

                // Basic validations
                if (field.type === 'nationalId' && fieldValue && !/^\d{10}$/.test(fieldValue)) {
                    alert(`فیلد "${field.name}" باید 10 رقم عددی باشد.`);
                    isValid = false;
                    return;
                }
                if (field.type === 'phoneNumber' && fieldValue && !/^09\d{9}$/.test(fieldValue)) {
                    alert(`فیلد "${field.name}" باید 11 رقم عددی و با "09" شروع شود.`);
                    isValid = false;
                    return;
                }
                if (field.type === 'number' && fieldValue && isNaN(fieldValue)) {
                    alert(`فیلد "${field.name}" باید عددی باشد.`);
                    isValid = false;
                    return;
                }

                newEntry[field.name] = fieldValue;
            });

            if (!isValid) return;

            forms[formIndex].data.push(newEntry);
            localStorage.setItem('forms', JSON.stringify(forms));
            alert('اطلاعات با موفقیت ذخیره شد!');

            // Clear the form after saving
            targetElement.querySelectorAll('input, select, textarea').forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else if (input.tagName === 'SELECT' && input.options.length > 0) {
                    input.selectedIndex = 0;
                } else {
                    input.value = '';
                }
            });

            if (fullFormModal.style.display === 'block') {
                renderRecordedData(editingFormId, modalRecordedData);
            } else {
                renderRecordedData(editingFormId, recordedDataDiv);
            }
        }

        function renderRecordedData(formId, targetElement) {
            const form = forms.find(f => f.id == formId);
            if (!form || form.data.length === 0) {
                targetElement.innerHTML = '<p>هنوز داده‌ای برای این فرم ثبت نشده است.</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'data-table';
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');
            const headerRow = document.createElement('tr');

            // Add headers
            form.fields.forEach(field => {
                const th = document.createElement('th');
                th.textContent = field.name;
                headerRow.appendChild(th);
            });
            const actionTh = document.createElement('th');
            actionTh.textContent = 'عملیات';
            headerRow.appendChild(actionTh); // For delete button
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // Add data rows
            form.data.forEach((entry, rowIndex) => {
                const dataRow = document.createElement('tr');
                form.fields.forEach(field => {
                    const td = document.createElement('td');
                    let displayValue = entry[field.name];
                    if (Array.isArray(displayValue)) {
                        displayValue = displayValue.join(', '); // For multi-select dropdowns
                    }
                    td.textContent = displayValue || '';
                    dataRow.appendChild(td);
                });
                const actionTd = document.createElement('td');
                const deleteButton = document.createElement('button');
                deleteButton.className = 'btn btn-danger btn-sm';
                deleteButton.textContent = 'حذف';
                deleteButton.onclick = () => deleteEntryData(formId, rowIndex);
                actionTd.appendChild(deleteButton);
                dataRow.appendChild(actionTd);
                tbody.appendChild(dataRow);
            });
            table.appendChild(tbody);
            targetElement.innerHTML = '';
            targetElement.appendChild(table);
        }

        function deleteEntryData(formId, rowIndex) {
            if (confirm('آیا از حذف این ردیف اطلاعات مطمئن هستید؟')) {
                const formIndex = forms.findIndex(f => f.id == formId);
                if (formIndex !== -1) {
                    forms[formIndex].data.splice(rowIndex, 1);
                    localStorage.setItem('forms', JSON.stringify(forms));
                    if (fullFormModal.style.display === 'block') {
                        renderRecordedData(formId, modalRecordedData);
                    } else {
                        renderRecordedData(formId, recordedDataDiv);
                    }
                }
            }
        }


        // Function to export data to Excel (requires xlsx.full.min.js)
        function exportCurrentFormToExcel() {
            if (!editingFormId) {
                alert('لطفاً ابتدا یک فرم را برای مشاهده داده‌ها انتخاب کنید.');
                return;
            }

            const form = forms.find(f => f.id == editingFormId);
            if (!form || form.data.length === 0) {
                alert('داده‌ای برای دانلود در این فرم وجود ندارد.');
                return;
            }

            const workBook = XLSX.utils.book_new();

            // Check for fields that require splitting Excel
            const splitFields = form.fields.filter(field => field.splitExcel && (field.type === 'dropdown-single' || field.type === 'dropdown-multi'));

            if (splitFields.length > 0) {
                // If there are fields to split by, create separate sheets
                splitFields.forEach(splitField => {
                    if (splitField.options && splitField.options.length > 0) {
                        splitField.options.forEach(option => {
                            const filteredData = form.data.filter(entry => {
                                const fieldValue = entry[splitField.name];
                                if (Array.isArray(fieldValue)) {
                                    return fieldValue.includes(option); // For multi-select
                                }
                                return fieldValue === option; // For single-select
                            });

                            if (filteredData.length > 0) {
                                const headers = form.fields.map(f => f.name);
                                const wsData = [headers];
                                filteredData.forEach(entry => {
                                    const row = form.fields.map(f => {
                                        let value = entry[f.name];
                                        if (Array.isArray(value)) {
                                            return value.join(', '); // Join multi-select options for Excel
                                        }
                                        return value;
                                    });
                                    wsData.push(row);
                                });

                                const ws = XLSX.utils.aoa_to_sheet(wsData);
                                XLSX.utils.book_append_sheet(workBook, ws, `${form.name}-${option}`);
                            }
                        });
                    }
                });
            } else {
                // If no split fields, create a single sheet
                const headers = form.fields.map(f => f.name);
                const wsData = [headers];

                form.data.forEach(entry => {
                    const row = form.fields.map(f => {
                        let value = entry[f.name];
                        if (Array.isArray(value)) {
                            return value.join(', ');
                        }
                        return value;
                    });
                    wsData.push(row);
                });

                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(workBook, ws, form.name);
            }

            // Write and download the workbook
            XLSX.writeFile(workBook, `${form.name}_Data.xlsx`);
        }


        // Function to print current form data
        function printCurrentFormData() {
            if (!editingFormId) {
                alert('لطفاً ابتدا یک فرم را برای مشاهده داده‌ها انتخاب کنید.');
                return;
            }

            const form = forms.find(f => f.id == editingFormId);
            if (!form || form.data.length === 0) {
                alert('داده‌ای برای چاپ در این فرم وجود ندارد.');
                return;
            }

            let printWindow = window.open('', '', 'height=600,width=800');
            printWindow.document.write('<html><head><title>چاپ داده‌های فرم</title>');
            printWindow.document.write('<style>');
            printWindow.document.write(`
                body { font-family: 'Vazirmatn', sans-serif; direction: rtl; text-align: right; margin: 20px; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
                th { background-color: #f2f2f2; font-weight: bold; }
                h1 { color: #2c3e50; }
            `);
            printWindow.document.write('</style>');
            printWindow.document.write('</head><body>');
            printWindow.document.write(`<h1>داده‌های فرم: ${form.name}</h1>`);

            // Create a table for printing
            const tableHTML = document.createElement('table');
            const theadHTML = document.createElement('thead');
            const tbodyHTML = document.createElement('tbody');
            const headerRowHTML = document.createElement('tr');

            form.fields.forEach(field => {
                const th = document.createElement('th');
                th.textContent = field.name;
                headerRowHTML.appendChild(th);
            });
            theadHTML.appendChild(headerRowHTML);
            tableHTML.appendChild(theadHTML);

            form.data.forEach(entry => {
                const dataRowHTML = document.createElement('tr');
                form.fields.forEach(field => {
                    const td = document.createElement('td');
                    let displayValue = entry[field.name];
                    if (Array.isArray(displayValue)) {
                        displayValue = displayValue.join(', ');
                    }
                    td.textContent = displayValue || '';
                    dataRowHTML.appendChild(td);
                });
                tbodyHTML.appendChild(dataRowHTML);
            });
            tableHTML.appendChild(tbodyHTML);

            printWindow.document.write(tableHTML.outerHTML);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
        }

        function fieldTypeToPersian(type) {
            switch (type) {
                case 'text': return 'متن';
                case 'number': return 'عدد';
                case 'nationalId': return 'کد ملی';
                case 'phoneNumber': return 'شماره تماس';
                case 'dropdown-single': return 'کشویی (تک انتخابی)';
                case 'dropdown-multi': return 'کشویی (چند انتخابی)';
                case 'textarea': return 'متن بلند';
                default: return type;
            }
        }

        // Initial render
        renderCurrentFields();
        renderSavedForms();
    </script>
