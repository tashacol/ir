<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جداساز MP4 | آفلاین، مدرن، بدون افت کیفیت</title>
    <!-- طراحی مدرن با تم روشن -->
    <style>
        /* -------------------- ریست پایه و فونت -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }

        /* -------------------- کارت اصلی -------------------- */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 35px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.1), 0 8px 16px rgba(0, 0, 0, 0.06);
        }

        /* -------------------- تیتر و توضیحات -------------------- */
        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* -------------------- آپلود فایل -------------------- */
        .file-upload-area {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 30px 20px;
            transition: all 0.25s;
            margin-bottom: 25px;
            cursor: pointer;
            position: relative;
        }

        .file-upload-area:hover {
            border-color: #4f46e5;
            background: #f1f5f9;
        }

        .file-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-icon {
            font-size: 42px;
            color: #6366f1;
            margin-bottom: 8px;
        }

        .file-upload-text {
            font-size: 15px;
            color: #475569;
            font-weight: 500;
        }

        .file-upload-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }

        .file-name {
            margin-top: 12px;
            font-size: 14px;
            color: #1e293b;
            background: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            word-break: break-word;
        }

        /* -------------------- دکمه‌ها -------------------- */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 10px;
        }

        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.2px;
        }

        .btn:hover:not(:disabled) {
            background: #4338ca;
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        .btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .btn-audio {
            background: #f97316;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .btn-audio:hover:not(:disabled) {
            background: #ea580c;
            box-shadow: 0 6px 16px rgba(249, 115, 22, 0.4);
        }

        .btn-video {
            background: #0ea5e9;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-video:hover:not(:disabled) {
            background: #0284c7;
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
        }

        /* -------------------- وضعیت و خروجی -------------------- */
        #status {
            color: #334155;
            margin: 18px 0 10px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid #4f46e5;
            transition: all 0.2s;
        }

        .output {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #10b981;
            color: white;
            padding: 14px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            width: fit-content;
            margin: 0 auto;
        }

        .download-link:hover {
            background: #059669;
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }

        .download-link.audio-link {
            background: #f97316;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .download-link.audio-link:hover {
            background: #ea580c;
            box-shadow: 0 6px 16px rgba(249, 115, 22, 0.4);
        }

        /* -------------------- ریسپانسیو -------------------- */
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎬 جداساز ویدیو و صدا</h2>
    <p class="subtitle">
        فایل MP4 خود را انتخاب کنید تا بدون افت کیفیت،<br>
        تصویر بی‌صدا و صدای خالص (AAC) را جداگانه دریافت کنید.
    </p>

    <!-- بخش آپلود -->
    <div class="file-upload-area" id="dropArea">
        <div class="file-upload-icon">📁</div>
        <div class="file-upload-text">برای انتخاب فایل کلیک کنید یا فایل را اینجا رها کنید</div>
        <div class="file-upload-hint">فرمت‌های پشتیبانی‌شده: MP4, M4V</div>
        <input type="file" id="fileInput" accept="video/mp4,.mp4">
    </div>
    <div class="file-name" id="fileNameDisplay" style="display: none;"></div>

    <!-- دکمه‌های عملیات -->
    <div class="btn-group">
        <button class="btn btn-audio" id="audioBtn" disabled>
            🎵 استخراج صدا (M4A)
        </button>
        <button class="btn btn-video" id="videoBtn" disabled>
            🎬 استخراج ویدیوی بی‌صدا
        </button>
    </div>

    <!-- وضعیت -->
    <div id="status">فایلی انتخاب نشده</div>

    <!-- لینک‌های دانلود -->
    <div class="output" id="output"></div>
</div>

<script>
    (function() {
        // ---------- DOM Elements ----------
        const fileInput = document.getElementById('fileInput');
        const audioBtn = document.getElementById('audioBtn');
        const videoBtn = document.getElementById('videoBtn');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const dropArea = document.getElementById('dropArea');

        // ---------- Global State ----------
        let originalBuffer = null;   // کل فایل اصلی به صورت ArrayBuffer
        let parsedInfo = null;       // اطلاعات استخراج‌شده از MP4

        // ---------- رویدادهای Drag & Drop برای زیبایی ----------
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        dropArea.addEventListener('dragover', () => dropArea.style.borderColor = '#4f46e5');
        dropArea.addEventListener('dragleave', () => dropArea.style.borderColor = '#cbd5e1');
        dropArea.addEventListener('drop', (e) => {
            dropArea.style.borderColor = '#cbd5e1';
            const dt = e.dataTransfer;
            if (dt.files.length) {
                fileInput.files = dt.files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        // ---------- ابزارهای کمکی خواندن باینری ----------
        const BIG_ENDIAN = false; // false یعنی big-endian

        function readUint32(view, offset) {
            return view.getUint32(offset, BIG_ENDIAN);
        }

        function readUint64(view, offset) {
            const high = view.getUint32(offset, BIG_ENDIAN);
            const low  = view.getUint32(offset + 4, BIG_ENDIAN);
            return high * 0x100000000 + low;
        }

        function readBoxHeader(view, offset) {
            if (offset + 8 > view.byteLength) return null;
            let size = readUint32(view, offset);
            const type = String.fromCharCode(
                view.getUint8(offset + 4),
                view.getUint8(offset + 5),
                view.getUint8(offset + 6),
                view.getUint8(offset + 7)
            );
            let headerSize = 8;
            if (size === 1) {
                if (offset + 16 > view.byteLength) return null;
                const extSize = readUint64(view, offset + 8);
                size = extSize; // عدد ۶۴ بیتی
                headerSize = 16;
            } else if (size === 0) {
                // تا انتهای فایل
                size = view.byteLength - offset;
            }
            return { size, type, headerSize, dataOffset: offset + headerSize };
        }

        // پیدا کردن باکس‌های اصلی سطح بالا: ftyp, moov, mdat
        function findTopLevelBoxes(view) {
            const boxes = {};
            let offset = 0;
            while (offset < view.byteLength) {
                const h = readBoxHeader(view, offset);
                if (!h) break;
                if (h.type === 'ftyp') boxes.ftyp = { offset, size: h.size };
                else if (h.type === 'moov') boxes.moov = { offset, size: h.size };
                else if (h.type === 'mdat') boxes.mdat = { offset, size: h.size };
                offset += h.size;
            }
            return boxes;
        }

        // پیدا کردن یک زیرباکس درون یک باکس والد
        function findSubBox(view, parentOffset, parentSize, targetType) {
            let offset = parentOffset + 8; // رد شدن از هدر باکس والد
            const limit = parentOffset + parentSize;
            while (offset < limit) {
                const h = readBoxHeader(view, offset);
                if (!h) break;
                if (h.type === targetType) {
                    return { offset, size: h.size };
                }
                offset += h.size;
            }
            return null;
        }

        // ---------- استخراج اطلاعات تراک (صدا/تصویر) ----------
        function parseTracks(view, moovOffset, moovSize) {
            const tracks = [];

            // پیدا کردن mvhd برای مقیاس زمانی فیلم (بعداً استفاده می‌شود)
            const mvhdBox = findSubBox(view, moovOffset, moovSize, 'mvhd');
            if (!mvhdBox) throw new Error('mvhd یافت نشد');
            const mvhdView = new DataView(view.buffer, view.byteOffset + mvhdBox.offset, mvhdBox.size);
            const mvhdVersion = mvhdView.getUint8(8);
            let mvhdTimescale, mvhdDuration;
            if (mvhdVersion === 0) {
                mvhdTimescale = mvhdView.getUint32(20, BIG_ENDIAN);
                mvhdDuration   = mvhdView.getUint32(24, BIG_ENDIAN);
            } else {
                mvhdTimescale = mvhdView.getUint32(28, BIG_ENDIAN);
                mvhdDuration  = readUint64(mvhdView, 32);
            }

            // پیمایش تمام trak‌ها
            let pos = moovOffset + 8;
            const limit = moovOffset + moovSize;
            while (pos < limit) {
                const h = readBoxHeader(view, pos);
                if (!h) break;
                if (h.type === 'trak') {
                    const trakOffset = pos;
                    const trakSize = h.size;
                    // --- داخل trak ---
                    const tkhdBox = findSubBox(view, trakOffset, trakSize, 'tkhd');
                    const mdiaBox = findSubBox(view, trakOffset, trakSize, 'mdia');
                    if (!tkhdBox || !mdiaBox) { pos += h.size; continue; }

                    // handler type (soun / vide)
                    const hdlrBox = findSubBox(view, mdiaBox.offset, mdiaBox.size, 'hdlr');
                    if (!hdlrBox) { pos += h.size; continue; }
                    const hdlrDataOffset = hdlrBox.offset + 8;
                    const handlerType = String.fromCharCode(
                        view.getUint8(hdlrDataOffset + 8),
                        view.getUint8(hdlrDataOffset + 9),
                        view.getUint8(hdlrDataOffset + 10),
                        view.getUint8(hdlrDataOffset + 11)
                    );

                    // mdhd برای مقیاس زمانی و duration
                    const mdhdBox = findSubBox(view, mdiaBox.offset, mdiaBox.size, 'mdhd');
                    if (!mdhdBox) { pos += h.size; continue; }
                    const mdhdView = new DataView(view.buffer, view.byteOffset + mdhdBox.offset, mdhdBox.size);
                    const mdhdVersion = mdhdView.getUint8(8);
                    let trackTimescale, trackDurationRaw;
                    if (mdhdVersion === 0) {
                        trackTimescale = mdhdView.getUint32(20, BIG_ENDIAN);
                        trackDurationRaw = mdhdView.getUint32(24, BIG_ENDIAN);
                    } else {
                        trackTimescale = mdhdView.getUint32(28, BIG_ENDIAN);
                        trackDurationRaw = readUint64(mdhdView, 32);
                    }

                    // minf → stbl → stco, stsc, stsz, stts و غیره
                    const minfBox = findSubBox(view, mdiaBox.offset, mdiaBox.size, 'minf');
                    if (!minfBox) { pos += h.size; continue; }

                    const stblBox = findSubBox(view, minfBox.offset, minfBox.size, 'stbl');
                    if (!stblBox) { pos += h.size; continue; }

                    const stsdBox = findSubBox(view, stblBox.offset, stblBox.size, 'stsd');
                    const stscBox = findSubBox(view, stblBox.offset, stblBox.size, 'stsc');
                    const stszBox = findSubBox(view, stblBox.offset, stblBox.size, 'stsz');
                    const sttsBox = findSubBox(view, stblBox.offset, stblBox.size, 'stts');
                    const cttsBox = findSubBox(view, stblBox.offset, stblBox.size, 'ctts');
                    const stcoBox = findSubBox(view, stblBox.offset, stblBox.size, 'stco');
                    const co64Box = findSubBox(view, stblBox.offset, stblBox.size, 'co64');

                    if (!stsdBox || !stscBox || !stszBox || !sttsBox) {
                        // fragmented MP4 یا فایل ناقص
                        pos += h.size;
                        continue;
                    }
                    const chunkOffBox = stcoBox || co64Box;
                    if (!chunkOffBox) { pos += h.size; continue; }

                    // ذخیره اطلاعات ضروری تراک
                    tracks.push({
                        handlerType,          // 'soun' یا 'vide'
                        trakOffset,
                        trakSize,
                        tkhd: tkhdBox,
                        mdia: mdiaBox,
                        mdhd: { offset: mdhdBox.offset, size: mdhdBox.size, timescale: trackTimescale, duration: trackDurationRaw },
                        stsd: stsdBox,
                        stsc: stscBox,
                        stsz: stszBox,
                        stts: sttsBox,
                        ctts: cttsBox,
                        stco: stcoBox,
                        co64: co64Box,
                        chunkOffBox,
                        is64: !!co64Box
                    });
                }
                pos += h.size;
            }

            return {
                tracks,
                mvhd: { offset: mvhdBox.offset, size: mvhdBox.size, timescale: mvhdTimescale, duration: mvhdDuration },
                mvhdVersion
            };
        }

        // ---------- استخراج نمونه‌ها (samples) از یک تراک ----------
        function extractSamples(view, track, mdatOffset) {
            const is64 = track.is64;
            const chunkOffBox = track.chunkOffBox;
            const stscBox = track.stsc;
            const stszBox = track.stsz;

            // خواندن جدول stsc (Sample-to-Chunk)
            const stscView = new DataView(view.buffer, view.byteOffset + stscBox.offset, stscBox.size);
            const stscEntryCount = readUint32(stscView, 12);
            const stscEntries = [];
            for (let i = 0; i < stscEntryCount; i++) {
                const base = 16 + i * 12;
                stscEntries.push({
                    firstChunk: readUint32(stscView, base),
                    samplesPerChunk: readUint32(stscView, base + 4),
                    sampleDescIndex: readUint32(stscView, base + 8)
                });
            }

            // خواندن آفست‌های chunk ها
            const chunkOffView = new DataView(view.buffer, view.byteOffset + chunkOffBox.offset, chunkOffBox.size);
            const chunkCount = readUint32(chunkOffView, 12);
            const chunkOffsets = []; // آرایه‌ای از offset مطلق هر chunk (نسبت به ابتدای فایل)
            for (let i = 0; i < chunkCount; i++) {
                if (is64) {
                    chunkOffsets.push(readUint64(chunkOffView, 16 + i * 8));
                } else {
                    chunkOffsets.push(readUint32(chunkOffView, 16 + i * 4));
                }
            }

            // خواندن اندازه‌ی نمونه‌ها از stsz
            const stszView = new DataView(view.buffer, view.byteOffset + stszBox.offset, stszBox.size);
            const sampleSizeUniform = readUint32(stszView, 12);
            const sampleCount = readUint32(stszView, 16);
            const sampleSizes = [];
            if (sampleSizeUniform !== 0) {
                for (let i = 0; i < sampleCount; i++) sampleSizes.push(sampleSizeUniform);
            } else {
                for (let i = 0; i < sampleCount; i++) {
                    sampleSizes.push(readUint32(stszView, 20 + i * 4));
                }
            }

            // تعیین تعداد نمونه‌های هر chunk با استفاده از stsc
            const chunkSampleCounts = new Array(chunkCount).fill(0);
            let currentSampleIdx = 0;
            let entryIdx = 0;
            for (let chunkIdx = 1; chunkIdx <= chunkCount; chunkIdx++) {
                // پیشروی در stsc تا به ورودی مناسب برسیم
                while (entryIdx < stscEntries.length - 1 && stscEntries[entryIdx + 1].firstChunk <= chunkIdx) {
                    entryIdx++;
                }
                const samplesPerChunk = stscEntries[entryIdx].samplesPerChunk;
                chunkSampleCounts[chunkIdx - 1] = samplesPerChunk;
                currentSampleIdx += samplesPerChunk;
            }

            // حالا نمونه‌ها را به ترتیب می‌سازیم
            const samples = [];
            let sampleOrderIndex = 0;
            for (let ci = 0; ci < chunkCount; ci++) {
                const chunkStartOffset = chunkOffsets[ci];
                const nSamples = chunkSampleCounts[ci];
                let sampleInChunkOffset = 0;
                for (let s = 0; s < nSamples; s++) {
                    if (sampleOrderIndex >= sampleSizes.length) break;
                    const size = sampleSizes[sampleOrderIndex];
                    samples.push({
                        offset: chunkStartOffset + sampleInChunkOffset,
                        size: size
                    });
                    sampleInChunkOffset += size;
                    sampleOrderIndex++;
                }
            }

            return {
                samples,
                chunkOffsets,        // آفست‌های اصلی (مطلق) برای ساخت chunk‌بندی مجدد
                chunkCount,
                is64,
                sampleSizes
            };
        }

        // ---------- ساخت فایل خروجی (ویدیو/صدا) ----------
        function buildSingleTrackFile(originalView, track, info, ftypBox, moovBox, mdatBox) {
            // 1. استخراج نمونه‌ها
            const { samples, chunkOffsets: origChunkOffsets, chunkCount, is64 } = extractSamples(originalView, track, mdatBox.offset);
            if (samples.length === 0) throw new Error('تراک بدون نمونه است');

            // 2. گروه‌بندی نمونه‌ها به chunk های جدید بر اساس offset اصلی
            //    با این روش وابسته به stsc نیستیم و تطابق کامل با نمونه‌ها داریم
            const newChunks = []; // هر عضو: { sampleStartIdx, sampleCount, byteSize }
            let sampleIdx = 0;
            for (let ci = 0; ci < chunkCount; ci++) {
                const chunkStart = origChunkOffsets[ci];
                const startIdx = sampleIdx;
                let byteSize = 0;
                while (sampleIdx < samples.length && samples[sampleIdx].offset < chunkStart + 1e9) { // unlikely to exceed
                    // اگر نمونه بعدی متعلق به chunk بعدی باشد، break
                    if (ci < chunkCount - 1 && samples[sampleIdx].offset >= origChunkOffsets[ci + 1]) {
                        break;
                    }
                    byteSize += samples[sampleIdx].size;
                    sampleIdx++;
                }
                const count = sampleIdx - startIdx;
                if (count > 0) {
                    newChunks.push({ startIdx, count, byteSize });
                }
            }

            // 3. محاسبه offset های جدید برای mdat
            // ساختار فایل خروجی: ftyp | moov | mdat
            const ftypSize = ftypBox.size;
            // ابتدا یک کپی عمیق از trak برای دستکاری
            const trakOriginalBytes = new Uint8Array(originalView.buffer.slice(track.trakOffset, track.trakOffset + track.trakSize));
            // mvhd را هم کپی می‌کنیم و بعد اصلاح می‌کنیم
            const mvhdOriginalBytes = new Uint8Array(originalView.buffer.slice(info.mvhd.offset, info.mvhd.offset + info.mvhd.size));

            // اصلاح mvhd - زمان فیلم
            const mvhdView = new DataView(mvhdOriginalBytes.buffer, mvhdOriginalBytes.byteOffset, mvhdOriginalBytes.byteLength);
            // تبدیل مدت زمان تراک به مقیاس فیلم
            const trackDurationInMovie = Math.round((track.mdhd.duration / track.mdhd.timescale) * info.mvhd.timescale);
            if (info.mvhdVersion === 0) {
                mvhdView.setUint32(24, trackDurationInMovie, BIG_ENDIAN); // duration
                mvhdView.setUint32(32, 2, BIG_ENDIAN); // next_track_id (اختیاری)
            } else {
                const dur = trackDurationInMovie;
                mvhdView.setUint32(32, Math.floor(dur / 0x100000000), BIG_ENDIAN);
                mvhdView.setUint32(36, dur % 0x100000000, BIG_ENDIAN);
                mvhdView.setUint32(40, 2, BIG_ENDIAN); // next_track_id high
                mvhdView.setUint32(44, 0, BIG_ENDIAN); // next_track_id low
            }

            // اصلاح trak: به‌روزرسانی stco/co64 و tkhd duration
            const trakView = new DataView(trakOriginalBytes.buffer, trakOriginalBytes.byteOffset, trakOriginalBytes.byteLength);
            // پیدا کردن offset نسبی stco/co64 داخل trak
            const stcoRelOffset = track.chunkOffBox.offset - track.trakOffset;
            const stcoInTrakView = new DataView(trakOriginalBytes.buffer, trakOriginalBytes.byteOffset + stcoRelOffset, track.chunkOffBox.size);
            const stcoEntryCount = readUint32(stcoInTrakView, 12);

            // محاسبه آفست شروع mdat در فایل جدید
            const newMoovSize = 8 + mvhdOriginalBytes.length + trakOriginalBytes.length;
            const mdatContentStart = ftypSize + newMoovSize + 8; // +8 برای هدر mdat

            // محاسبه offsetهای جدید برای هر chunk
            let cumBytes = 0;
            const newOffsets = [];
            for (let ci = 0; ci < chunkCount; ci++) {
                newOffsets.push(mdatContentStart + cumBytes);
                cumBytes += newChunks[ci].byteSize;
            }
            const mdatDataSize = cumBytes;

            // نوشتن offsetهای جدید در stco/co64
            for (let i = 0; i < stcoEntryCount; i++) {
                const entryOffset = 16 + i * (is64 ? 8 : 4);
                if (is64) {
                    stcoInTrakView.setUint32(entryOffset, Math.floor(newOffsets[i] / 0x100000000), BIG_ENDIAN);
                    stcoInTrakView.setUint32(entryOffset + 4, newOffsets[i] % 0x100000000, BIG_ENDIAN);
                } else {
                    stcoInTrakView.setUint32(entryOffset, newOffsets[i], BIG_ENDIAN);
                }
            }

            // به‌روزرسانی duration در tkhd (اختیاری ولی بهتر)
            const tkhdRelOffset = track.tkhd.offset - track.trakOffset;
            const tkhdView = new DataView(trakOriginalBytes.buffer, trakOriginalBytes.byteOffset + tkhdRelOffset, track.tkhd.size);
            const tkhdVersion = tkhdView.getUint8(8);
            if (tkhdVersion === 0) {
                tkhdView.setUint32(24, track.mdhd.duration, BIG_ENDIAN); // duration در مقیاس mvhd
            } else {
                tkhdView.setUint32(32, Math.floor(track.mdhd.duration / 0x100000000), BIG_ENDIAN);
                tkhdView.setUint32(36, track.mdhd.duration % 0x100000000, BIG_ENDIAN);
            }

            // 4. ساخت moov نهایی
            const moovBuffer = new ArrayBuffer(newMoovSize);
            const moovFinalView = new DataView(moovBuffer);
            moovFinalView.setUint32(0, newMoovSize, BIG_ENDIAN);
            moovFinalView.setUint32(4, 0x6D6F6F76, BIG_ENDIAN); // 'moov'
            let pos = 8;
            new Uint8Array(moovBuffer).set(mvhdOriginalBytes, pos);
            pos += mvhdOriginalBytes.length;
            new Uint8Array(moovBuffer).set(new Uint8Array(trakOriginalBytes.buffer, trakOriginalBytes.byteOffset, trakOriginalBytes.byteLength), pos);
            pos += trakOriginalBytes.length;

            // 5. ساخت mdat جدید
            const mdatTotalSize = 8 + mdatDataSize;
            const mdatBuffer = new ArrayBuffer(mdatTotalSize);
            const mdatDV = new DataView(mdatBuffer);
            mdatDV.setUint32(0, mdatTotalSize, BIG_ENDIAN);
            mdatDV.setUint32(4, 0x6D646174, BIG_ENDIAN); // 'mdat'
            const mdatContent = new Uint8Array(mdatBuffer, 8);
            let mdatWritePos = 0;
            for (const sample of samples) {
                const sampleData = new Uint8Array(originalView.buffer, sample.offset, sample.size);
                mdatContent.set(sampleData, mdatWritePos);
                mdatWritePos += sample.size;
            }

            // 6. کنار هم چیدن فایل نهایی
            const totalFileSize = ftypSize + newMoovSize + mdatTotalSize;
            const finalBuffer = new ArrayBuffer(totalFileSize);
            const finalView = new Uint8Array(finalBuffer);
            // کپی ftyp
            const ftypData = new Uint8Array(originalView.buffer, ftypBox.offset, ftypBox.size);
            finalView.set(ftypData, 0);
            // کپی moov
            finalView.set(new Uint8Array(moovBuffer), ftypSize);
            // کپی mdat
            finalView.set(new Uint8Array(mdatBuffer), ftypSize + newMoovSize);

            return finalBuffer;
        }

        // ---------- روال بارگذاری فایل ----------
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) {
                fileNameDisplay.style.display = 'none';
                return;
            }

            fileNameDisplay.textContent = '📄 ' + file.name;
            fileNameDisplay.style.display = 'inline-block';

            statusDiv.textContent = '⏳ در حال خواندن فایل...';
            outputDiv.innerHTML = '';
            audioBtn.disabled = true;
            videoBtn.disabled = true;

            try {
                // خواندن کل فایل در حافظه
                originalBuffer = await file.arrayBuffer();
                const view = new DataView(originalBuffer);

                // پیدا کردن باکس‌های اصلی
                const boxes = findTopLevelBoxes(view);
                if (!boxes.ftyp || !boxes.moov || !boxes.mdat) {
                    throw new Error('ساختار فایل MP4 معتبر نیست. ftyp، moov یا mdat یافت نشد.');
                }

                // استخراج تراک‌ها و اطلاعات mvhd
                const trackInfo = parseTracks(view, boxes.moov.offset, boxes.moov.size);
                if (trackInfo.tracks.length === 0) {
                    throw new Error('هیچ تراک صوتی یا تصویری در فایل یافت نشد. ممکن است فایل fragmented باشد که پشتیبانی نمی‌شود.');
                }

                // ذخیره اطلاعات برای استفاده بعدی
                parsedInfo = {
                    boxes,
                    trackInfo,
                    view
                };

                // فعال‌سازی دکمه‌ها
                const hasAudio = trackInfo.tracks.some(t => t.handlerType === 'soun');
                const hasVideo = trackInfo.tracks.some(t => t.handlerType === 'vide');

                audioBtn.disabled = !hasAudio;
                videoBtn.disabled = !hasVideo;

                let desc = '✅ فایل بارگذاری شد. ';
                if (hasVideo) desc += '🎬 ویدیو ';
                if (hasAudio) desc += '🎵 صدا (AAC) ';
                desc += 'آمادهٔ استخراج است.';
                statusDiv.textContent = desc;

            } catch (err) {
                statusDiv.textContent = '❌ خطا: ' + err.message;
                console.error(err);
            }
        });

        // ---------- دکمه‌های استخراج ----------
        function onExtract(handlerType) {
            if (!parsedInfo) return;
            const { boxes, trackInfo, view } = parsedInfo;
            const track = trackInfo.tracks.find(t => t.handlerType === handlerType);
            if (!track) {
                statusDiv.textContent = 'تراک مورد نظر وجود ندارد.';
                return;
            }

            statusDiv.textContent = '⏳ در حال استخراج (بدون افت کیفیت)...';
            outputDiv.innerHTML = '';

            try {
                const finalBuf = buildSingleTrackFile(view, track, trackInfo, boxes.ftyp, boxes.moov, boxes.mdat);
                const mimeType = handlerType === 'soun' ? 'audio/mp4' : 'video/mp4';
                const blob = new Blob([finalBuf], { type: mimeType });
                const url = URL.createObjectURL(blob);
                // برای صدا از پسوند m4a استفاده می‌کنیم (استاندارد)
                const ext = handlerType === 'soun' ? 'm4a' : 'mp4';
                const label = handlerType === 'soun'
                    ? '🎵 دانلود صدا (AAC/M4A)'
                    : '🎬 دانلود ویدیوی بی‌صدا';
                const a = document.createElement('a');
                a.href = url;
                a.download = `extracted_${handlerType}.${ext}`;
                a.className = 'download-link' + (handlerType === 'soun' ? ' audio-link' : '');
                a.textContent = label;
                outputDiv.appendChild(a);
                statusDiv.textContent = `✅ فایل ${ext.toUpperCase()} با موفقیت آماده شد.`;
            } catch (err) {
                statusDiv.textContent = '❌ خطا در استخراج: ' + err.message;
                console.error(err);
            }
        }

        audioBtn.addEventListener('click', () => onExtract('soun'));
        videoBtn.addEventListener('click', () => onExtract('vide'));

    })();
</script>
</body>
</html>
