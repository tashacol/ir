<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجله ساز</title>
    <style>
        /* ========== استایل کلی بیلدر ========== */
        :root {
            --builder-bg: #f4f2ed;
            --panel-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-medium: #333;
            --accent-red: #8b1a1a;
            --accent-gold: #8b6914;
            --accent-navy: #0f1a2a;
            --border-light: #e0dbd0;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --font-ui: 'Tahoma', 'Arial', sans-serif;
            --transition: 0.2s ease;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:var(--builder-bg);
            font-family:var(--font-ui);
            color:var(--text-dark);
            direction:rtl;
            height:100vh;
            overflow:hidden;
        }
        .builder-header{
            background:var(--accent-navy);
            color:#fff;
            padding:10px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:8px;
            box-shadow:var(--shadow-md);
            z-index:100;
            position:relative;
        }
        .builder-title{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:6px;}
        .btn{
            padding:8px 14px;
            border:none;
            border-radius:4px;
            font-weight:600;
            cursor:pointer;
            font-size:0.75rem;
            background:var(--accent-gold);
            color:#fff;
            white-space:nowrap;
            transition:var(--transition);
            margin:2px;
            font-family:var(--font-ui);
        }
        .btn-outline{background:transparent;border:2px solid #fff;color:#fff;}
        .btn:hover{opacity:0.9;transform:translateY(-1px);}
        .btn-sm{padding:4px 10px;font-size:0.7rem;}
        .btn-danger{background:#c0392b;}
        .btn-secondary{background:#555;}
        .main-container{display:flex;height:calc(100vh - 56px);}
        .panel{
            width:440px;
            background:var(--panel-bg);
            border-left:1px solid var(--border-light);
            display:flex;
            flex-direction:column;
            transition:all 0.3s;
        }
        .panel-header{
            padding:14px 16px;
            border-bottom:1px solid var(--border-light);
            font-weight:800;
            font-size:0.85rem;
            background:#fafaf8;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .panel-body{
            flex:1;
            overflow-y:auto;
            padding:12px;
            -webkit-overflow-scrolling:touch;
        }
        .preview-area{
            flex:1;
            background:#e8e4da;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:12px;
        }
        .preview-iframe{
            width:100%;
            height:100%;
            border:none;
            background:white;
            box-shadow:var(--shadow-md);
            border-radius:4px;
        }
        .tab-bar{
            display:none;
            background:#fff;
            border-bottom:1px solid var(--border-light);
        }
        .tab-bar button{
            flex:1;
            padding:12px;
            border:none;
            background:none;
            font-weight:700;
            cursor:pointer;
            border-bottom:3px solid transparent;
        }
        .tab-bar button.active{border-bottom-color:var(--accent-red);color:var(--accent-red);}
        .form-group{margin-bottom:10px;}
        .form-group label{display:block;font-size:0.7rem;font-weight:700;margin-bottom:3px;color:var(--text-medium);}
        .form-group input,.form-group select,.form-group textarea{
            width:100%;
            padding:8px;
            border:1px solid #ccc;
            border-radius:4px;
            font-family:var(--font-ui);
            font-size:0.8rem;
        }
        .section-list{list-style:none;margin-top:8px;}
        .section-list li{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#f9f9f6;
            border:1px solid #e0dbd0;
            border-radius:4px;
            padding:10px 12px;
            margin-bottom:6px;
            cursor:pointer;
            transition:var(--transition);
            user-select:none;
        }
        .section-list li.dragging{opacity:0.5;}
        .drag-handle{
            cursor:grab;
            margin-left:8px;
            font-size:1.2rem;
            color:#888;
        }
        .item-card{
            background:#fff;
            border:1px solid #ddd;
            border-radius:4px;
            padding:10px;
            margin-bottom:8px;
            font-size:0.7rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
            user-select:none;
        }
        .item-card.dragging{opacity:0.4;}
        .item-info{flex:1;min-width:150px;}
        .upload-area{display:flex;align-items:center;gap:8px;margin:8px 0;flex-wrap:wrap;}
        .preview-box{
            width:44px;height:44px;
            background:var(--accent-navy);
            border-radius:4px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            overflow:hidden;
            flex-shrink:0;
        }
        .preview-box img{width:100%;height:100%;object-fit:cover;}
        hr{margin:16px 0;border:0;border-top:1px solid #ddd;}
        h4{margin:12px 0 8px;font-size:0.9rem;}
        h5{margin:10px 0 6px;font-size:0.8rem;color:#555;}
        .checkbox-group{display:flex;align-items:center;gap:6px;margin:4px 0;}
        .url-input-group{margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
        .url-input-group input{flex:1;min-width:180px;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.75rem;font-family:var(--font-ui);}
        .url-input-group .or-divider{font-size:0.7rem;color:#888;margin:0 4px;}

        @media (max-width: 768px){
            .main-container{flex-direction:column;}
            .panel{width:100%;height:50%;}
            .preview-area{height:50%;}
            .tab-bar{display:flex;}
        }
        @media (min-width: 769px){
            .mobile-only{display:none;}
        }
    </style>
</head>
<body>
    <div class="builder-header">
        <div class="builder-title">📰 مجله‌ساز چشم‌انداز</div>
        <div>
            <button class="btn btn-outline" onclick="switchTab('edit')">⚙️ ویرایش</button>
            <button class="btn btn-outline" onclick="switchTab('preview')">👁️ پیش‌نمایش</button>
            <button class="btn" onclick="downloadMagazine()">⬇️ خروجی HTML</button>
            <button class="btn" onclick="exportProject()">💾 ذخیره پروژه</button>
            <button class="btn" onclick="document.getElementById('importFile').click()">📂 بارگذاری</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProject(event)">
        </div>
    </div>

    <div class="tab-bar" id="tabBar">
        <button class="active" onclick="switchTab('edit')">⚙️ ویرایش</button>
        <button onclick="switchTab('preview')">👁️ پیش‌نمایش</button>
    </div>

    <div class="main-container">
        <div class="panel" id="editPanel">
            <div class="panel-header">
                <span>تنظیمات و محتوا</span>
                <button class="btn btn-sm btn-secondary" onclick="resetAll()">🔄 بازنشانی</button>
            </div>
            <div class="panel-body" id="panelContent"></div>
        </div>
        <div class="preview-area" id="previewArea">
            <iframe class="preview-iframe" id="previewFrame" title="پیش‌نمایش"></iframe>
        </div>
    </div>

    <script>
        // ==================== داده‌های اولیه ====================
        const defaultData = {
            info: {
                date: "۲۶ اردیبهشت ۱۴۰۵",
                issue: "۴۲۷",
                year: "هجدهم",
                title: "چشم‌انداز",
                subtitle: "هفته‌نامه تحلیلی ـ خبری",
                owner: "دکتر محمدرضا کریمی",
                manager: "سارا احمدی",
                editor: "علی رضویان",
                editorNote: "خوانندگان عزیز، در این شماره به تحلیل آخرین تحولات منطقه پرداخته‌ایم...",
                fontBase64: "",
                logoBase64: "",
                logoUrl: "",
                quote: "روزنامه‌نگاری حرفه‌ای، نخستین سنگر دفاع از حقیقت در برابر طوفان شایعه است.",
                address: "تهران، خیابان انقلاب، ساختمان مطبوعات",
                phone: "۰۲۱-۲۲۸۴xxxx",
                email: "info@cheshmandaz.ir",
                social: [
                    { name: "تلگرام", url: "https://t.me/cheshmandaz" },
                    { name: "اینستاگرام", url: "https://instagram.com/cheshmandaz" }
                ]
            },
            sections: [
                {
                    id: "s1",
                    title: "📰 تیترهای داغ",
                    type: "grid",
                    items: [
                        { id:"i1", category: "اقتصادی", title: "رشد ۴.۲ درصدی تولید ناخالص داخلی", image: "", detail: "جزئیات بیشتر درباره رشد اقتصادی و تأثیر آن بر بازار...", reporter: "مریم حسینی", showInTicker: true, isHighlight: true },
                        { id:"i2", category: "فناوری", title: "استارتاپ‌های ایرانی در مسیر جهانی", image: "", detail: "داستان موفقیت استارتاپ‌ها در جذب سرمایه...", reporter: "امیر سعیدی", showInTicker: true, isHighlight: false },
                        { id:"i3", category: "ورزشی", title: "صعود تاریخی تیم ملی فوتبال", image: "", detail: "گزارش کامل بازی و حواشی آن...", reporter: "پیمان رضایی", showInTicker: false, isHighlight: true }
                    ]
                },
                {
                    id: "s2",
                    title: "🏛 سیاسی",
                    type: "2col",
                    items: [
                        { id:"i4", category: "دیپلماسی", title: "نشست مشترک وزرای خارجه", image: "", detail: "توافق‌های جدید در حوزه امنیت منطقه‌ای...", reporter: "زهرا کریمی", showInTicker: true, isHighlight: false },
                        { id:"i5", category: "مجلس", title: "تصویب طرح اصلاح بودجه", image: "", detail: "جزئیات مصوبه و تأثیر آن بر اقتصاد...", reporter: "علی نوری", showInTicker: false, isHighlight: false }
                    ]
                }
            ]
        };

        let magazineData = JSON.parse(JSON.stringify(defaultData));

        // ==================== توابع فشرده‌سازی تصویر ====================
        async function loadImageFromFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = reader.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function canvasToBlob(canvas, type, quality) {
            return new Promise(resolve => canvas.toBlob(resolve, type, quality));
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function compressImageFile(file, maxKB = 150) {
            const img = await loadImageFromFile(file);
            const origW = img.naturalWidth, origH = img.naturalHeight;
            const maxBytes = maxKB * 1024;
            const MIN_DIM = 1200, MAX_DIM = 1600;

            let w = origW, h = origH;
            if (Math.max(origW, origH) > MAX_DIM) {
                const scale = MAX_DIM / Math.max(origW, origH);
                w = Math.round(origW * scale);
                h = Math.round(origH * scale);
            }

            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = w; canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);

            let quality = 0.65;
            let blob = await canvasToBlob(canvas, 'image/jpeg', quality);

            while (blob.size > maxBytes && quality > 0.3) {
                quality -= 0.02;
                blob = await canvasToBlob(canvas, 'image/jpeg', quality);
            }

            let resizeAttempts = 0;
            while (blob.size > maxBytes && (w > MIN_DIM || h > MIN_DIM) && resizeAttempts < 6) {
                const newW = Math.max(MIN_DIM, Math.round(w * 0.9));
                const newH = Math.round(h * (newW / w));
                w = newW; h = newH;
                canvas = document.createElement('canvas');
                ctx = canvas.getContext('2d');
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                blob = await canvasToBlob(canvas, 'image/jpeg', quality);
                resizeAttempts++;
            }

            if (blob.size > maxBytes && quality > 0.25) {
                quality = 0.25;
                blob = await canvasToBlob(canvas, 'image/jpeg', quality);
            }
            if (blob.size > maxBytes) {
                quality = 0.2;
                blob = await canvasToBlob(canvas, 'image/jpeg', quality);
            }

            return await blobToBase64(blob);
        }

        // ==================== localStorage ====================
        function saveToStorage() {
            try { localStorage.setItem('magazineBuilderData_v2', JSON.stringify(magazineData)); } catch(e) {}
        }
        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('magazineBuilderData_v2');
                if (saved) magazineData = JSON.parse(saved);
            } catch(e) {
                magazineData = JSON.parse(JSON.stringify(defaultData));
            }
        }

        // ==================== رندر اصلی ====================
        function renderEditor() {
            const container = document.getElementById('panelContent');
            const d = magazineData.info;
            let html = '';

            html += `<div class="form-group"><label>📅 تاریخ انتشار</label><input id="inpDate" value="${escHtml(d.date)}"></div>`;
            html += `<div class="form-group"><label>📋 شماره</label><input id="inpIssue" value="${escHtml(d.issue)}"></div>`;
            html += `<div class="form-group"><label>📌 سال</label><input id="inpYear" value="${escHtml(d.year)}"></div>`;
            html += `<div class="form-group"><label>🏷️ عنوان نشریه</label><input id="inpTitle" value="${escHtml(d.title)}"></div>`;
            html += `<div class="form-group"><label>📝 زیرعنوان</label><input id="inpSubtitle" value="${escHtml(d.subtitle)}"></div>`;
            html += `<div class="form-group"><label>👤 صاحب امتیاز</label><input id="inpOwner" value="${escHtml(d.owner)}"></div>`;
            html += `<div class="form-group"><label>👤 مدیر مسئول</label><input id="inpManager" value="${escHtml(d.manager)}"></div>`;
            html += `<div class="form-group"><label>✒️ سردبیر</label><input id="inpEditor" value="${escHtml(d.editor)}"></div>`;
            html += `<div class="form-group"><label>✍️ سخن سردبیر</label><textarea id="inpEditorNote" rows="3">${escHtml(d.editorNote || '')}</textarea></div>`;
            html += `<div class="form-group"><label>💬 شعار / نقل‌قول هفته</label><input id="inpQuote" value="${escHtml(d.quote)}"></div>`;
            html += `<div class="form-group"><label>🏢 آدرس</label><input id="inpAddress" value="${escHtml(d.address)}"></div>`;
            html += `<div class="form-group"><label>📞 تلفن</label><input id="inpPhone" value="${escHtml(d.phone)}"></div>`;
            html += `<div class="form-group"><label>📧 ایمیل</label><input id="inpEmail" value="${escHtml(d.email)}"></div>`;
            html += `<div class="form-group"><label>🌐 شبکه‌های اجتماعی (نام,آدرس - هر خط یک مورد)</label>
                <textarea id="inpSocial" rows="3">${d.social.map(s => s.name + ',' + s.url).join('\n')}</textarea></div>`;
            html += `<div class="form-group"><label>🔤 فونت (فایل ttf/woff)</label>
                <div class="upload-area">
                    <span style="font-size:0.75rem;">${d.fontBase64 ? '✅ فونت بارگذاری شد' : 'فونتی انتخاب نشده'}</span>
                    <input type="file" id="fontUpload" accept=".ttf,.woff,.woff2" style="display:none">
                    <button class="btn btn-sm" onclick="document.getElementById('fontUpload').click()">بارگذاری</button>
                    ${d.fontBase64 ? '<button class="btn btn-sm btn-danger" onclick="removeFont()">حذف</button>' : ''}
                </div>
            </div>`;
            html += `<div class="form-group"><label>🖼️ لوگو</label>
                <div class="upload-area">
                    <div class="preview-box" id="logoPreview">${d.logoBase64 ? `<img src="${d.logoBase64}">` : (d.logoUrl ? `<img src="${escHtml(d.logoUrl)}" onerror="this.style.display='none';this.parentElement.textContent='❌';">` : 'چ')}</div>
                    <input type="file" id="logoUpload" accept="image/*" style="display:none">
                    <button class="btn btn-sm" onclick="document.getElementById('logoUpload').click()">📁 بارگذاری فایل</button>
                    ${(d.logoBase64 || d.logoUrl) ? '<button class="btn btn-sm btn-danger" onclick="removeLogo()">حذف</button>' : ''}
                </div>
                <div class="url-input-group">
                    <span style="font-size:0.7rem;color:#888;">یا</span>
                    <input type="text" id="inpLogoUrl" placeholder="آدرس اینترنتی لوگو (مثلاً https://...)" value="${escHtml(d.logoUrl || '')}" style="flex:1;min-width:180px;">
                    <span style="font-size:0.65rem;color:#888;">🔗 لینک تصویر</span>
                </div>
            </div>`;
            html += `<hr><h4>📂 بخش‌های مجله</h4><ul class="section-list" id="sectionList">`;
            magazineData.sections.forEach((sec, index) => {
                html += `<li draggable="true" data-index="${index}" ondragstart="handleSectionDragStart(event)" ondragover="handleSectionDragOver(event)" ondrop="handleSectionDrop(event)" ondragend="handleSectionDragEnd(event)">
                    <span class="drag-handle">⠿</span>
                    <span style="flex:1"><strong>${escHtml(sec.title)}</strong> (${sec.type}) - ${sec.items.length} آیتم</span>
                    <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();editSection('${sec.id}')">✏️</button>
                    <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteSection('${sec.id}')">✕</button>
                </li>`;
            });
            html += `</ul><button class="btn" onclick="addSection()">➕ افزودن بخش جدید</button>`;
            container.innerHTML = html;
            bindInfoEvents();
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function bindInfoEvents() {
            const bind = (id, prop) => {
                const el = document.getElementById(id);
                if (el) el.oninput = e => { magazineData.info[prop] = e.target.value; saveAndUpdate(); };
            };
            bind('inpDate', 'date');
            bind('inpIssue', 'issue');
            bind('inpYear', 'year');
            bind('inpTitle', 'title');
            bind('inpSubtitle', 'subtitle');
            bind('inpOwner', 'owner');
            bind('inpManager', 'manager');
            bind('inpEditor', 'editor');
            bind('inpQuote', 'quote');
            bind('inpAddress', 'address');
            bind('inpPhone', 'phone');
            bind('inpEmail', 'email');

            const editorNoteEl = document.getElementById('inpEditorNote');
            if (editorNoteEl) editorNoteEl.oninput = function() {
                magazineData.info.editorNote = this.value;
                saveAndUpdate();
            };

            const socialEl = document.getElementById('inpSocial');
            if (socialEl) socialEl.oninput = function() {
                magazineData.info.social = this.value.split('\n').filter(line => line.trim()).map(line => {
                    const parts = line.split(',');
                    return { name: (parts[0]||'').trim(), url: (parts[1]||'').trim() };
                });
                saveAndUpdate();
            };

            const fontUpload = document.getElementById('fontUpload');
            if (fontUpload) fontUpload.onchange = handleFontUpload;
            const logoUpload = document.getElementById('logoUpload');
            if (logoUpload) logoUpload.onchange = handleLogoUpload;

            const logoUrlEl = document.getElementById('inpLogoUrl');
            if (logoUrlEl) {
                logoUrlEl.oninput = function() {
                    const newUrl = this.value.trim();
                    magazineData.info.logoUrl = newUrl;
                    if (newUrl) {
                        magazineData.info.logoBase64 = '';
                        const logoPreview = document.getElementById('logoPreview');
                        if (logoPreview) {
                            logoPreview.innerHTML = `<img src="${escHtml(newUrl)}" onerror="this.style.display='none';this.parentElement.textContent='❌';">`;
                        }
                    }
                    saveAndUpdate();
                };
            }
        }

        function saveAndUpdate() {
            saveToStorage();
            updatePreview();
        }

        // ==================== مدیریت فونت و لوگو ====================
        function handleFontUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                magazineData.info.fontBase64 = ev.target.result;
                saveAndUpdate();
                renderEditor();
            };
            reader.readAsDataURL(file);
        }
        function removeFont() {
            magazineData.info.fontBase64 = "";
            saveAndUpdate();
            renderEditor();
        }
        function handleLogoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                magazineData.info.logoBase64 = ev.target.result;
                magazineData.info.logoUrl = '';
                const logoUrlEl = document.getElementById('inpLogoUrl');
                if (logoUrlEl) logoUrlEl.value = '';
                const logoPreview = document.getElementById('logoPreview');
                if (logoPreview) {
                    logoPreview.innerHTML = `<img src="${ev.target.result}">`;
                }
                saveAndUpdate();
                renderEditor();
            };
            reader.readAsDataURL(file);
        }
        function removeLogo() {
            magazineData.info.logoBase64 = "";
            magazineData.info.logoUrl = "";
            const logoUrlEl = document.getElementById('inpLogoUrl');
            if (logoUrlEl) logoUrlEl.value = '';
            saveAndUpdate();
            renderEditor();
        }

        // ==================== Drag & Drop بخش‌ها ====================
        let draggedSectionIndex = -1;

        function handleSectionDragStart(e) {
            draggedSectionIndex = parseInt(e.target.closest('li').dataset.index);
            e.target.closest('li').classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleSectionDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const li = e.target.closest('li');
            if (li && !li.classList.contains('dragging')) {
                li.style.background = '#e8f0fe';
            }
        }

        function handleSectionDrop(e) {
            e.preventDefault();
            const li = e.target.closest('li');
            if (li) {
                li.style.background = '';
                const targetIndex = parseInt(li.dataset.index);
                if (draggedSectionIndex >= 0 && targetIndex >= 0 && draggedSectionIndex !== targetIndex) {
                    const movedSection = magazineData.sections.splice(draggedSectionIndex, 1)[0];
                    magazineData.sections.splice(targetIndex, 0, movedSection);
                    saveAndUpdate();
                    renderEditor();
                }
            }
            draggedSectionIndex = -1;
        }

        function handleSectionDragEnd(e) {
            document.querySelectorAll('.section-list li').forEach(li => {
                li.classList.remove('dragging');
                li.style.background = '';
            });
            draggedSectionIndex = -1;
        }

        // ==================== عملیات بخش‌ها ====================
        function addSection() {
            const title = prompt("عنوان بخش جدید (مثلاً: 🕌 مذهبی)");
            if (!title) return;
            const type = prompt("نوع نمایش: grid (شبکه‌ای) / 2col (دو ستونه) / interview (گفتگو)", "grid");
            magazineData.sections.push({
                id: 's' + Date.now(),
                title: title,
                type: type || 'grid',
                items: []
            });
            saveAndUpdate();
            renderEditor();
        }

        function deleteSection(id) {
            if (!confirm('این بخش و تمام آیتم‌هایش حذف شود؟')) return;
            magazineData.sections = magazineData.sections.filter(s => s.id !== id);
            saveAndUpdate();
            renderEditor();
        }

        function editSection(id) {
            window._currentEditingSectionId = id;
            const section = magazineData.sections.find(s => s.id === id);
            if (!section) return;
            const container = document.getElementById('panelContent');
            let html = `<h4>ویرایش بخش: ${escHtml(section.title)}</h4>`;
            html += `<div class="form-group"><label>عنوان بخش</label><input id="editSecTitle" value="${escHtml(section.title)}"></div>`;
            html += `<div class="form-group"><label>نوع نمایش</label><select id="editSecType">
                <option value="grid" ${section.type==='grid'?'selected':''}>شبکه‌ای (grid)</option>
                <option value="2col" ${section.type==='2col'?'selected':''}>دو ستونه (2col)</option>
                <option value="interview" ${section.type==='interview'?'selected':''}>گفتگو (interview)</option>
            </select></div>`;

            html += `<h5>آیتم‌های این بخش (${section.items.length})</h5>`;
            if (section.items.length === 0) {
                html += `<p style="color:#888;font-size:0.75rem;">هنوز آیتمی اضافه نشده</p>`;
            } else {
                html += `<ul style="list-style:none;padding:0;" id="itemsSortable">`;
                section.items.forEach((item, i) => {
                    const imgStatus = item.image ? (item.image.startsWith('http') ? '🌐 لینک تصویر' : '📷 تصویر آپلودی') : 'بدون تصویر';
                    html += `<li class="item-card" draggable="true" data-item-index="${i}" style="display:flex; align-items:center;">
                        <span class="drag-handle" style="cursor:grab; margin-left:6px;">⠿</span>
                        <div class="item-info">
                            <strong>${escHtml(item.category || 'بدون دسته')}</strong><br>
                            ${escHtml(item.title)}<br>
                            <small style="color:#888;">
                                ${item.reporter ? '✍️ ' + escHtml(item.reporter) + ' | ' : ''}
                                ${item.detail ? 'دارای توضیحات' : 'بدون توضیح'} |
                                ${imgStatus} |
                                تیکر: ${item.showInTicker ? '✅' : '❌'} |
                                مهم: ${item.isHighlight ? '⭐' : '❌'}
                            </small>
                        </div>
                        <button class="btn btn-sm btn-secondary" onclick="editItem('${section.id}', ${i})">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteItem('${section.id}', ${i})">🗑️</button>
                    </li>`;
                });
                html += `</ul>`;
                setTimeout(() => {
                    const sortable = document.getElementById('itemsSortable');
                    if (sortable) {
                        const items = sortable.querySelectorAll('.item-card');
                        items.forEach(item => {
                            item.addEventListener('dragstart', handleItemDragStart);
                            item.addEventListener('dragover', handleItemDragOver);
                            item.addEventListener('drop', handleItemDrop);
                            item.addEventListener('dragend', handleItemDragEnd);
                        });
                    }
                }, 0);
            }

            html += `<button class="btn" onclick="showAddItemForm('${section.id}')">➕ افزودن آیتم جدید</button>`;
            html += `<br><button class="btn btn-sm btn-secondary" style="margin-top:12px;" onclick="renderEditor();updatePreview();">🔙 بازگشت به لیست بخش‌ها</button>`;
            container.innerHTML = html;

            document.getElementById('editSecTitle').oninput = function(e) {
                section.title = e.target.value;
                saveAndUpdate();
            };
            document.getElementById('editSecType').onchange = function(e) {
                section.type = e.target.value;
                saveAndUpdate();
            };
        }

        // ==================== Drag & Drop آیتم‌ها ====================
        let draggedItemIndex = -1;
        let draggedItemSectionId = null;

        function handleItemDragStart(e) {
            const li = e.target.closest('li.item-card');
            draggedItemIndex = parseInt(li.dataset.itemIndex);
            draggedItemSectionId = window._currentEditingSectionId;
            li.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleItemDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const li = e.target.closest('li.item-card');
            if (li && !li.classList.contains('dragging')) {
                li.style.background = '#eef5ff';
            }
        }

        function handleItemDrop(e) {
            e.preventDefault();
            const li = e.target.closest('li.item-card');
            if (li) {
                li.style.background = '';
                const targetIndex = parseInt(li.dataset.itemIndex);
                if (draggedItemIndex >= 0 && targetIndex >= 0 && draggedItemIndex !== targetIndex && draggedItemSectionId) {
                    const section = magazineData.sections.find(s => s.id === draggedItemSectionId);
                    if (section) {
                        const movedItem = section.items.splice(draggedItemIndex, 1)[0];
                        section.items.splice(targetIndex, 0, movedItem);
                        saveAndUpdate();
                        editSection(draggedItemSectionId);
                    }
                }
            }
            draggedItemIndex = -1;
            draggedItemSectionId = null;
        }

        function handleItemDragEnd(e) {
            document.querySelectorAll('.item-card').forEach(card => {
                card.classList.remove('dragging');
                card.style.background = '';
            });
        }

        function showAddItemForm(sectionId, editIndex = -1) {
            const section = magazineData.sections.find(s => s.id === sectionId);
            if (!section) return;
            window._currentEditingSectionId = sectionId;

            const isEdit = editIndex >= 0;
            const item = isEdit ? section.items[editIndex] : null;
            const container = document.getElementById('panelContent');
            let html = `<h4>${isEdit ? 'ویرایش' : 'افزودن'} آیتم در «${escHtml(section.title)}»</h4>`;
            html += `<div class="form-group"><label>دسته‌بندی</label><input id="newCat" value="${isEdit ? escHtml(item.category) : ''}" placeholder="مثلاً: سیاسی"></div>`;
            html += `<div class="form-group"><label>عنوان *</label><input id="newTitle" value="${isEdit ? escHtml(item.title) : ''}" placeholder="عنوان خبر یا گزارش"></div>`;
            html += `<div class="form-group"><label>نام خبرنگار / گزارشگر</label><input id="newReporter" value="${isEdit ? escHtml(item.reporter || '') : ''}" placeholder="مثلاً: علی رضویان"></div>`;
            html += `<div class="form-group"><label>توضیحات (با کلیک نمایش داده می‌شود)</label><textarea id="newDetail" rows="3" placeholder="متن کامل خبر...">${isEdit ? escHtml(item.detail) : ''}</textarea></div>`;
            
            const existingImage = isEdit ? (item.image || '') : '';
            const existingIsUrl = existingImage.startsWith('http');
            
            html += `<div class="form-group"><label>🖼️ تصویر</label>
                <div class="upload-area">
                    <input type="file" id="newImageFile" accept="image/*" style="display:none">
                    <button class="btn btn-sm" onclick="document.getElementById('newImageFile').click()">📁 بارگذاری فایل</button>
                    <span id="imgStatus" style="font-size:0.7rem;">${existingImage ? (existingIsUrl ? '🌐 لینک تصویر موجود' : '✅ تصویر آپلودی موجود') : 'تصویری انتخاب نشده'}</span>
                    <span id="imgCompressing" style="display:none; color:#888;"> در حال فشرده‌سازی...</span>
                </div>
                <div class="url-input-group">
                    <span style="font-size:0.7rem;color:#888;">یا</span>
                    <input type="text" id="newImageUrl" placeholder="آدرس اینترنتی تصویر (مثلاً https://...)" value="${existingIsUrl ? escHtml(existingImage) : ''}" style="flex:1;min-width:180px;">
                    <span style="font-size:0.65rem;color:#888;">🔗 لینک تصویر</span>
                </div>
                <small style="color:#888;font-size:0.62rem;">💡 با استفاده از لینک، حجم خروجی HTML کاهش می‌یابد. در صورت وارد کردن لینک، اولویت با لینک است.</small>
            </div>`;
            html += `<div class="checkbox-group"><input type="checkbox" id="chkTicker" ${isEdit && item.showInTicker ? 'checked' : ''}> <label for="chkTicker">نمایش در تیکر بالای صفحه</label></div>`;
            html += `<div class="checkbox-group"><input type="checkbox" id="chkHighlight" ${isEdit && item.isHighlight ? 'checked' : ''}> <label for="chkHighlight">نمایش در بخش «مهمترین اخبار»</label></div>`;
            html += `<button class="btn" onclick="saveItem('${sectionId}', ${editIndex})">✅ ذخیره</button>`;
            html += `<button class="btn btn-sm btn-secondary" onclick="editSection('${sectionId}')">لغو</button>`;

            container.innerHTML = html;

            let tempImg = existingImage;
            document.getElementById('newImageFile').onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                document.getElementById('imgStatus').style.display = 'none';
                document.getElementById('imgCompressing').style.display = 'inline';
                try {
                    const compressed = await compressImageFile(file, 150);
                    tempImg = compressed;
                    document.getElementById('imgCompressing').style.display = 'none';
                    document.getElementById('imgStatus').textContent = '✅ تصویر فشرده شد';
                    document.getElementById('imgStatus').style.display = 'inline';
                    const urlEl = document.getElementById('newImageUrl');
                    if (urlEl) urlEl.value = '';
                } catch (err) {
                    document.getElementById('imgCompressing').style.display = 'none';
                    document.getElementById('imgStatus').textContent = '❌ خطا در فشرده‌سازی';
                    document.getElementById('imgStatus').style.display = 'inline';
                }
            };
            
            const urlInput = document.getElementById('newImageUrl');
            if (urlInput) {
                urlInput.oninput = function() {
                    const urlVal = this.value.trim();
                    if (urlVal) {
                        tempImg = urlVal;
                        document.getElementById('imgStatus').textContent = '🌐 لینک تصویر تنظیم شد';
                        document.getElementById('imgStatus').style.display = 'inline';
                    } else if (!existingIsUrl) {
                        tempImg = existingImage;
                        document.getElementById('imgStatus').textContent = existingImage ? '✅ تصویر آپلودی موجود' : 'تصویری انتخاب نشده';
                        document.getElementById('imgStatus').style.display = 'inline';
                    }
                };
            }
            
            window._tempImg = () => tempImg;
        }

        function saveItem(sectionId, editIndex) {
            const section = magazineData.sections.find(s => s.id === sectionId);
            if (!section) return;
            const title = document.getElementById('newTitle')?.value?.trim();
            if (!title) { alert('عنوان اجباری است!'); return; }
            const category = document.getElementById('newCat')?.value?.trim() || '';
            const reporter = document.getElementById('newReporter')?.value?.trim() || '';
            const detail = document.getElementById('newDetail')?.value?.trim() || '';
            
            const imageUrlInput = document.getElementById('newImageUrl');
            const imageUrl = imageUrlInput ? imageUrlInput.value.trim() : '';
            const image = imageUrl || (window._tempImg ? window._tempImg() : '');
            
            const showInTicker = document.getElementById('chkTicker')?.checked || false;
            const isHighlight = document.getElementById('chkHighlight')?.checked || false;

            const itemData = { category, title, reporter, detail, image, showInTicker, isHighlight };

            if (editIndex >= 0) {
                itemData.id = section.items[editIndex].id;
                section.items[editIndex] = itemData;
            } else {
                itemData.id = 'i' + Date.now();
                section.items.push(itemData);
            }

            saveAndUpdate();
            editSection(sectionId);
        }

        function editItem(sectionId, index) {
            showAddItemForm(sectionId, index);
        }

        function deleteItem(sectionId, index) {
            if (!confirm('آیا از حذف این آیتم مطمئن هستید؟')) return;
            const section = magazineData.sections.find(s => s.id === sectionId);
            if (!section) return;
            section.items.splice(index, 1);
            saveAndUpdate();
            editSection(sectionId);
        }
