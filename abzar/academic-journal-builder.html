<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه تولید نشریه دانشگاهی</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Tahoma', 'B Nazanin', 'Yekan', 'Arial', sans-serif;
            background: #eceff4;
            padding: 30px 20px;
            line-height: 1.8;
            color: #1a1a1a;
            direction: rtl;
        }
        .main-container {
            max-width: 980px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #cbd2d9;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            padding: 35px 40px;
        }
        h1 {
            font-size: 1.7rem;
            font-weight: bold;
            color: #0b2b44;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #b49450;
            text-align: center;
        }
        h2 {
            font-size: 1.25rem;
            color: #0b2b44;
            margin: 35px 0 16px;
            padding-right: 10px;
            border-right: 4px solid #b49450;
            font-weight: bold;
        }
        h3 {
            font-size: 1.1rem;
            color: #1e3a5f;
            margin: 20px 0 10px;
            font-weight: bold;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #2c3e50;
            font-size: 0.9rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #bcc3cc;
            font-family: inherit;
            font-size: 0.95rem;
            background: #fff;
            transition: border-color 0.2s;
            resize: vertical;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #0b2b44;
            outline: none;
            box-shadow: 0 0 0 1px rgba(11,43,68,0.15);
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .btn {
            padding: 9px 20px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid transparent;
        }
        .btn-add {
            background-color: #1e5a3a;
            color: #fff;
            border-color: #1e5a3a;
        }
        .btn-add:hover {
            background-color: #14472c;
        }
        .btn-delete {
            background-color: #9b2c2c;
            color: #fff;
            border-color: #9b2c2c;
        }
        .btn-delete:hover {
            background-color: #7a1f1f;
        }
        .btn-move {
            background-color: #3a5068;
            color: #fff;
            border-color: #3a5068;
            padding: 5px 10px;
            font-size: 0.8rem;
        }
        .btn-move:hover {
            background-color: #2b3b4e;
        }
        .btn-primary {
            background-color: #0b2b44;
            color: #fff;
            font-size: 1rem;
            padding: 12px 30px;
            margin-top: 30px;
            border-color: #0b2b44;
        }
        .btn-primary:hover {
            background-color: #081f31;
        }
        .btn-sm {
            background-color: #f2f4f7;
            color: #9b2c2c;
            border: 1px solid #cbd2d9;
            padding: 5px 14px;
            font-size: 0.8rem;
            margin-top: 6px;
        }
        .card {
            background: #fafbfc;
            padding: 20px;
            border: 1px solid #dce1e8;
            margin-bottom: 20px;
        }
        .section-box, .ref-box {
            background: #fff;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #dce1e8;
        }
        hr {
            margin: 24px 0;
            border: 0.5px solid #d0d7df;
        }
        .board-list {
            list-style: none;
            padding: 0;
        }
        .board-list li {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .board-list input {
            flex: 1;
        }
        .download-area {
            text-align: center;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }
        .move-buttons {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #dce1e8;
        }
        .block-header .block-id-display {
            font-weight: bold;
            color: #0b2b44;
            font-size: 1rem;
        }
        .dynamic-fields {
            margin-top: 14px;
        }
        .data-management {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }
        @media (max-width: 768px) {
            .main-container {
                padding: 20px 15px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <h1>سامانه تولید نشریه دانشگاهی</h1>

    <!-- اطلاعات اصلی نشریه -->
    <h2>مشخصات نشریه</h2>
    <div class="card">
        <div class="form-row">
            <div class="form-group" style="grid-column: span 2;">
                <label>عنوان نشریه <span style="color:#9b2c2c;">*</span></label>
                <input type="text" id="journalTitle" placeholder="فصلنامه علمی-پژوهشی دانش">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>صاحب امتیاز</label><input type="text" id="owner" placeholder="دانشگاه / مؤسسه"></div>
            <div class="form-group"><label>مدیر مسئول</label><input type="text" id="chiefEditor" placeholder="نام و نام خانوادگی"></div>
            <div class="form-group"><label>سردبیر</label><input type="text" id="editorInChief" placeholder="نام و نام خانوادگی"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>دوره</label><input type="text" id="journalVolume" placeholder="۱۲"></div>
            <div class="form-group"><label>شماره</label><input type="text" id="journalIssue" placeholder="۳"></div>
            <div class="form-group"><label>تاریخ انتشار</label><input type="text" id="journalDate" placeholder="پاییز ۱۴۰۳"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>شاپا (ISSN)</label><input type="text" id="journalISSN" placeholder="1234-5678"></div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>لوگوی نشریه</label>
                <input type="file" id="logoUpload" accept="image/*" style="padding:5px;">
            </div>
            <div class="form-group">
                <label>فونت (اختیاری)</label>
                <input type="file" id="fontUpload" accept=".ttf,.woff,.woff2,.otf" style="padding:5px;">
            </div>
        </div>
    </div>

    <!-- هیئت تحریریه -->
    <h2>هیئت تحریریه</h2>
    <div class="card">
        <ul class="board-list" id="boardList">
            <li>
                <input type="text" placeholder="نام و نام خانوادگی" class="board-name">
                <input type="text" placeholder="سمت" class="board-role">
                <button class="btn btn-sm delete-board-btn">حذف</button>
            </li>
        </ul>
        <button class="btn btn-add" id="addBoardBtn" style="margin-top:10px;">افزودن عضو</button>
    </div>

    <!-- اطلاعات تماس -->
    <h2>آدرس و اطلاعات تماس</h2>
    <div class="card">
        <textarea id="journalAddress" rows="3" placeholder="آدرس پستی، تلفن، ایمیل، وب‌سایت..."></textarea>
    </div>

    <!-- محتوای شماره -->
    <h2>محتوای این شماره</h2>
    <div id="contentBlocksContainer"></div>
    <button class="btn btn-add" id="addContentBlockBtn" style="margin-top:10px;">افزودن نوشتار جدید</button>

    <!-- دانلود و چاپ -->
    <div class="download-area">
        <button class="btn btn-primary" id="downloadBtn">دانلود فایل HTML نشریه</button>
        <button class="btn btn-primary" id="printBtn" style="margin-right:10px;">چاپ نشریه (A4)</button>
        <p style="color:#4a5568; margin-top:8px; font-size:0.9rem;">خروجی با صفحه‌آرایی رسمی دانشگاهی و چاپ در قطع A4</p>
    </div>

    <!-- مدیریت داده‌ها (جدید) -->
    <div class="data-management">
        <button class="btn btn-primary" id="clearDataBtn" style="background-color:#9b2c2c;">🗑️ پاک کردن همه داده‌ها</button>
        <button class="btn btn-primary" id="exportDataBtn" style="background-color:#1e5a3a; margin-right:10px;">📤 دانلود فایل پشتیبان (JSON)</button>
        <button class="btn btn-primary" id="importDataBtn" style="background-color:#3a5068; margin-right:10px;">📥 بارگذاری فایل پشتیبان</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none;">
    </div>
</div>

<script>
    (function() {
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function toPersianDigits(str) {
            if (!str) return '';
            const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
            return str.toString().replace(/[0-9]/g, (d) => persianDigits[parseInt(d)]);
        }

        let logoDataUrl = '';
        let fontDataUrl = '';
        let fontFamilyName = 'CustomJournalFont';

        document.getElementById('logoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) { logoDataUrl = ev.target.result; };
                reader.readAsDataURL(file);
            } else {
                logoDataUrl = '';
            }
        });

        document.getElementById('fontUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    fontDataUrl = ev.target.result;
                    const name = file.name.replace(/\.[^/.]+$/, "").replace(/[^a-zA-Z0-9]/g, '');
                    fontFamilyName = name || 'CustomFont';
                };
                reader.readAsDataURL(file);
            } else {
                fontDataUrl = '';
            }
        });

        function createBoardMember() {
            const li = document.createElement('li');
            li.innerHTML = `
                <input type="text" placeholder="نام و نام خانوادگی" class="board-name">
                <input type="text" placeholder="سمت" class="board-role">
                <button class="btn btn-sm delete-board-btn">حذف</button>
            `;
            li.querySelector('.delete-board-btn').addEventListener('click', () => li.remove());
            return li;
        }
        document.getElementById('addBoardBtn').addEventListener('click', () => {
            document.getElementById('boardList').appendChild(createBoardMember());
        });
        document.querySelectorAll('.delete-board-btn').forEach(btn => {
            btn.addEventListener('click', (e) => e.target.closest('li').remove());
        });

        const blockTypes = [
            { value: 'article', label: 'مقاله پژوهشی' },
            { value: 'interview', label: 'گفتگو' },
            { value: 'review', label: 'معرفی کتاب' },
            { value: 'editorial', label: 'سرمقاله' },
            { value: 'report', label: 'گزارش' },
            { value: 'note', label: 'یادداشت' },
            { value: 'other', label: 'سایر' }
        ];

        function createSectionElement() {
            const div = document.createElement('div');
            div.className = 'section-box';
            div.innerHTML = `
                <input type="text" placeholder="عنوان بخش" class="sec-title" style="margin-bottom:6px;">
                <textarea placeholder="متن بخش" rows="3" class="sec-content"></textarea>
                <button class="btn btn-sm delete-section-btn">حذف بخش</button>
            `;
            div.querySelector('.delete-section-btn').addEventListener('click', () => div.remove());
            return div;
        }

        function createReferenceElement() {
            const div = document.createElement('div');
            div.className = 'ref-box';
            div.style.display = 'flex'; div.style.gap = '8px';
            div.innerHTML = `
                <input type="text" placeholder="منبع" class="ref-input" style="flex:1">
                <button class="btn btn-sm delete-ref-btn">حذف</button>
            `;
            div.querySelector('.delete-ref-btn').addEventListener('click', () => div.remove());
            return div;
        }

        function updateDynamicFields(block) {
            const type = block.querySelector('.block-type').value;
            const container = block.querySelector('.dynamic-fields');
            let fieldsHTML = '';

            if (type === 'article') {
                fieldsHTML = `
                    <div class="form-group"><label>چکیده</label><textarea class="art-abstract" rows="3"></textarea></div>
                    <div class="form-group"><label>کلیدواژه‌ها</label><input type="text" class="art-keywords" placeholder="کلمات کلیدی با کاما"></div>
                    <div class="form-row">
                        <div class="form-group"><label>تاریخ دریافت</label><input type="text" class="art-received" placeholder="۱۴۰۳/۰۷/۰۱"></div>
                        <div class="form-group"><label>تاریخ پذیرش</label><input type="text" class="art-accepted" placeholder="۱۴۰۳/۰۸/۱۵"></div>
                    </div>
                    <div class="form-group"><label>شناسه دیجیتال (DOI)</label><input type="text" class="art-doi" placeholder="10.1234/jrnl.1403.001"></div>
                    <div class="form-group"><label>مقدمه</label><textarea class="art-intro" rows="4"></textarea></div>
                    <div class="form-group"><label>نتیجه‌گیری</label><textarea class="art-conclusion" rows="4"></textarea></div>
                `;
            } else if (type === 'interview') {
                fieldsHTML = `
                    <div class="form-group"><label>گفتگو با</label><input type="text" class="interview-participant" placeholder="نام شخص(ها)"></div>
                    <div class="form-group"><label>متن گفتگو</label><textarea class="interview-text" rows="6" placeholder="متن کامل گفتگو..."></textarea></div>
                `;
            } else if (type === 'review') {
                fieldsHTML = `
                    <div class="form-group"><label>عنوان کتاب</label><input type="text" class="review-book-title"></div>
                    <div class="form-group"><label>نویسنده(گان) کتاب</label><input type="text" class="review-book-author"></div>
                    <div class="form-row">
                        <div class="form-group"><label>ناشر</label><input type="text" class="review-publisher"></div>
                        <div class="form-group"><label>سال نشر</label><input type="text" class="review-year"></div>
                    </div>
                    <div class="form-group"><label>توضیحات</label><textarea class="review-description" rows="4"></textarea></div>
                `;
            } else if (type === 'editorial') {
                fieldsHTML = `
                    <div class="form-group"><label>نویسنده</label><input type="text" class="editorial-author" placeholder="نام نویسنده"></div>
                    <div class="form-group"><label>متن سرمقاله</label><textarea class="editorial-text" rows="6"></textarea></div>
                `;
            } else {
                fieldsHTML = `
                    <div class="form-group"><label>متن</label><textarea class="general-text" rows="6" placeholder="متن کامل..."></textarea></div>
                `;
            }

            container.innerHTML = fieldsHTML;
        }

        let blockCounter = 0;
        function createContentBlock() {
            blockCounter++;
            const block = document.createElement('div');
            block.className = 'card content-block';
            block.setAttribute('data-block-id', blockCounter);
            const typeOptions = blockTypes.map(t => `<option value="${t.value}">${t.label}</option>`).join('');

            block.innerHTML = `
                <div class="block-header">
                    <span class="block-id-display">نوشتار ${blockCounter}</span>
                    <div class="move-buttons">
                        <button class="btn btn-move move-up-btn" title="انتقال به بالا">▲</button>
                        <button class="btn btn-move move-down-btn" title="انتقال به پایین">▼</button>
                    </div>
                    <button class="btn btn-delete delete-block-btn">حذف نوشتار</button>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>نوع نوشتار</label><select class="block-type">${typeOptions}</select></div>
                    <div class="form-group"><label>شناسه (کد)</label><input type="text" class="block-id" placeholder="JRNL-1403-001"></div>
                </div>
                <div class="form-group"><label>عنوان <span style="color:#9b2c2c;">*</span></label><input type="text" class="block-title" placeholder="عنوان کامل"></div>
                <div class="form-row">
                    <div class="form-group"><label>نویسنده(ها)</label><input type="text" class="block-authors" placeholder="با کاما جدا کنید"></div>
                    <div class="form-group"><label>وابستگی نویسندگان</label><input type="text" class="block-affiliation" placeholder="دانشگاه، گروه آموزشی..."></div>
                </div>
                <div class="dynamic-fields"></div>
                <label style="font-weight:600; margin-top:18px; display:block;">بخش‌های اصلی</label>
                <div class="sections-container"></div>
                <button class="btn btn-add add-section-btn" style="margin-top:8px;">افزودن بخش</button>
                <label style="font-weight:600; margin-top:18px; display:block;">منابع</label>
                <div class="refs-container"></div>
                <button class="btn btn-add add-ref-btn" style="margin-top:8px;">افزودن منبع</button>
            `;

            block.querySelector('.delete-block-btn').addEventListener('click', () => block.remove());
            block.querySelector('.add-section-btn').addEventListener('click', () => {
                block.querySelector('.sections-container').appendChild(createSectionElement());
            });
            block.querySelector('.add-ref-btn').addEventListener('click', () => {
                block.querySelector('.refs-container').appendChild(createReferenceElement());
            });

            block.querySelector('.move-up-btn').addEventListener('click', () => {
                const prev = block.previousElementSibling;
                if (prev && prev.classList.contains('content-block')) {
                    block.parentNode.insertBefore(block, prev);
                }
            });
            block.querySelector('.move-down-btn').addEventListener('click', () => {
                const next = block.nextElementSibling;
                if (next && next.classList.contains('content-block')) {
                    block.parentNode.insertBefore(next, block);
                }
            });

            const typeSelect = block.querySelector('.block-type');
            typeSelect.addEventListener('change', () => updateDynamicFields(block));
            updateDynamicFields(block);

            return block;
        }

        document.getElementById('addContentBlockBtn').addEventListener('click', () => {
            document.getElementById('contentBlocksContainer').appendChild(createContentBlock());
        });

        document.getElementById('contentBlocksContainer').appendChild(createContentBlock());

        // ---------- ذخیره و بازیابی داده‌ها ----------
        function collectFormData() {
            const data = {
                journalTitle: document.getElementById('journalTitle').value,
                owner: document.getElementById('owner').value,
                chiefEditor: document.getElementById('chiefEditor').value,
                editorInChief: document.getElementById('editorInChief').value,
                journalVolume: document.getElementById('journalVolume').value,
                journalIssue: document.getElementById('journalIssue').value,
                journalDate: document.getElementById('journalDate').value,
                journalISSN: document.getElementById('journalISSN').value,
                journalAddress: document.getElementById('journalAddress').value,
                logoDataUrl: logoDataUrl,
                fontDataUrl: fontDataUrl,
                fontFamilyName: fontFamilyName,
                boardMembers: [],
                contentBlocks: []
            };

            // هیئت تحریریه
            document.querySelectorAll('#boardList li').forEach(li => {
                const name = li.querySelector('.board-name')?.value || '';
                const role = li.querySelector('.board-role')?.value || '';
                data.boardMembers.push({ name, role });
            });

            // بلوک‌های محتوا
            document.querySelectorAll('.content-block').forEach(block => {
                const blockData = {
                    type: block.querySelector('.block-type').value,
                    blockId: block.querySelector('.block-id').value,
                    title: block.querySelector('.block-title').value,
                    authors: block.querySelector('.block-authors').value,
                    affiliation: block.querySelector('.block-affiliation').value,
                    dynamicFields: {},
                    sections: [],
                    refs: []
                };

                // فیلدهای پویا بر اساس نوع
                const type = blockData.type;
                if (type === 'article') {
                    blockData.dynamicFields = {
                        abstract: block.querySelector('.art-abstract')?.value || '',
                        keywords: block.querySelector('.art-keywords')?.value || '',
                        received: block.querySelector('.art-received')?.value || '',
                        accepted: block.querySelector('.art-accepted')?.value || '',
                        doi: block.querySelector('.art-doi')?.value || '',
                        intro: block.querySelector('.art-intro')?.value || '',
                        conclusion: block.querySelector('.art-conclusion')?.value || ''
                    };
                } else if (type === 'interview') {
                    blockData.dynamicFields = {
                        participant: block.querySelector('.interview-participant')?.value || '',
                        text: block.querySelector('.interview-text')?.value || ''
                    };
                } else if (type === 'review') {
                    blockData.dynamicFields = {
                        bookTitle: block.querySelector('.review-book-title')?.value || '',
                        bookAuthor: block.querySelector('.review-book-author')?.value || '',
                        publisher: block.querySelector('.review-publisher')?.value || '',
                        year: block.querySelector('.review-year')?.value || '',
                        description: block.querySelector('.review-description')?.value || ''
                    };
                } else if (type === 'editorial') {
                    blockData.dynamicFields = {
                        author: block.querySelector('.editorial-author')?.value || '',
                        text: block.querySelector('.editorial-text')?.value || ''
                    };
                } else {
                    blockData.dynamicFields = {
                        generalText: block.querySelector('.general-text')?.value || ''
                    };
                }

                // بخش‌ها
                block.querySelectorAll('.section-box').forEach(sec => {
                    blockData.sections.push({
                        title: sec.querySelector('.sec-title')?.value || '',
                        content: sec.querySelector('.sec-content')?.value || ''
                    });
                });

                // منابع
                block.querySelectorAll('.ref-input').forEach(ref => {
                    blockData.refs.push(ref.value || '');
                });

                data.contentBlocks.push(blockData);
            });

            return data;
        }

        function populateFormData(data) {
            if (!data) return;

            // اطلاعات اصلی
            document.getElementById('journalTitle').value = data.journalTitle || '';
            document.getElementById('owner').value = data.owner || '';
            document.getElementById('chiefEditor').value = data.chiefEditor || '';
            document.getElementById('editorInChief').value = data.editorInChief || '';

            if (saved) {
                try {
                    const data = JSON.parse(saved);

                } catch (e) {
                    console.error('خطا در بارگذاری داده‌ها:', e);
                }
            }
        }

        let saveTimeout;
        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveToLocalStorage, 500);

        document.addEventListener('input', autoSave);

        window.addEventListener('load', () => {
            loadFromLocalStorage();

            const blob = new Blob([jsonStr], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('journalTitle').value.trim() || 'نشریه'}_backup.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

        document.getElementById('importDataBtn').addEventListener('click', () => {

            const file = e.target.files[0];

                let articleHTML = '';

                articleHTML += `<div class="article-type-line">${typeLabel}</div>`;
                if (id) articleHTML += `<p class="article-id">${escapeHTML(id)}</p>`;
                articleHTML += `<h2 class="article-title">${escapeHTML(title)}</h2>`;
                if (authors.trim()) articleHTML += `<p class="article-authors">${escapeHTML(authors)}</p>`;
                if (affiliation.trim()) articleHTML += `<p class="article-affiliation">${escapeHTML(affiliation)}</p>`;

                if (type === 'article') {

                    const intro = block.querySelector('.art-intro')?.value;

                    if (doi && doi.trim()) articleHTML += `<p class="article-doi"><strong>DOI:</strong> ${escapeHTML(doi)}</p>`;

                } else if (type === 'editorial') {

                const sections = block.querySelectorAll('.section-box');

                const refs = block.querySelectorAll('.ref-input');
                if (refs.length > 0 && Array.from(refs).some(r => r.value.trim())) {
                    articleHTML += `<div class="references"><h3>منابع</h3><ol>`;
                    refs.forEach(r => { if (r.value.trim()) articleHTML += `<li>${escapeHTML(r.value.trim())}</li>`; });
                    articleHTML += `</ol></div>`;
                }

                articleHTML += `</div>`;
                articlesHTML += articleHTML;
            });

            let fontFaceCSS = '';
            let fontFamily = "'B Nazanin','Tahoma','Yekan',serif";
            if (fontDataUrl) {
                fontFaceCSS = `
                    @font-face {

            let logoHTML = '';

            const headerJournalName = escapeHTML(jTitle);

            // لوگو در حاشیه چپ
            let logoMarginCSS = '';

            // صفحه‌های زوج (سمت چپ کتاب) – شماره صفحه در بالا-راست

            const printHTML = `<!DOCTYPE html>

</head>

        </div>

            ${jOwner ? `<p><strong>صاحب امتیاز:</strong> ${escapeHTML(jOwner)}</p>` : ''}
            ${jChiefEditor ? `<p><strong>مدیر مسئول:</strong> ${escapeHTML(jChiefEditor)}</p>` : ''}
            ${jEditorInChief ? `<p><strong>سردبیر:</strong> ${escapeHTML(jEditorInChief)}</p>` : ''}
            ${jISSN ? `<p><strong>شاپا:</strong> ${jISSN}</p>` : ''}
            ${jAddress ? `<p><strong>آدرس:</strong> ${escapeHTML(jAddress).replace(/\n/g,'<br>')}</p>` : ''}
        </div>

    </div>

    </div>

    <div class="front-matter">
        <div class="toc-title-print">فهرست مطالب</div>

            return printHTML;
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            try {
                const content = generateOutput();
                if (!content) return;
                const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${document.getElementById('journalTitle').value.trim() || 'نشریه'}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('خطا در تولید فایل: ' + e.message);
                console.error(e);
            }
        });

        document.getElementById('printBtn').addEventListener('click', () => {
            try {
                const printContent = generatePrintHTML();
                if (!printContent) return;
                const win = window.open('', '_blank', 'width=800,height=600');
                if (!win) {
                    alert('لطفاً اجازه باز شدن پنجره جدید را بدهید.');
                    return;
                }
                win.document.write(printContent);
                win.document.close();
                win.focus();
                win.addEventListener('load', () => {
                    win.print();
                });
                if (win.document.readyState === 'complete') {
                    win.print();
                }
            } catch (e) {
                alert('خطا در آماده‌سازی چاپ: ' + e.message);
                console.error(e);
            }
        });
