<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لیبل‌ساز فروشگاهی</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --radius: 16px;
            --gold: #c9a84c;
            --silver: #a0a0a0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        h2 {
            font-size: 1.4em;
            margin-bottom: 18px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9em;
            color: var(--text);
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9em;
            transition: all 0.2s;
            background: #fafafa;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
            background: #fff;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row > * { flex:1; }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
        .theme-selector {
            display: flex;
            gap: 10px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .theme-btn {
            flex:1;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            transition: 0.2s;
            background: #f1f5f9;
            color: var(--text);
            white-space: nowrap;
        }
        .theme-btn.active {
            border-color: var(--primary);
            background: #dbeafe;
            color: var(--primary);
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #059669; }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-warning:hover { background: #d97706; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .preview-area {
            text-align: center;
            min-height: 500px;
            background: #f8fafc;
            border-radius: var(--radius);
            padding: 24px;
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            background: #fff;
        }
        .notice {
            font-size: 0.8em;
            color: #64748b;
            margin-top: 12px;
        }
        #logoPreview {
            max-width: 80px;
            max-height: 40px;
            margin: 8px auto;
            display: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- کنترل پنل -->
    <div class="panel">
        <h2>🎨 پنل طراحی لیبل</h2>

        <div class="form-group">
            <label>🏪 نام فروشگاه</label>
            <input type="text" id="storeName" value="نگین مال" placeholder="نام فروشگاه">
        </div>

        <div class="form-group">
            <label>📦 نام محصول</label>
            <input type="text" id="productName" value="پیراهن مردانه کتان" placeholder="نام محصول">
        </div>

        <div class="row">
            <div class="form-group">
                <label>💰 قیمت (ریال)</label>
                <input type="text" id="price" value="2,450,000" placeholder="مبلغ">
            </div>
            <div class="form-group">
                <label>📏 تعداد/وزن</label>
                <input type="text" id="unit" value="2 کیلو" placeholder="مثال: 2 کیلو">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>🔢 شماره / بارکد</label>
                <input type="text" id="barcodeText" value="8901234567890" placeholder="متن بارکد">
            </div>
            <div class="form-group">
                <label>📅 تاریخ انقضا</label>
                <input type="date" id="expiryDate" value="">
            </div>
        </div>

        <div class="form-group">
            <label>🎨 ضخامت خط بارکد</label>
            <input type="range" id="moduleWidth" min="1.2" max="2.8" step="0.2" value="1.8">
            <span id="moduleWidthValue">1.8</span> پیکسل
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="discountLabel">
            <label for="discountLabel">🏷️ لیبل تخفیف (قرمز و جذاب)</label>
        </div>

        <div class="form-group">
            <label>🖼️ لوگوی فروشگاه</label>
            <input type="file" id="logoFile" accept="image/*">
            <img id="logoPreview" alt="پیش‌نمایش لوگو">
        </div>

        <div class="form-group">
            <label>🎨 تم رنگی لیبل</label>
            <div class="theme-selector">
                <div class="theme-btn active" data-theme="classic">✨ کلاسیک طلایی</div>
                <div class="theme-btn" data-theme="silver">🥈 نقره‌ای مدرن</div>
                <div class="theme-btn" data-theme="dark">🖤 مشکی لوکس</div>
                <div class="theme-btn" data-theme="bw">⚫ سیاه و سفید</div>
            </div>
        </div>

        <button class="btn-danger" onclick="downloadLabel()">📥 دانلود PNG (با کیفیت چاپ)</button>
        <div class="notice">💡 پیش‌نمایش با تغییر تنظیمات بلافاصله بروز می‌شود.</div>
    </div>

    <!-- پیش‌نمایش -->
    <div class="panel">
        <h2>👁️ پیش‌نمایش زنده</h2>
        <div class="preview-area">
            <canvas id="labelCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    // ==================== Code 128 Barcode Engine ====================
    function getCode128Pattern(value) {
        var patterns = [
            [2,1,2,2,2,2],[2,2,2,1,2,2],[2,2,2,2,2,1],[1,2,1,2,2,3],[1,2,1,3,2,2],[1,3,1,2,2,2],[1,2,2,2,1,3],[1,2,2,3,1,2],[1,3,2,2,1,2],[2,2,1,2,1,3],
            [2,2,1,3,1,2],[2,3,1,2,1,2],[1,1,2,2,3,2],[1,2,2,1,3,2],[1,2,2,2,3,1],[1,1,3,2,2,2],[1,2,3,1,2,2],[1,2,3,2,2,1],[2,2,3,2,1,1],[2,2,1,1,3,2],
            [2,2,1,2,3,1],[2,1,3,2,1,2],[2,2,3,1,1,2],[3,1,2,1,3,1],[3,1,1,2,2,2],[3,2,1,1,2,2],[3,2,1,2,2,1],[3,1,2,2,1,2],[3,2,2,1,1,2],[3,2,2,2,1,1],
            [2,1,2,1,2,3],[2,1,2,3,2,1],[2,3,2,1,2,1],[1,1,1,3,2,3],[1,3,1,1,2,3],[1,3,1,3,2,1],[1,1,2,3,1,3],[1,3,2,1,1,3],[1,3,2,3,1,1],[2,1,1,3,1,3],
            [2,3,1,1,1,3],[2,3,1,3,1,1],[1,1,2,1,3,3],[1,1,2,3,3,1],[1,3,2,1,3,1],[1,1,3,1,2,3],[1,1,3,3,2,1],[1,3,3,1,2,1],[3,1,3,1,2,1],[2,1,1,3,3,1],
            [2,3,1,1,3,1],[2,1,3,1,1,3],[2,1,3,3,1,1],[2,1,3,1,3,1],[3,1,1,1,2,3],[3,1,1,3,2,1],[3,3,1,1,2,1],[3,1,2,1,1,3],[3,1,2,3,1,1],[3,3,2,1,1,1],
            [3,1,4,1,1,1],[2,2,1,4,1,1],[4,3,1,1,1,1],[1,1,1,2,2,4],[1,1,1,4,2,2],[1,2,1,1,2,4],[1,2,1,4,2,1],[1,4,1,1,2,2],[1,4,1,2,2,1],[1,1,2,2,1,4],
            [1,1,2,4,1,2],[1,2,2,1,1,4],[1,2,2,4,1,1],[1,4,2,1,1,2],[1,4,2,2,1,1],[2,4,1,2,1,1],[2,2,1,1,1,4],[4,1,3,1,1,1],[2,4,1,1,1,2],[1,3,4,1,1,1],
            [1,1,1,2,4,2],[1,2,1,1,4,2],[1,2,1,2,4,1],[1,1,4,2,1,2],[1,2,4,1,1,2],[1,2,4,2,1,1],[4,1,1,2,1,2],[4,2,1,1,1,2],[4,2,1,2,1,1],[2,1,2,1,4,1],
            [2,1,4,1,2,1],[4,1,2,1,2,1],[1,1,1,1,4,3],[1,1,1,3,4,1],[1,3,1,1,4,1],[1,1,4,1,1,3],[1,1,4,3,1,1],[4,1,1,1,1,3],[4,1,1,3,1,1],[1,1,3,1,4,1],
            [1,1,4,1,3,1],[3,1,1,1,4,1],[4,1,1,1,3,1],[2,1,1,4,1,2],[2,1,1,2,1,4],[2,1,1,2,3,2]
        ];
        return patterns[value] || [2,1,2,2,2,2];
    }

    function generateBarcode128(text) {
        if (!text) return '';
        var values = [104];
        for (var i = 0; i < text.length; i++) {
            var code = text.charCodeAt(i);
            if (code >= 32 && code <= 126) values.push(code - 32);
            else values.push(0);
        }
        var checksum = 104;
        for (var i = 0; i < text.length; i++) checksum += (i+1) * values[i+1];
        values.push(checksum % 103);
        var bars = '';
        for (var v = 0; v < values.length; v++) {
            var pat = getCode128Pattern(values[v]);
            var bar = true;
            for (var p = 0; p < pat.length; p++) {
                bars += (bar ? '1' : '0').repeat(pat[p]);
                bar = !bar;
            }
        }
        var stop = [2,3,3,1,1,1,2];
        var bar = true;
        for (var p2 = 0; p2 < stop.length; p2++) {
            bars += (bar ? '1' : '0').repeat(stop[p2]);
            bar = !bar;
        }
        return bars;
    }

    // ==================== Professional Label Drawing ====================
    var logoImage = null;
    var currentTheme = 'classic'; // default

    document.getElementById('logoFile').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                var img = new Image();
                img.onload = function() {
                    logoImage = img;
                    updateLabel();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            logoImage = null;
            updateLabel();
        }
    });

    // Theme selection
    document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentTheme = this.dataset.theme;
            updateLabel();
        });
    });

    // Module width slider
    document.getElementById('moduleWidth').addEventListener('input', function() {
        document.getElementById('moduleWidthValue').textContent = this.value;
        updateLabel();
    });

    function breakText(ctx, text, maxWidth) {
        var words = text.split(' ');
        var lines = [];
        var current = '';
        for (var i=0;i<words.length;i++) {
            var test = current ? current+' '+words[i] : words[i];
            if (ctx.measureText(test).width > maxWidth && current) {
                lines.push(current);
                current = words[i];
            } else {
                current = test;
            }
        }
        if (current) lines.push(current);
        return lines.length ? lines : [text];
    }

    function toShamsiDate(gregorianStr) {
        if (!gregorianStr) return '';
        var date = new Date(gregorianStr);
        date = new Date(date.getTime() + date.getTimezoneOffset()*60000);
        try {
            return new Intl.DateTimeFormat('fa-IR', {year:'numeric',month:'2-digit',day:'2-digit',calendar:'persian'}).format(date);
        } catch(e) { return gregorianStr; }
    }

    // Compute required canvas size based on content
    function computeLabelSize() {
        var storeName = document.getElementById('storeName').value || 'فروشگاه';
        var productName = document.getElementById('productName').value || 'محصول';
        var price = document.getElementById('price').value || '0';
        var unit = document.getElementById('unit').value || 'عدد';
        var barcodeText = document.getElementById('barcodeText').value || '123456';
        var expiryDate = document.getElementById('expiryDate').value;
        var discount = document.getElementById('discountLabel').checked;
        var modWidth = parseFloat(document.getElementById('moduleWidth').value) || 1.8;

        var theme = {
            classic: { primary: '#c9a84c', secondary: '#2c2c2c', bg: '#ffffff', accent: '#f8f5f0', text: '#1a1a1a', highlight: '#b89b3c' },
            silver:  { primary: '#a0a0a0', secondary: '#3a3a3a', bg: '#fdfdfd', accent: '#f2f2f2', text: '#222222', highlight: '#888888' },
            dark:    { primary: '#d4af37', secondary: '#e0e0e0', bg: '#1e1e1e', accent: '#2c2c2c', text: '#ffffff', highlight: '#b89b3c' },
            bw:      { primary: '#000000', secondary: '#000000', bg: '#ffffff', accent: '#ffffff', text: '#000000', highlight: '#000000' }
        }[currentTheme] || { primary: '#c9a84c', secondary: '#2c2c2c', bg: '#ffffff', accent: '#f8f5f0', text: '#1a1a1a', highlight: '#b89b3c' };
        var isDark = (currentTheme === 'dark');

        var dpi = 96;
        var baseMinWidth = Math.round((80 / 25.4) * dpi); // 302px
        var padding = 10;
        var borderMargin = 4;

        // Create offscreen canvas for measurements
        var measureCanvas = document.createElement('canvas');
        var mctx = measureCanvas.getContext('2d');
        measureCanvas.width = baseMinWidth;
        measureCanvas.height = 2000; // large enough

        // Measurements for width
        // Store name
        mctx.font = 'bold 13px "Tahoma", "Segoe UI", sans-serif';
        var storeW = mctx.measureText(storeName).width;
        // Product name lines (break with baseMinWidth - 2*padding - 10)
        var productLines = breakText(mctx, productName, baseMinWidth - 2*padding - 10);
        var maxProductLineW = 0;
        for (var i=0; i<productLines.length; i++) {
            mctx.font = 'bold 16px "Tahoma", "Segoe UI", sans-serif';
            var w = mctx.measureText(productLines[i]).width;
            if (w > maxProductLineW) maxProductLineW = w;
        }
        // Price
        mctx.font = 'bold 28px "Tahoma", "Segoe UI", sans-serif';
        var priceW = mctx.measureText(price + ' ریال').width;
        // Unit text
        mctx.font = '10px "Tahoma", sans-serif';
        var unitW = mctx.measureText('تعداد/وزن: ' + unit).width;
        var expiryW = 0;
        if (expiryDate) {
            var shamsiExpiry = toShamsiDate(expiryDate);
            mctx.font = '10px "Tahoma", sans-serif';
            expiryW = mctx.measureText('انقضا: ' + shamsiExpiry).width;
        }
        // Discount badge
        var discW = 0;
        if (discount) {
            mctx.font = 'bold 12px "Tahoma", sans-serif';
            discW = mctx.measureText('🏷️ تخفیف ویژه').width;
        }
        // Slogan
        mctx.font = 'italic 9px "Tahoma", sans-serif';
        var sloganW = mctx.measureText('تضمین کیفیت و اصالت کالا').width;

        var maxTextWidth = Math.max(storeW, maxProductLineW, priceW, unitW + expiryW + 20, discW, sloganW);
        var neededWidth = maxTextWidth + 2*padding + 8; // border margins
        if (neededWidth < baseMinWidth) neededWidth = baseMinWidth;

        // Now compute height by simulating drawing at neededWidth
        var curY = padding + 4;
        // logo
        if (logoImage) {
            var logoH = 22;
            var logoW = logoImage.width * (logoH / logoImage.height);
            if (logoW > neededWidth - 30) logoW = neededWidth - 30;
            curY += logoH + 6;
        }
        // store name
        curY += 18;
        // decorative line
        curY += 4; // line space
        // product name
        var lineCount = Math.min(productLines.length, 2);
        for (var l=0; l<lineCount; l++) {
            curY += 16;
        }
        curY += 4;
        // unit & expiry
        curY += 22;
        // barcode
        var barModules = generateBarcode128(barcodeText);
        if (barModules) {
            var barHeight = 30;
            var quietZoneModules = 10;
            var totalModules = barModules.length + quietZoneModules * 2;
            var barcodeAreaWidth = neededWidth - 24;
            var modulePx = barcodeAreaWidth / totalModules;
            var actualModWidth = Math.min(modulePx, modWidth);
            var barcodeTotalWidth = barModules.length * actualModWidth;
            // barcode background + text
            curY += barHeight + 6 + 12 + 24;
        } else {
            curY += 24;
        }
        // price
        curY += 2 + 28 + 8;
        // discount badge
        if (discount) {
            curY += 14;
        }
        // slogan
        if (!discount) {
            curY += 18;
        }
        // bottom padding
        curY += 12;

        return {
            width: Math.ceil(neededWidth),
            height: Math.ceil(curY)
        };
    }

    // Main drawing function using base canvas dimensions
    function drawLabel(ctx, baseWidth, baseHeight) {
        var storeName = document.getElementById('storeName').value || 'فروشگاه';
        var productName = document.getElementById('productName').value || 'محصول';
        var price = document.getElementById('price').value || '0';
        var unit = document.getElementById('unit').value || 'عدد';
        var barcodeText = document.getElementById('barcodeText').value || '123456';
        var expiryDate = document.getElementById('expiryDate').value;
        var discount = document.getElementById('discountLabel').checked;
        var modWidth = parseFloat(document.getElementById('moduleWidth').value) || 1.8;

        var colors = {
            classic: { primary: '#c9a84c', secondary: '#2c2c2c', bg: '#ffffff', accent: '#f8f5f0', text: '#1a1a1a', highlight: '#b89b3c' },
            silver:  { primary: '#a0a0a0', secondary: '#3a3a3a', bg: '#fdfdfd', accent: '#f2f2f2', text: '#222222', highlight: '#888888' },
            dark:    { primary: '#d4af37', secondary: '#e0e0e0', bg: '#1e1e1e', accent: '#2c2c2c', text: '#ffffff', highlight: '#b89b3c' },
            bw:      { primary: '#000000', secondary: '#000000', bg: '#ffffff', accent: '#ffffff', text: '#000000', highlight: '#000000' }
        };
        var theme = colors[currentTheme] || colors.classic;
        var isDark = (currentTheme === 'dark');

        // Clear
        ctx.clearRect(0, 0, baseWidth, baseHeight);

        // Background
        ctx.fillStyle = theme.bg;
        ctx.fillRect(0, 0, baseWidth, baseHeight);

        if (!isDark) {
            var grad = ctx.createLinearGradient(0, 0, 0, baseHeight);
            grad.addColorStop(0, theme.accent);
            grad.addColorStop(1, theme.bg);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, baseWidth, baseHeight);
        }

        // Outer border
        var borderMargin = 4;
        ctx.strokeStyle = theme.primary;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(borderMargin, borderMargin, baseWidth - 2*borderMargin, baseHeight - 2*borderMargin);
        ctx.strokeStyle = theme.secondary;
        ctx.lineWidth = 0.8;
        ctx.strokeRect(borderMargin+3, borderMargin+3, baseWidth - 2*(borderMargin+3), baseHeight - 2*(borderMargin+3));

        if (discount) {
            ctx.strokeStyle = '#dc2626';
            ctx.lineWidth = 2.2;
            ctx.strokeRect(borderMargin, borderMargin, baseWidth - 2*borderMargin, baseHeight - 2*borderMargin);
            ctx.strokeStyle = '#ff4d4d';
            ctx.lineWidth = 0.8;
            ctx.strokeRect(borderMargin+3, borderMargin+3, baseWidth - 2*(borderMargin+3), baseHeight - 2*(borderMargin+3));
        }

        var padding = 10;
        var curY = padding + 4;
        var centerX = baseWidth / 2;

        // Logo
        if (logoImage) {
            var logoH = 22;
            var logoW = logoImage.width * (logoH / logoImage.height);
            if (logoW > baseWidth - 30) logoW = baseWidth - 30;
            ctx.drawImage(logoImage, centerX - logoW/2, curY, logoW, logoH);
            curY += logoH + 6;
        }

        // Store name
        ctx.fillStyle = theme.primary;
        ctx.font = 'bold 13px "Tahoma", "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(storeName, centerX, curY + 12);
        curY += 18;

        // Decorative line
        ctx.strokeStyle = theme.primary;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(padding + 15, curY);
        ctx.lineTo(baseWidth - padding - 15, curY);
        ctx.stroke();
        curY += 4;

        // Product name
        ctx.fillStyle = theme.text;
        ctx.font = 'bold 16px "Tahoma", "Segoe UI", sans-serif';
        if (!isDark && currentTheme === 'classic') {
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.shadowBlur = 2;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 1;
        }
        var productLines = breakText(ctx, productName, baseWidth - 30);
        for (var l = 0; l < Math.min(productLines.length, 2); l++) {
            ctx.fillText(productLines[l], centerX, curY + 14);
            curY += 16;
            if (l === 1) break;
        }
        ctx.shadowColor = 'transparent';

        // Unit & Expiry
        curY += 4;
        ctx.fillStyle = theme.secondary;
        ctx.font = '10px "Tahoma", sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('تعداد/وزن: ' + unit, baseWidth - padding - 5, curY + 10);
        ctx.textAlign = 'left';
        if (expiryDate) {
            var shamsiExpiry = toShamsiDate(expiryDate);
            ctx.fillText('انقضا: ' + shamsiExpiry, padding + 5, curY + 10);
        }
        ctx.textAlign = 'center';
        curY += 22;

        // Barcode (without border)
        var barModules = generateBarcode128(barcodeText);
        if (barModules) {
            var barHeight = 30;
            var quietZoneModules = 10;
            var totalModules = barModules.length + quietZoneModules * 2;
            var barcodeAreaWidth = baseWidth - 24;
            var modulePx = barcodeAreaWidth / totalModules;
            var actualModWidth = Math.min(modulePx, modWidth);
            var barcodeTotalWidth = barModules.length * actualModWidth;
            var barcodeX = centerX - barcodeTotalWidth/2;
            var barcodeY = curY;
            // White background for barcode (no border)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(barcodeX - 4, barcodeY - 2, barcodeTotalWidth + 8, barHeight + 6);
            // Draw bars
            ctx.fillStyle = '#000000';
            for (var i = 0; i < barModules.length; i++) {
                if (barModules.charAt(i) === '1') {
                    ctx.fillRect(barcodeX + i * actualModWidth, barcodeY, actualModWidth, barHeight);
                }
            }
            // Text under barcode
            ctx.fillStyle = theme.text;
            ctx.font = '9px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(barcodeText, centerX, barcodeY + barHeight + 12);
            curY = barcodeY + barHeight + 24;
        } else {
            curY += 24;
        }

        // Price
        curY += 2;
        var priceFontSize = 28;
        ctx.fillStyle = discount ? '#dc2626' : theme.primary;
        ctx.font = 'bold ' + priceFontSize + 'px "Tahoma", "Segoe UI", sans-serif';
        if (!isDark) {
            ctx.shadowColor = 'rgba(0,0,0,0.12)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 2;
        }
        ctx.fillText(price + ' ریال', centerX, curY + priceFontSize * 0.8);
        ctx.shadowColor = 'transparent';
        curY += priceFontSize + 8;

        // Discount badge
        if (discount) {
            ctx.fillStyle = '#dc2626';
            ctx.font = 'bold 12px "Tahoma", sans-serif';
            ctx.fillText('🏷️ تخفیف ویژه', centerX, curY + 14);
            curY += 14;
        }

        // Store slogan (extra description)
        if (!discount) {
            ctx.fillStyle = theme.secondary;
            ctx.font = 'italic 9px "Tahoma", sans-serif';
            ctx.fillText('تضمین کیفیت و اصالت کالا', centerX, baseHeight - 10);
        }
    }

    function updateLabel() {
        var size = computeLabelSize();
        var canvas = document.getElementById('labelCanvas');
        canvas.width = size.width;
        canvas.height = size.height;
        var ctx = canvas.getContext('2d');
        drawLabel(ctx, size.width, size.height);
    }

    // Live preview bindings
    document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', updateLabel);
        el.addEventListener('change', updateLabel);
    });
    document.getElementById('discountLabel').addEventListener('change', updateLabel);
    updateLabel();

    // ==================== Download (High Quality) ====================
    function downloadLabel() {
        var size = computeLabelSize();
        // High resolution scale factor (approx 600 DPI => 600/96 = 6.25, use 4 for balance)
        var scale = 4;
        var highResCanvas = document.createElement('canvas');
        highResCanvas.width = size.width * scale;
        highResCanvas.height = size.height * scale;
        var hctx = highResCanvas.getContext('2d');
        hctx.scale(scale, scale);
        drawLabel(hctx, size.width, size.height);
        var link = document.createElement('a');
        link.download = 'label_premium.png';
        link.href = highResCanvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
