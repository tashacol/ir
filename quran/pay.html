<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتال پرداخت شهریه</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap');
        :root { 
            --primary: #2563eb; --primary-hover: #1d4ed8; 
            --success: #16a34a; --danger: #dc2626; --warning: #d97706;
            --bg: #f1f5f9; --card: #ffffff; --text: #334155; --text-light: #64748b;
        }
        * { box-sizing: border-box; font-family: 'Vazirmatn', Tahoma, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        
        /* Full Page Loader (Only for Redirection & Verify) */
        #full-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.92); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .spinner-large { width: 45px; height: 45px; border: 4px solid #cbd5e1; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Inline Skeleton Cube Loader (For Data Loading) */
        .inline-loader { display: flex; flex-direction: column; align-items: center; padding: 50px 0; }
        .sk-cube-grid { width: 50px; height: 50px; margin-bottom: 15px; }
        .sk-cube-grid .sk-cube { width: 33%; height: 33%; background-color: var(--primary); float: left; animation: sk-cubeGridScaleDelay 1.3s infinite ease-in-out; border-radius: 4px;}
        .sk-cube-grid .sk-cube1 { animation-delay: 0.2s; } .sk-cube-grid .sk-cube2 { animation-delay: 0.3s; } .sk-cube-grid .sk-cube3 { animation-delay: 0.4s; }
        .sk-cube-grid .sk-cube4 { animation-delay: 0.1s; } .sk-cube-grid .sk-cube5 { animation-delay: 0.2s; } .sk-cube-grid .sk-cube6 { animation-delay: 0.3s; }
        .sk-cube-grid .sk-cube7 { animation-delay: 0.0s; } .sk-cube-grid .sk-cube8 { animation-delay: 0.1s; } .sk-cube-grid .sk-cube9 { animation-delay: 0.2s; }
        @keyframes sk-cubeGridScaleDelay { 0%, 70%, 100% { transform: scale3D(1, 1, 1); } 35% { transform: scale3D(0, 0, 1); } }
        
        /* Typography & Forms */
        h2 { color: var(--primary); margin-bottom: 10px; font-weight: 800; }
        .form-input { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 1.2rem; letter-spacing: 3px; outline: none; transition: 0.3s; font-weight: bold; color: var(--text);}
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; cursor: pointer; transition: 0.3s; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #15803d; transform: translateY(-2px); }
        
        /* Status Elements */
        .month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 15px; }
        .month-chip { border: 2px solid #e2e8f0; padding: 15px 10px; border-radius: 12px; text-align: center; background: #f8fafc; transition: 0.3s; }
        .month-chip.paid-online { background: #dcfce7; border-color: #86efac; color: #166534; }
        .month-chip.paid-manual { background: #fef9c3; border-color: #fde047; color: #854d0e; }
        .month-chip.unpaid { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .section-title { font-size: 1.2rem; border-bottom: 2px solid var(--primary); padding-bottom: 8px; margin-bottom: 20px; display: inline-block; color: var(--text);}
        
        /* Alert Modal */
        .alert-box { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); text-align: center; max-width: 400px; width: 90%; margin: 20vh auto; }
        .alert-icon { font-size: 4rem; margin-bottom: 15px; }
        .alert-success { color: var(--success); }
        .alert-danger { color: var(--danger); }
    </style>
</head>
<body>

<!-- لودینگ تمام صفحه (فقط برای درگاه و وریفای) -->
<div id="full-loader" style="display: none;">
    <div class="spinner-large"></div>
    <p id="full-loader-text" style="margin-top: 15px; font-weight: 700; color: var(--primary);">لطفاً شکیبا باشید...</p>
</div>

<!-- صفحه ورود -->
<div class="container" id="login-view">
    <div class="card" style="max-width: 450px; margin: 8vh auto; text-align: center; padding: 40px 30px;">
        <i class="fas fa-user-graduate" style="font-size: 3.5rem; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>ورود به پورتال مالی</h2>
        <p style="color: var(--text-light); font-size: 0.95rem; margin-bottom: 20px;">جهت پرداخت شهریه، کد ملی خود را وارد نمایید.</p>
        <input type="text" id="national-id" class="form-input" placeholder="کد ملی ۱۰ رقمی" maxlength="10" inputmode="numeric">
        <button class="btn btn-primary" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> ورود به سامانه
        </button>
    </div>
</div>

<!-- داشبورد کلاس‌ها -->
<div class="container" id="dashboard-view" style="display: none;">
    <div class="header-bar">
        <h3 id="welcome-msg" style="color: var(--primary);"><i class="fas fa-user-circle"></i> خوش آمدید</h3>
        <button class="btn" style="background:#ef4444; width:auto; padding:8px 20px;" onclick="logout()">
            <i class="fas fa-power-off"></i> خروج
        </button>
    </div>
    
    <!-- محل قرارگیری لودینگ داخلی -->
    <div id="inline-loading" class="inline-loader" style="display: none;">
        <div class="sk-cube-grid">
            <div class="sk-cube sk-cube1"></div><div class="sk-cube sk-cube2"></div><div class="sk-cube sk-cube3"></div>
            <div class="sk-cube sk-cube4"></div><div class="sk-cube sk-cube5"></div><div class="sk-cube sk-cube6"></div>
            <div class="sk-cube sk-cube7"></div><div class="sk-cube sk-cube8"></div><div class="sk-cube sk-cube9"></div>
        </div>
        <h4 style="color: var(--primary);">در حال دریافت اطلاعات مالی...</h4>
    </div>

    <!-- کلاس‌های جاری -->
    <div id="active-classes-container"></div>

    <!-- بایگانی کلاس‌ها -->
    <div id="archived-classes-container" style="margin-top: 40px;"></div>
</div>

<!-- پیام تایید یا خطا بعد از بازگشت از درگاه -->
<div id="result-view" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; overflow-y: auto;">
    <div class="alert-box" id="result-box"></div>
</div>

<script>
    // ==========================================
    // ⚠️ لینک Web App جدید خود را در خط زیر قرار دهید:
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKSlAF0qwqH3eDufnJotO5aN_cf6RmEHA0ZocxP3Ed5A2QPzrLnBx8dZJ3JIZf-e8v/exec"; 

    const toggleFullLoader = (show, text = 'لطفاً شکیبا باشید...') => {
        document.getElementById('full-loader').style.display = show ? 'flex' : 'none';
        document.getElementById('full-loader-text').innerText = text;
    };
    
    const toggleInlineLoader = (show) => {
        document.getElementById('inline-loading').style.display = show ? 'flex' : 'none';
        document.getElementById('active-classes-container').style.display = show ? 'none' : 'block';
        document.getElementById('archived-classes-container').style.display = show ? 'none' : 'block';
    };

    // Date Logic
    function formatDateStr(dateStr) {
        if (!dateStr) return '';
        return String(dateStr).split('T')[0].replace(/-/g, '/');
    }
    
    function getMonthPeriods(startDateStr, endDateStr) {
        const periods = [];
        if(!startDateStr) return periods;
        
        let sp = formatDateStr(startDateStr).split('/');
        let startDaysCalc = parseInt(sp[0]) * 365 + parseInt(sp[1]) * 30 + parseInt(sp[2]);
        
        let endDaysCalc;
        if (endDateStr && endDateStr !== '') {
            let ep = formatDateStr(endDateStr).split('/');
            endDaysCalc = parseInt(ep[0]) * 365 + parseInt(ep[1]) * 30 + parseInt(ep[2]);
        } else {
            const today = new Date();
            const tp = new Intl.DateTimeFormat('fa-IR', { year: 'numeric', month: 'numeric', day: 'numeric' }).format(today).replace(/[۰-۹]/g, w => '۰۱۲۳۴۵۶۷۸۹'.indexOf(w)).split('/');
            endDaysCalc = parseInt(tp[0]) * 365 + parseInt(tp[1]) * 30 + parseInt(tp[2]);
        }

        let diffDays = endDaysCalc - startDaysCalc;
        if(diffDays < 0) diffDays = 0;
        let monthsPassed = Math.floor(diffDays / 30) + 1; 
        
        for(let i = 0; i < monthsPassed; i++) {
            let m = parseInt(sp[1]) + i; let y = parseInt(sp[0]);
            while(m > 12) { m -= 12; y += 1; }
            periods.push({ index: i, label: `ماه ${i + 1}`, date: `${y}/${String(m).padStart(2,'0')}` });
        }
        return periods;
    }

    async function apiCall(action, payload = {}) {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, ...payload })
        });
        return await response.json();
    }

    // بررسی آدرس بازگشتی
    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const authority = urlParams.get('Authority');
        const status = urlParams.get('Status');
        
        if (authority && status) {
            document.getElementById('login-view').style.display = 'none';
            toggleFullLoader(true, 'در حال استعلام نتیجه از بانک...');
            
            if (status === 'OK') {
                try {
                    const res = await apiCall('verifyPayment', { authority: authority });
                    if(res.success) {
                        showResultModal(true, `پرداخت موفق!<br><br><span style="font-size:0.9rem; color:#666;">شماره پیگیری: <b>${res.refId}</b></span>`);
                    } else {
                        showResultModal(false, res.message);
                    }
                } catch(e) { showResultModal(false, `خطا در ارتباط با سرور`); }
            } else {
                showResultModal(false, 'پرداخت توسط شما لغو شد.');
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (localStorage.getItem('traineeId')) {
            loadDashboard();
        }
    };

    function showResultModal(isSuccess, message) {
        toggleFullLoader(false);
        const resultView = document.getElementById('result-view');
        const resultBox = document.getElementById('result-box');
        resultView.style.display = 'block';
        
        const icon = isSuccess ? '<i class="fas fa-check-circle alert-icon alert-success"></i>' : '<i class="fas fa-times-circle alert-icon alert-danger"></i>';
        const title = isSuccess ? '<h2 style="color:var(--success)">تراکنش موفق</h2>' : '<h2 style="color:var(--danger)">تراکنش ناموفق</h2>';
        
        resultBox.innerHTML = `
            ${icon} ${title}
            <p style="margin: 15px 0; font-size:1.05rem;">${message}</p>
            <button class="btn btn-primary" onclick="closeResultModal()" style="margin-top:20px;">متوجه شدم</button>
        `;
    }

    function closeResultModal() {
        document.getElementById('result-view').style.display = 'none';
        if (localStorage.getItem('traineeId')) loadDashboard();
        else document.getElementById('login-view').style.display = 'block';
    }

    async function login() {
        const nId = document.getElementById('national-id').value.trim();
        if(!/^\d{10}$/.test(nId)) return alert('لطفاً کد ملی ۱۰ رقمی وارد کنید.');
        
        toggleFullLoader(true, 'در حال بررسی اطلاعات...');
        try {
            const res = await apiCall('studentLogin', { nationalId: nId });
            if(res.success) {
                localStorage.setItem('traineeId', res.traineeId);
                localStorage.setItem('traineeName', res.name);
                loadDashboard();
            } else { alert(res.message); }
        } catch(e) { alert('خطا در ارتباط با سرور'); } 
        finally { toggleFullLoader(false); }
    }
    
    function logout() { localStorage.clear(); location.reload(); }

    async function loadDashboard() {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('dashboard-view').style.display = 'block';
        document.getElementById('welcome-msg').innerHTML = `<i class="fas fa-user-circle"></i> سلام، ${localStorage.getItem('traineeName')}`;
        
        toggleInlineLoader(true);
        try {
            const res = await apiCall('getStudentDashboard', { traineeId: localStorage.getItem('traineeId') });
            if(res.success) renderClasses(res.classes);
            else alert(res.message);
        } catch(e) { alert('خطا در دریافت کلاس‌ها'); } 
        finally { toggleInlineLoader(false); }
    }

    function renderClasses(classes) {
        const activeContainer = document.getElementById('active-classes-container');
        const archivedContainer = document.getElementById('archived-classes-container');
        
        if(!classes || classes.length === 0) {
            activeContainer.innerHTML = `<div class="card empty-state"><i class="fas fa-folder-open"></i><h3>کلاسی یافت نشد</h3></div>`;
            archivedContainer.innerHTML = '';
            return;
        }

        let activeHtml = '<h3 class="section-title"><i class="fas fa-chalkboard-teacher"></i> کلاس‌های جاری و بدهی‌ها</h3>';
        let archivedHtml = '<h3 class="section-title" style="color:#64748b; border-color:#64748b;"><i class="fas fa-archive"></i> سوابق دوره‌ها (تسویه شده)</h3>';
        let hasActive = false, hasArchived = false;

        classes.forEach(cls => {
            const periods = getMonthPeriods(cls.startDate, cls.status === 'active' ? null : cls.endDate);
            let unpaidCount = 0;
            
            let monthsHtml = periods.map(p => {
                // بررسی دقیق پرداختی (هم دستی هم درگاه)
                const isPaid = cls.myPayments.find(x => parseInt(x.periodIndex) === p.index);
                
                if (isPaid) {
                    // تفکیک پرداخت دستی و آنلاین برای زیبایی بصری
                    const isManual = !isPaid.method || isPaid.method !== "درگاه آنلاین";
                    const chipClass = isManual ? "paid-manual" : "paid-online";
                    const icon = isManual ? "fa-money-bill-wave" : "fa-check";
                    const label = isManual ? "ثبت دستی / کارت" : "پرداخت آنلاین";
                    
                    return `
                    <div class="month-chip ${chipClass}">
                        <strong style="font-size:1.1rem;">${p.label}</strong><br>
                        <small style="color:#475569; font-size:0.8rem;">${p.date}</small><br>
                        <div style="margin-top:10px; font-weight:700;"><i class="fas ${icon}"></i> ${label}</div>
                        <div style="font-size:0.75rem; margin-top:5px; opacity:0.8;">پیگیری: ${isPaid.tracking || 'ندارد'}</div>
                    </div>`;
                } else {
                    unpaidCount++;
                    return `
                    <div class="month-chip unpaid">
                        <strong style="font-size:1.1rem;">${p.label}</strong><br>
                        <small style="color:var(--text-light); font-size:0.8rem;">${p.date}</small><br>
                        <button class="btn btn-success" style="padding:8px; font-size:0.9rem; margin-top:12px; border-radius:8px;" 
                                onclick="payMonth('${cls.id}', ${p.index})">
                            <i class="fas fa-credit-card"></i> پرداخت شهریه
                        </button>
                    </div>`;
                }
            }).join('');
            
            if(periods.length === 0) monthsHtml = '<p style="text-align:center; width:100%; color:#64748b;">زمان زیادی از کلاس نگذشته است.</p>';

            // منطق بایگانی: اگر کلاس بایگانی شده باشد، یا کلاس پایان‌یافته باشد و هیچ بدهی نداشته باشد
            const isArchived = cls.status === 'archived' || (cls.status === 'finished' && unpaidCount === 0);

            const cardHtml = `
            <div class="card" style="${isArchived ? 'background: #f8fafc; opacity:0.9;' : ''}">
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #e2e8f0; padding-bottom:15px; margin-bottom:15px; flex-wrap:wrap;">
                    <h4 style="margin:0; color:var(--primary); font-size:1.2rem;">${cls.title}</h4>
                    <span class="badge ${isArchived ? 'badge-archived' : 'badge-active'}">${isArchived ? 'پایان دوره' : 'جاری'}</span>
                </div>
                <div style="background:#f1f5f9; padding:8px 15px; border-radius:8px; font-size:0.85rem; color:#475569; margin-bottom:15px;">
                    مربی: <strong>${cls.trainerName}</strong> | شروع: <span dir="ltr">${formatDateStr(cls.startDate)}</span>
                </div>
                <div class="month-grid">${monthsHtml}</div>
            </div>`;

            if(isArchived) { hasArchived = true; archivedHtml += cardHtml; } 
            else { hasActive = true; activeHtml += cardHtml; }
        });
        
        activeContainer.innerHTML = hasActive ? activeHtml : '<p style="color:#64748b;">هیچ کلاسی در جریان نیست.</p>';
        archivedContainer.innerHTML = hasArchived ? archivedHtml : '';
    }

    async function payMonth(classId, periodIndex) {
        toggleFullLoader(true, 'در حال انتقال به درگاه شاپرک...');
        try {
            const res = await apiCall('requestPayment', {
                traineeId: localStorage.getItem('traineeId'),
                classId: classId,
                periodIndex: periodIndex
            });
            if(res.success) window.location.href = res.paymentUrl;
            else { alert('خطای درگاه: ' + res.message); toggleFullLoader(false); }
        } catch(e) { alert('خطا در ارتباط'); toggleFullLoader(false); }
    }
</script>
</body>
</html>
