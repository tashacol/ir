<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتال پرداخت شهریه</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap');
        :root { 
            --primary: #2563eb; --primary-hover: #1d4ed8; 
            --success: #16a34a; --danger: #dc2626; --warning: #d97706;
            --bg: #f1f5f9; --card: #ffffff; --text: #334155; --text-light: #64748b;
        }
        * { box-sizing: border-box; font-family: 'Vazirmatn', Tahoma, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        
        /* Loading Overlay */
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.92); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .spinner { width: 45px; height: 45px; border: 4px solid #cbd5e1; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader-text { margin-top: 15px; font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        
        /* Typography & Forms */
        h2 { color: var(--primary); margin-bottom: 10px; font-weight: 800; }
        .form-input { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 1.2rem; letter-spacing: 3px; outline: none; transition: 0.3s; font-weight: bold; color: var(--text);}
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; cursor: pointer; transition: 0.3s; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #15803d; transform: translateY(-2px); }
        
        /* Status Elements */
        .month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 15px; }
        .month-chip { border: 2px solid #e2e8f0; padding: 15px 10px; border-radius: 12px; text-align: center; background: #f8fafc; transition: 0.3s; }
        .month-chip.paid { background: #dcfce7; border-color: #86efac; color: #166534; }
        .month-chip.unpaid { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; }
        .badge-active { background: #dbeafe; color: #1e40af; }
        .badge-archived { background: #f1f5f9; color: #475569; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
        .empty-state i { font-size: 3.5rem; margin-bottom: 15px; color: #cbd5e1; }
        
        /* Alert Modal */
        .alert-box { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); text-align: center; max-width: 400px; width: 90%; margin: 20vh auto; }
        .alert-icon { font-size: 4rem; margin-bottom: 15px; }
        .alert-success { color: var(--success); }
        .alert-danger { color: var(--danger); }

        /* Skeleton Loading Styles */
        .skeleton-card {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        .skeleton-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .skeleton-box {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-title {
            width: 60%;
            height: 24px;
        }
        .skeleton-badge {
            width: 80px;
            height: 24px;
        }
        .skeleton-line {
            width: 100%;
            height: 16px;
            margin-bottom: 10px;
        }
        .skeleton-line.short {
            width: 70%;
        }
        .skeleton-meta {
            background: var(--bg);
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }
        .skeleton-meta .skeleton-line {
            width: 30%;
            height: 14px;
        }
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .skeleton-chip {
            border: 2px solid #e2e8f0;
            padding: 15px 10px;
            border-radius: 12px;
            background: #f8fafc;
            height: 100px;
        }
    </style>
</head>
<body>

<div id="loader" style="display: none;">
    <div class="spinner"></div>
    <p id="loader-text">در حال پردازش...</p>
</div>

<!-- صفحه ورود -->
<div class="container" id="login-view">
    <div class="card" style="max-width: 450px; margin: 8vh auto; text-align: center; padding: 40px 30px;">
        <i class="fas fa-user-graduate" style="font-size: 3.5rem; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>ورود به پورتال مالی</h2>
        <p style="color: var(--text-light); font-size: 0.95rem; margin-bottom: 20px;">برای مشاهده وضعیت شهریه کلاس‌ها، کد ملی ۱۰ رقمی خود را وارد کنید.</p>
        <input type="text" id="national-id" class="form-input" placeholder="کدملی" maxlength="10" inputmode="numeric">
        <button class="btn btn-primary" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> ورود به سامانه
        </button>
    </div>
</div>

<!-- داشبورد کلاس‌ها -->
<div class="container" id="dashboard-view" style="display: none;">
    <div class="header-bar">
        <h3 id="welcome-msg" style="color: var(--primary);"><i class="fas fa-user-circle"></i> خوش آمدید</h3>
        <button class="btn" style="background:#ef4444; width:auto; padding:8px 20px;" onclick="logout()">
            <i class="fas fa-power-off"></i> خروج از حساب
        </button>
    </div>
    
    <div id="classes-container"></div>
</div>

<!-- پیام تایید یا خطا بعد از بازگشت از درگاه -->
<div id="result-view" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; overflow-y: auto;">
    <div class="alert-box" id="result-box">
        <!-- محتوای جاوااسکریپت تزریق می‌شود -->
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ لینک Web App خود را دقیقاً در خط زیر قرار دهید:
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKSlAF0qwqH3eDufnJotO5aN_cf6RmEHA0ZocxP3Ed5A2QPzrLnBx8dZJ3JIZf-e8v/exec"; 

    // توابع نمایش لودینگ
    const toggleLoader = (show, text = 'در حال پردازش...') => {
        document.getElementById('loader').style.display = show ? 'flex' : 'none';
        document.getElementById('loader-text').innerText = text;
    };

    // محاسبات تاریخ دقیقاً مانند پنل ادمین
    function formatDateStr(dateStr) {
        if (!dateStr) return '';
        return String(dateStr).split('T')[0].replace(/-/g, '/');
    }
    
    function getMonthPeriods(startDateStr, endDateStr) {
        const periods = [];
        if(!startDateStr) return periods;
        
        let sp = formatDateStr(startDateStr).split('/');
        let startDaysCalc = parseInt(sp[0]) * 365 + parseInt(sp[1]) * 30 + parseInt(sp[2]);
        
        let endDaysCalc;
        if (endDateStr && endDateStr !== '') {
            let ep = formatDateStr(endDateStr).split('/');
            endDaysCalc = parseInt(ep[0]) * 365 + parseInt(ep[1]) * 30 + parseInt(ep[2]);
        } else {
            const today = new Date();
            const tp = new Intl.DateTimeFormat('fa-IR', { year: 'numeric', month: 'numeric', day: 'numeric' }).format(today).replace(/[۰-۹]/g, w => '۰۱۲۳۴۵۶۷۸۹'.indexOf(w)).split('/');
            endDaysCalc = parseInt(tp[0]) * 365 + parseInt(tp[1]) * 30 + parseInt(tp[2]);
        }

        let diffDays = endDaysCalc - startDaysCalc;
        if(diffDays < 0) diffDays = 0;
        
        let monthsPassed = Math.floor(diffDays / 30) + 1; 
        
        for(let i = 0; i < monthsPassed; i++) {
            let m = parseInt(sp[1]) + i;
            let y = parseInt(sp[0]);
            while(m > 12) { m -= 12; y += 1; }
            periods.push({
                index: i, label: `ماه ${i + 1}`, date: `${y}/${String(m).padStart(2,'0')}`
            });
        }
        return periods;
    }

    // ارتباط با سرور
    async function apiCall(action, payload = {}) {
        if(SCRIPT_URL === "YOUR_WEB_APP_URL") {
            alert("خطا: لینک SCRIPT_URL در فایل HTML تنظیم نشده است!");
            throw new Error("Missing SCRIPT_URL");
        }
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, ...payload })
        });
        const result = await response.json();
        return result;
    }

    // بررسی بازگشت از درگاه در زمان بارگذاری صفحه
    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const authority = urlParams.get('Authority');
        const status = urlParams.get('Status');
        
        if (authority && status) {
            document.getElementById('login-view').style.display = 'none';
            toggleLoader(true, 'در حال استعلام نتیجه پرداخت از بانک...');
            
            if (status === 'OK') {
                try {
                    const res = await apiCall('verifyPayment', { authority: authority });
                    if(res.success) {
                        showResultModal(true, `پرداخت با موفقیت انجام شد!<br><br><span style="font-size:0.9rem; color:#666;">شماره پیگیری: <b style="color:#000;">${res.refId}</b></span>`);
                    } else {
                        showResultModal(false, res.message);
                    }
                } catch(e) {
                    showResultModal(false, `خطا در ارتباط با سرور: ${e.message}`);
                }
            } else {
                showResultModal(false, 'پرداخت توسط شما لغو شد یا درگاه با خطا مواجه گردید.');
            }
            // پاکسازی URL برای جلوگیری از رفرش مجدد
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (localStorage.getItem('traineeId')) {
            loadDashboard();
        }
    };

    function showResultModal(isSuccess, message) {
        toggleLoader(false);
        const resultView = document.getElementById('result-view');
        const resultBox = document.getElementById('result-box');
        resultView.style.display = 'block';
        
        const icon = isSuccess ? '<i class="fas fa-check-circle alert-icon alert-success"></i>' : '<i class="fas fa-times-circle alert-icon alert-danger"></i>';
        const title = isSuccess ? '<h2 style="color:var(--success)">تراکنش موفق</h2>' : '<h2 style="color:var(--danger)">تراکنش ناموفق</h2>';
        
        resultBox.innerHTML = `
            ${icon}
            ${title}
            <p style="margin: 15px 0; font-size:1.05rem;">${message}</p>
            <button class="btn btn-primary" onclick="closeResultModal()" style="margin-top:20px;">متوجه شدم</button>
        `;
    }

    function closeResultModal() {
        document.getElementById('result-view').style.display = 'none';
        if (localStorage.getItem('traineeId')) {
            loadDashboard();
        } else {
            document.getElementById('login-view').style.display = 'block';
        }
    }

    // ورود به سامانه
    async function login() {
        const nId = document.getElementById('national-id').value.trim();
        if(!/^\d{10}$/.test(nId)) return alert('لطفاً کد ملی را به صورت دقیق و ۱۰ رقمی وارد کنید.');
        
        toggleLoader(true, 'در حال احراز هویت...');
        try {
            const res = await apiCall('studentLogin', { nationalId: nId });
            if(res.success) {
                localStorage.setItem('traineeId', res.traineeId);
                localStorage.setItem('traineeName', res.name);
                loadDashboard();
            } else {
                alert(res.message);
            }
        } catch(e) {
            alert('خطا در ارتباط با سرور');
        } finally {
            toggleLoader(false);
        }
    }
    
    function logout() {
        localStorage.clear();
        location.reload();
    }

    // نمایش لودینگ استخوانی (Skeleton Loader) در کانتینر کلاس‌ها
    function showSkeletonLoader() {
        const container = document.getElementById('classes-container');
        // ایجاد ۲ کارت اسکلت برای شبیه‌سازی بارگذاری
        let skeletonHTML = '';
        for (let i = 0; i < 2; i++) {
            skeletonHTML += `
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton-box skeleton-title"></div>
                        <div class="skeleton-box skeleton-badge"></div>
                    </div>
                    <div class="skeleton-meta">
                        <div class="skeleton-box skeleton-line" style="width:40%;"></div>
                        <div class="skeleton-box skeleton-line" style="width:40%;"></div>
                    </div>
                    <div class="skeleton-box skeleton-line short" style="width:30%; height:18px; margin-bottom:15px;"></div>
                    <div class="skeleton-grid">
                        <div class="skeleton-chip skeleton-box"></div>
                        <div class="skeleton-chip skeleton-box"></div>
                        <div class="skeleton-chip skeleton-box"></div>
                        <div class="skeleton-chip skeleton-box"></div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = skeletonHTML;
    }

    // دریافت و نمایش کلاس‌ها
    async function loadDashboard() {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('dashboard-view').style.display = 'block';
        document.getElementById('welcome-msg').innerHTML = `<i class="fas fa-user-circle"></i> سلام، ${localStorage.getItem('traineeName')}`;
        
        // نمایش لودینگ استخوانی در کانتینر کلاس‌ها قبل از دریافت اطلاعات
        showSkeletonLoader();
        
        try {
            const res = await apiCall('getStudentDashboard', { traineeId: localStorage.getItem('traineeId') });
            if(res.success) {
                renderClasses(res.classes);
            } else {
                alert(res.message);
            }
        } catch(e) {
            alert('خطا در دریافت اطلاعات کلاس‌ها');
        } finally {
            // لودینگ اصلی دیگر اینجا نیاز نیست چون skeleton جایگزین شده
            // اما اگر جای دیگری toggleLoader(true) شده باشد، پاک می‌کنیم
            toggleLoader(false);
        }
    }

    function renderClasses(classes) {
        const container = document.getElementById('classes-container');
        if(!classes || classes.length === 0) {
            container.innerHTML = `
                <div class="card empty-state">
                    <i class="fas fa-folder-open"></i>
                    <h3>شما در هیچ کلاسی ثبت‌نام نشده‌اید</h3>
                    <p>در صورت بروز اشتباه با پشتیبانی تماس بگیرید.</p>
                </div>`;
            return;
        }

        let html = '';
        classes.forEach(cls => {
            const periods = getMonthPeriods(cls.startDate, cls.status === 'active' ? null : cls.endDate);
            const statusBadge = cls.status === 'active' ? '<span class="badge badge-active">🟢 کلاس در حال برگزاری</span>' : '<span class="badge badge-archived">🟡 کلاس پایان یافته</span>';
            
            let monthsHtml = periods.map(p => {
                const isPaid = cls.myPayments.find(x => parseInt(x.periodIndex) === p.index);
                
                if (isPaid) {
                    return `
                    <div class="month-chip paid">
                        <strong style="font-size:1.1rem;">${p.label}</strong><br>
                        <small style="color:var(--text-light); font-size:0.8rem;">${p.date}</small><br>
                        <div style="margin-top:10px; font-weight:700;"><i class="fas fa-check"></i> پرداخت شده</div>
                        <div style="font-size:0.7rem; margin-top:5px; color:#166534;">پیگیری: ${isPaid.tracking || 'ثبت دستی'}</div>
                    </div>`;
                } else {
                    return `
                    <div class="month-chip unpaid">
                        <strong style="font-size:1.1rem;">${p.label}</strong><br>
                        <small style="color:var(--text-light); font-size:0.8rem;">${p.date}</small><br>
                        <button class="btn btn-success" style="padding:8px; font-size:0.9rem; margin-top:12px; border-radius:8px;" 
                                onclick="payMonth('${cls.id}', ${p.index})">
                            <i class="fas fa-credit-card"></i> پرداخت شهریه
                        </button>
                    </div>`;
                }
            }).join('');
            
            if(periods.length === 0) monthsHtml = '<p style="text-align:center; width:100%; color:var(--text-light);">زمان زیادی از شروع کلاس نگذشته و شهریه‌ای ثبت نشده است.</p>';

            html += `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e2e8f0; padding-bottom:15px; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                    <h4 style="margin:0; color:var(--primary); font-size:1.3rem;"><i class="fas fa-chalkboard"></i> ${cls.title}</h4>
                    ${statusBadge}
                </div>
                <div style="background:var(--bg); padding:10px 15px; border-radius:10px; font-size:0.9rem; color:var(--text-light); margin-bottom:20px;">
                    <i class="fas fa-chalkboard-teacher"></i> مربی: <strong style="color:var(--text);">${cls.trainerName}</strong> &nbsp;|&nbsp; 
                    <i class="fas fa-calendar-alt"></i> تاریخ شروع: <strong style="color:var(--text);" dir="ltr">${formatDateStr(cls.startDate)}</strong>
                </div>
                <h5 style="color: var(--text); font-size:1.1rem;"><i class="fas fa-money-check-alt"></i> وضعیت مالی ماه‌ها:</h5>
                <div class="month-grid">
                    ${monthsHtml}
                </div>
            </div>`;
        });
        
        container.innerHTML = html;
    }

    // درخواست انتقال به درگاه پرداخت
    async function payMonth(classId, periodIndex) {
        toggleLoader(true, 'در حال ایجاد فاکتور امن در زرین‌پال...');
        try {
            const res = await apiCall('requestPayment', {
                traineeId: localStorage.getItem('traineeId'),
                classId: classId,
                periodIndex: periodIndex
            });
            
            if(res.success) {
                // انتقال مستقیم به زرین‌پال
                window.location.href = res.paymentUrl;
            } else {
                alert('خطا در ارتباط با درگاه: ' + res.message);
                toggleLoader(false);
            }
        } catch(e) {
            alert('خطا در ایجاد فاکتور');
            toggleLoader(false);
        }
    }
</script>
</body>
</html>
