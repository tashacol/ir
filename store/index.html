<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه محصولات ارگانیک تعالی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap');
        :root { --primary: #16a34a; --primary-dark: #15803d; --bg-main: #f8fafc; --card-bg: #ffffff; --text-main: #334155; --text-light: #64748b; --danger: #ef4444; --shadow: 0 4px 20px rgba(0,0,0,0.06); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); }
        
        header { background: var(--card-bg); padding: 15px 20px; box-shadow: var(--shadow); position: sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .nav-actions { display: flex; gap: 15px; }
        .btn-icon { background: none; border: none; font-size: 1.5rem; color: var(--text-main); cursor: pointer; position: relative;}
        .badge { position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; font-size: 0.75rem; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight:bold;}
        
        .search-box { max-width: 600px; margin: 30px auto; display: flex; padding: 0 20px; }
        .search-box input { flex-grow: 1; padding: 15px; border: 2px solid #e2e8f0; border-radius: 0 10px 10px 0; font-size: 1rem; outline:none; font-family:inherit;}
        .search-box button { padding: 15px 25px; background: var(--primary); color: white; border: none; border-radius: 10px 0 0 10px; cursor: pointer; font-size: 1.1rem; transition:0.3s;}
        .search-box button:hover { background: var(--primary-dark); }
        
        .grid { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: var(--shadow); text-align: center; position: relative; border:1px solid #f1f5f9; transition:0.3s;}
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(22, 163, 74, 0.15); }
        .discount { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; font-weight:bold;}
        .card i.prod-img { font-size: 4rem; color: var(--primary); margin: 20px 0; }
        .card h3 { margin-bottom: 10px; }
        .price-box { margin: 15px 0; }
        .price { font-size: 1.2rem; font-weight: bold; color: var(--primary-dark); }
        .old-price { text-decoration: line-through; color: #94a3b8; font-size: 0.9rem; margin-right: 10px; }
        .btn-add { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; font-family:inherit;}
        .btn-add:hover:not(:disabled) { background: var(--primary-dark); }
        .btn-add:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);}
        .modal-content { background: white; width: 95%; max-width: 500px; padding: 30px; border-radius: 15px; max-height: 90vh; overflow-y: auto; position: relative;}
        .form-control { width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit;}
        
        #loader { position: fixed; inset:0; background: rgba(255,255,255,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 15px;"></i>
        <p id="loader-text">در حال ارتباط با سرور مرکزی...</p>
    </div>

    <header>
        <div class="logo"><i class="fab fa-envira"></i> ارگانیک تعالی</div>
        <div class="nav-actions">
            <button class="btn-icon" onclick="openModal('track-modal')" title="پیگیری سفارشات من"><i class="fas fa-truck-fast"></i></button>
            <button class="btn-icon" onclick="openModal('cart-modal')" title="سبد خرید">
                <i class="fas fa-shopping-basket"></i>
                <span class="badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="جستجوی محصول (مانند: عسل، روغن زیتون)...">
        <button onclick="searchServer()"><i class="fas fa-search"></i> جستجو</button>
    </div>

    <div class="grid" id="products-grid"></div>

    <!-- سبد خرید -->
    <div class="modal-overlay" id="cart-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h3 style="color:var(--primary)"><i class="fas fa-shopping-basket"></i> سبد خرید شما</h3>
                <button onclick="closeModal('cart-modal')" style="background:none;border:none;font-size:1.5rem;color:#ef4444;cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div id="cart-items" style="margin-bottom: 20px;"></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem; border-top:1px solid #e2e8f0; padding-top:15px; margin-bottom:20px;">
                <span>مبلغ کل کالاها:</span><span id="cart-total" style="color:var(--primary-dark)">0 تومان</span>
            </div>
            <button class="btn-add" onclick="proceedToCheckout()" id="btn-checkout">تایید سفارش و تکمیل مشخصات</button>
        </div>
    </div>

    <!-- فرم تسویه حساب و ارسال اطلاعات -->
    <div class="modal-overlay" id="checkout-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px; color:var(--primary)"><i class="fas fa-map-marker-alt"></i> اطلاعات خریدار و ارسال</h3>
            <form id="checkoutForm" onsubmit="submitCheckout(event)">
                <label>نام و نام خانوادگی:</label>
                <input type="text" id="c_name" class="form-control" required placeholder="مثال: علی رضایی">
                
                <label>شماره موبایل (جهت پیگیری مرسوله):</label>
                <input type="text" id="c_phone" class="form-control" required placeholder="0913..." maxlength="11">
                
                <label>نحوه دریافت کالا:</label>
                <select id="c_shipping" class="form-control" required>
                    <option value="post">ارسال با پست پیشتاز به سراسر کشور</option>
                    <option value="tipax">ارسال با تیپاکس (کرایه در مقصد)</option>
                    <option value="in_person">تحویل حضوری در فروشگاه جیرفت</option>
                </select>
                
                <label>آدرس دقیق پستی:</label>
                <textarea id="c_address" class="form-control" rows="3" required placeholder="استان، شهر، خیابان، کوچه، پلاک، واحد"></textarea>
                
                <button type="submit" class="btn-add" style="margin-bottom:10px;"><i class="fas fa-credit-card"></i> اتصال امن به درگاه زرین‌پال</button>
                <button type="button" class="btn-add" style="background:#64748b;" onclick="closeModal('checkout-modal'); openModal('cart-modal')">بازگشت به سبد خرید</button>
            </form>
        </div>
    </div>

    <!-- پیگیری پیشرفته سفارش -->
    <div class="modal-overlay" id="track-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px; color:var(--primary)"><i class="fas fa-search-location"></i> پیگیری سفارشات شما</h3>
            <p style="font-size:0.9rem; color:#64748b; margin-bottom:15px;">برای مشاهده وضعیت بسته، کد رهگیری پستی و لیست خریدهایتان، شماره موبایلی که با آن خرید کرده‌اید را وارد کنید.</p>
            <input type="text" id="t_phone" class="form-control" placeholder="0913...">
            <button class="btn-add" onclick="trackOrder()"><i class="fas fa-search"></i> استعلام وضعیت</button>
            <div id="track-result" style="margin-top:20px;"></div>
            <button class="btn-add" style="background:#ef4444; margin-top:15px;" onclick="closeModal('track-modal')">بستن پنجره</button>
        </div>
    </div>

    <script>
        // آدرس اسکریپت دقیق شما:
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzX-P-JiyUYgUWhwljM0N6q8rfqjbRXuLyX5TYgt4BefD8yFU28VGBIdNXIB2n-advy/exec"; 
        
        let products = [];
        let cart = JSON.parse(localStorage.getItem('organic_cart')) || [];

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const authority = urlParams.get('Authority');
            const status = urlParams.get('Status');

            if (authority && status) {
                document.getElementById('loader').style.display = 'flex';
                document.getElementById('loader-text').innerText = 'در حال تایید نهایی پرداخت از سمت بانک...';
                
                if (status === 'OK') {
                    try {
                        let res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verify', authority: authority }) });
                        let data = await res.json();
                        if (data.status === 'success') {
                            alert('پرداخت شما با موفقیت تایید شد! کد دیجیتال مرجع بانک: ' + data.ref_id + '\nشما می‌توانید از طریق دکمه "پیگیری سفارش" وضعیت بسته خود را پیگیری کنید.');
                            cart = []; saveCart();
                        } else {
                            alert('خطا در تایید تراکنش بانکی: ' + data.message);
                        }
                    } catch(e) { alert('خطای ارتباط با سرور مرکزی!'); }
                } else {
                    alert('پرداخت توسط شما لغو شد.');
                }
                // پاک کردن پارامترهای پرداخت از مرورگر
                window.history.replaceState({}, document.title, window.location.pathname);
                document.getElementById('loader').style.display = 'none';
            }

            fetchProducts();
            updateCartUI();
        };

        async function fetchProducts() {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = 'در حال دریافت محصولات فروشگاه...';
            try {
                let res = await fetch(GAS_URL + "?action=getProducts");
                let data = await res.json();
                products = data.data;
                renderProducts(products);
            } catch(e) { alert("خطا در دریافت اطلاعات محصولات از انبار."); }
            document.getElementById('loader').style.display = 'none';
        }

        async function searchServer() {
            const query = document.getElementById('searchInput').value;
            if(!query) return fetchProducts();
            
            document.getElementById('loader').style.display = 'flex';
            try {
                let res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'search', query: query }) });
                let data = await res.json();
                renderProducts(data.data);
            } catch(e) { alert("خطا در جستجو."); }
            document.getElementById('loader').style.display = 'none';
        }

        function renderProducts(list) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            if(list.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:30px; background:white; border-radius:10px;">متاسفانه محصولی مطابق جستجوی شما یافت نشد.</p>';
                return;
            }
            
            list.forEach(p => {
                const price = Number(p.price);
                const discount = Number(p.discountPrice);
                const finalPrice = (discount > 0 && discount < price) ? discount : price;
                const outOfStock = Number(p.stock) <= 0;
                
                grid.innerHTML += `
                <div class="card">
                    ${discount > 0 && discount < price ? '<div class="discount">تخفیف ویژه</div>' : ''}
                    <i class="fas ${p.image || 'fa-box-open'} prod-img"></i>
                    <h3>${p.name}</h3>
                    <p style="font-size:0.85rem; color:#64748b; height:45px; overflow:hidden; margin-bottom:10px;">${p.description}</p>
                    <div class="price-box">
                        <span class="price">${finalPrice.toLocaleString('fa-IR')} تومان</span>
                        ${discount > 0 && discount < price ? `<br><span class="old-price">${price.toLocaleString('fa-IR')}</span>` : ''}
                    </div>
                    <button class="btn-add" onclick="addToCart('${p.id}')" ${outOfStock ? 'disabled' : ''}>
                        <i class="fas ${outOfStock ? 'fa-ban' : 'fa-cart-plus'}"></i> ${outOfStock ? 'ناموجود در انبار' : 'افزودن به سبد خرید'}
                    </button>
                </div>`;
            });
        }

        function addToCart(id) {
            const prod = products.find(p => p.id == id);
            const price = (prod.discountPrice > 0 && prod.discountPrice < prod.price) ? prod.discountPrice : prod.price;
            
            const existing = cart.find(i => i.id == id);
            if(existing) {
                if(existing.qty < prod.stock) {
                    existing.qty++;
                } else {
                    alert('موجودی انبار برای این محصول تمام شده است.');
                    return;
                }
            } else {
                cart.push({ id: prod.id, name: prod.name, price: price, qty: 1, stock: prod.stock });
            }
            saveCart(); openModal('cart-modal');
        }

        function changeQty(id, delta) {
            let item = cart.find(i => i.id == id);
            if(!item) return;
            item.qty += delta;
            if(item.qty <= 0) cart = cart.filter(i => i.id != id);
            else if(item.qty > item.stock) item.qty = item.stock;
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('organic_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, i) => sum + i.qty, 0);
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            
            if(cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b; padding:20px 0;"><i class="fas fa-shopping-basket fa-3x" style="color:#e2e8f0; margin-bottom:10px;"></i><br>سبد خرید شما خالی است.</p>';
                document.getElementById('btn-checkout').disabled = true;
            } else {
                document.getElementById('btn-checkout').disabled = false;
                cart.forEach(i => {
                    total += (i.price * i.qty);
                    container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #f1f5f9; padding-bottom:10px;">
                        <div>
                            <div style="font-weight:bold; font-size:0.95rem;">${i.name}</div>
                            <div style="color:var(--primary-dark); font-size:0.9rem;">${i.price.toLocaleString('fa-IR')} تومان</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:5px; background:#f8fafc; padding:5px; border-radius:8px;">
                            <button onclick="changeQty('${i.id}', 1)" style="border:none; background:none; font-size:1.2rem; color:var(--primary); cursor:pointer; width:25px;">+</button>
                            <span style="font-weight:bold; width:25px; text-align:center;">${i.qty}</span>
                            <button onclick="changeQty('${i.id}', -1)" style="border:none; background:none; font-size:1.2rem; color:#ef4444; cursor:pointer; width:25px;">-</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('cart-total').innerText = total.toLocaleString('fa-IR') + ' تومان';
        }

        function proceedToCheckout() { closeModal('cart-modal'); openModal('checkout-modal'); }

        async function submitCheckout(e) {
            e.preventDefault();
            const payload = {
                action: 'checkout',
                customerName: document.getElementById('c_name').value,
                phone: document.getElementById('c_phone').value,
                address: document.getElementById('c_address').value,
                shippingMethod: document.getElementById('c_shipping').value,
                cart: cart.map(i => ({ id: i.id, qty: i.qty })) 
            };

            closeModal('checkout-modal');
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = 'در حال صدور فاکتور امن و انتقال به درگاه پرداخت...';

            try {
                let res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                let data = await res.json();
                if(data.status === 'success') {
                    window.location.href = data.url; 
                } else {
                    alert('خطا در صدور فاکتور: ' + data.message);
                    document.getElementById('loader').style.display = 'none';
                }
            } catch(error) {
                alert('خطای ارتباط با سرور. لطفاً اینترنت خود را بررسی کنید.');
                document.getElementById('loader').style.display = 'none';
            }
        }

        async function trackOrder() {
            const phone = document.getElementById('t_phone').value;
            if(phone.length < 10) return alert('شماره موبایل را بصورت صحیح و کامل وارد کنید.');
            
            const resDiv = document.getElementById('track-result');
            resDiv.innerHTML = '<p style="text-align:center; color:#16a34a;"><i class="fas fa-spinner fa-spin"></i> در حال جستجو در دیتابیس...</p>';
            
            try {
                let res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'trackOrder', phone: phone }) });
                let data = await res.json();
                
                if(data.status === 'success' && data.data.length > 0) {
                    resDiv.innerHTML = data.data.map(o => {
                        let statusText = o.orderStatus === 'Shipped' ? '<span style="color:#16a34a; font-weight:bold;"><i class="fas fa-truck"></i> ارسال شده</span>' : 
                                         (o.orderStatus === 'Delivered' ? '<span style="color:#16a34a; font-weight:bold;"><i class="fas fa-check-circle"></i> تحویل شده</span>' : '<span style="color:#eab308; font-weight:bold;"><i class="fas fa-box"></i> در حال آماده‌سازی و بسته‌بندی</span>');
                        
                        let pStatusText = o.paymentStatus === 'Success' ? '<span style="color:green">موفق</span>' : '<span style="color:red">ناموفق</span>';

                        let trackCodeBox = o.trackingCode ? `<div style="background:#dcfce7; padding:10px; border-radius:8px; margin-top:12px; border:1px dashed #16a34a;"><strong>کد رهگیری پستی مرسوله:</strong> <br><span style="font-size:1.2rem; letter-spacing:2px; display:inline-block; margin-top:5px; font-weight:bold;">${o.trackingCode}</span></div>` : '';

                        // پارس کردن لیست اقلام از سبد خرید
                        let itemsHtml = '';
                        try {
                            let itemsList = JSON.parse(o.cart);
                            itemsHtml = itemsList.map(item => `<li style="margin-bottom:5px;">${item.name} <span style="color:#16a34a; font-size:0.8rem; font-weight:bold;">(${item.qty} عدد)</span></li>`).join('');
                        } catch(e) { itemsHtml = '<li>جزئیات نامشخص</li>'; }

                        return `
                        <div style="background:#f8fafc; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #e2e8f0; box-shadow:0 2px 5px rgba(0,0,0,0.02);">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #e2e8f0; padding-bottom:10px;">
                                <strong style="color:var(--primary-dark)">شماره سفارش: ${o.orderId}</strong>
                                <span style="font-size:0.8rem; color:#64748b">${o.date || ''}</span>
                            </div>
                            
                            <div style="background:white; padding:12px; border-radius:8px; margin-bottom:12px; border:1px solid #f1f5f9;">
                                <strong style="font-size:0.85rem; color:#64748b;"><i class="fas fa-list-ul"></i> اقلام خریداری شده:</strong>
                                <ul style="margin-right:25px; margin-top:8px; font-size:0.9rem;">${itemsHtml}</ul>
                            </div>
                            
                            <p style="font-size:0.9rem; margin-bottom:8px;"><strong>وضعیت پرداخت:</strong> ${pStatusText}</p>
                            <p style="font-size:0.9rem; margin-bottom:8px;"><strong>وضعیت بسته:</strong> ${statusText}</p>
                            <p style="font-size:0.9rem;"><strong>مبلغ پرداختی:</strong> ${Number(o.totalAmount).toLocaleString('fa-IR')} تومان</p>
                            ${trackCodeBox}
                        </div>`;
                    }).join('');
                } else {
                    resDiv.innerHTML = '<p style="color:#ef4444; background:#fee2e2; padding:12px; border-radius:8px; text-align:center;"><i class="fas fa-exclamation-triangle"></i> سفارشی با این شماره در سیستم یافت نشد.</p>';
                }
            } catch(e) {
                resDiv.innerHTML = '<p style="color:#ef4444; text-align:center;">خطا در برقراری ارتباط با دیتابیس.</p>';
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
