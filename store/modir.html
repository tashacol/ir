<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت | ارگانیک تعالی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: #f1f5f9; color: #334155; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        #login-box { max-width: 400px; margin: 100px auto; text-align: center; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 10px; outline: none; font-family: inherit;}
        button { padding: 10px 20px; background: #16a34a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%;}
        button:hover { background: #15803d; }
        .btn-small { padding: 8px 12px; width: auto; font-size: 0.9rem; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #e2e8f0; color: #475569; }
        .tab-btn.active { background: #16a34a; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: right; vertical-align: middle; }
        th { background: #f8fafc; color: #64748b; }
        .badge-success { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 6px; font-size:0.8rem; }
        .badge-danger { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 6px; font-size:0.8rem; }
        
        .overlay-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; font-size: 1.5rem; color: #16a34a; flex-direction: column;}
    </style>
</head>
<body>

    <div class="overlay-loader" id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:15px;">در حال پردازش...</p></div>

    <div class="container">
        <!-- فرم ورود -->
        <div class="box" id="login-box">
            <h2 style="margin-bottom:20px; color:#16a34a;">پنل مدیریت فروشگاه</h2>
            <input type="password" id="admin_pwd" placeholder="رمز عبور مدیریت">
            <button onclick="login()">ورود به پنل</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="box" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>مدیریت ارگانیک تعالی</h2>
                <button class="btn-small" onclick="fetchData()"><i class="fas fa-sync"></i> بروزرسانی صفحه</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('orders')">مدیریت سفارشات و ارسال</button>
                <button class="tab-btn" onclick="switchTab('products')">مدیریت انبار محصولات</button>
            </div>

            <!-- تب سفارشات -->
            <div id="orders" class="tab-content active box">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>سفارش و کالاها</th>
                                <th>مشتری</th>
                                <th>آدرس / هزینه</th>
                                <th>تغییر وضعیت / درج کد رهگیری پستی</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- تب محصولات -->
            <div id="products" class="tab-content box">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>محصول</th>
                                <th>موجودی انبار</th>
                                <th>نمایش در سایت</th>
                                <th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzX-P-JiyUYgUWhwljM0N6q8rfqjbRXuLyX5TYgt4BefD8yFU28VGBIdNXIB2n-advy/exec"; 
        let adminToken = "";

        function showLoader() { document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }

        function login() {
            adminToken = document.getElementById('admin_pwd').value;
            if(!adminToken) return alert('رمز عبور الزامی است.');
            fetchData();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function fetchData() {
            showLoader();
            try {
                let res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getAdminData', adminToken: adminToken }) });
                let data = await res.json();
                if(data.status === 'success') {
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    renderOrders(data.orders);
                    renderProducts(data.products);
                } else {
                    alert('خطا: ' + data.message);
                }
            } catch(e) { alert('خطا در ارتباط با سرور.'); }
            hideLoader();
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orders-tbody');
            tbody.innerHTML = '';
            orders.forEach(o => {
                let pStatus = o.paymentStatus === 'Success' ? '<span class="badge-success">پرداخت موفق</span>' : '<span class="badge-danger">ناموفق / در انتظار</span>';
                let items = "";
                try { items = JSON.parse(o.cart).map(i => `- ${i.name} (${i.qty} عدد)`).join('<br>'); } catch(e){}

                tbody.innerHTML += `
                <tr>
                    <td><strong>${o.orderId}</strong><br><small>${o.date}</small><br><div style="font-size:0.85rem; margin-top:5px; color:#15803d;">${items}</div></td>
                    <td>${o.customerName}<br><a href="tel:${o.phone}" style="font-size:0.9rem;text-decoration:none;">${o.phone}</a></td>
                    <td><div style="font-size:0.85rem; max-width:180px;">${o.address}</div><br><strong>${Number(o.totalAmount).toLocaleString('fa-IR')} تومان</strong><br>${pStatus}</td>
                    <td style="background: #f8fafc;">
                        <label style="font-size:0.8rem; font-weight:bold;">وضعیت بسته:</label>
                        <select id="status_${o.orderId}">
                            <option value="Processing" ${o.orderStatus==='Processing'?'selected':''}>در حال آماده‌سازی</option>
                            <option value="Shipped" ${o.orderStatus==='Shipped'?'selected':''}>ارسال شده</option>
                            <option value="Delivered" ${o.orderStatus==='Delivered'?'selected':''}>تحویل شده</option>
                        </select>
                        <label style="font-size:0.8rem; font-weight:bold;">کد رهگیری پستی/تیپاکس:</label>
                        <input type="text" id="track_${o.orderId}" value="${o.trackingCode || ''}" placeholder="مثال: 10423000...">
                        <button class="btn-small" onclick="saveOrder('${o.orderId}')"><i class="fas fa-save"></i> ذخیره اطلاعات ارسال</button>
                    </td>
                </tr>`;
            });
        }

        async function saveOrder(orderId) {
            const status = document.getElementById(`status_${orderId}`).value;
            const track = document.getElementById(`track_${orderId}`).value;
            showLoader();
            try {
                let res = await fetch(GAS_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'updateOrder', adminToken: adminToken, orderId: orderId, orderStatus: status, trackingCode: track })
                });
                let data = await res.json();
                if(data.status === 'success') alert('وضعیت سفارش و کد رهگیری با موفقیت ثبت شد و مشتری اکنون می‌تواند آن را ببیند.');
                else alert('خطا: ' + data.message);
            } catch(e) { alert('خطا در ارتباط.'); }
            hideLoader();
        }

        function renderProducts(products) {
            const tbody = document.getElementById('products-tbody');
            tbody.innerHTML = '';
            products.forEach(p => {
                tbody.innerHTML += `
                <tr>
                    <td><strong>${p.name}</strong><br><small>${Number(p.price).toLocaleString('fa-IR')} تومان</small></td>
                    <td><input type="number" id="stock_${p.id}" value="${p.stock}" style="width:100px; text-align:center;"></td>
                    <td>
                        <select id="pstatus_${p.id}">
                            <option value="active" ${p.status==='active'?'selected':''}>فعال</option>
                            <option value="inactive" ${p.status==='inactive'?'selected':''}>مخفی (غیرفعال)</option>
                        </select>
                    </td>
                    <td><button class="btn-small" onclick="saveProduct('${p.id}')"><i class="fas fa-save"></i> ذخیره انبار</button></td>
                </tr>`;
            });
        }

        async function saveProduct(productId) {
            const stock = document.getElementById(`stock_${productId}`).value;
            const status = document.getElementById(`pstatus_${productId}`).value;
            showLoader();
            try {
                let res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'updateProduct', adminToken: adminToken, productId: productId, stock: stock, status: status }) });
                let data = await res.json();
                if(data.status === 'success') alert('انبار با موفقیت آپدیت شد.');
                else alert('خطا: ' + data.message);
            } catch(e) { alert('خطا در ارتباط.'); }
            hideLoader();
        }
    </script>
</body>
</html>
