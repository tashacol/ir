<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه مدیریت هوشمند فروشگاه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://v1.fontapi.ir/css/Vazirmatn:100;200;300;400;500;600;700;800;900');
        html, body { font-family: 'Vazirmatn', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .hidden { display: none !important; }
        .modal-bg { background-color: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .tab-button.active { background-color: #2563eb; color: white; }
        .tab-content { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* استایل‌های انقضا */
        .expire-red { background-color: #fecaca !important; }
        .expire-yellow { background-color: #fef08a !important; }
        .expire-past { text-decoration: line-through; color: #6b7280; background-color: #e5e7eb !important; }
        /* بوم امضا */
        #signature-pad { border: 2px dashed #94a3b8; border-radius: 0.5rem; cursor: crosshair; background-color: #f8fafc;}
        /* منطقه مخفی برای پرینت */
        #invoice-print-area { position: absolute; left: -9999px; width: 800px; background: white; padding: 2rem; }
    </style>
</head>
<body class="text-slate-800">

    <!-- =========== صفحه راه‌اندازی اولیه =========== -->
    <div id="setup-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg">
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-lg transform transition-all">
            <div id="initial-options">
                <h2 class="text-2xl font-bold text-center text-blue-600 mb-6"><i class="fas fa-rocket mr-2"></i>شروع به کار با سامانه</h2>
                <div class="space-y-4">
                    <button onclick="showView('register-view')" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 text-lg">
                        <i class="fas fa-store"></i> راه‌اندازی فروشگاه جدید
                    </button>
                    <label class="w-full flex items-center justify-center gap-2 bg-slate-600 hover:bg-slate-700 text-white font-bold py-3 px-4 rounded-lg text-center cursor-pointer transition duration-200 text-lg">
                        <i class="fas fa-upload"></i> بارگذاری فایل پشتیبان (ورود)
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="App.importData(event)">
                    </label>
                </div>
            </div>
            <div id="register-view" class="hidden">
                <h3 class="text-xl font-bold mb-4">اطلاعات فروشگاه/شرکت</h3>
                <form id="register-form" class="grid grid-cols-1 sm:grid-cols-2 gap-4" onsubmit="App.registerStore(event)">
                    <input type="text" id="reg-name" placeholder="نام فروشگاه" required class="sm:col-span-2 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="reg-phone" placeholder="شماره تماس" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="reg-id" placeholder="شناسه ملی/شماره مجوز" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="reg-address" placeholder="آدرس" class="sm:col-span-2 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <select id="reg-currency" required class="sm:col-span-2 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50">
                        <option value="">واحد پول (غیرقابل تغییر)</option>
                        <option value="تومان">تومان</option>
                        <option value="ریال">ریال</option>
                    </select>
                    <div class="sm:col-span-2 flex gap-2 mt-4">
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">ثبت و شروع</button>
                        <button type="button" onclick="showView('initial-options')" class="w-full bg-slate-400 text-white font-bold py-2 rounded-lg">انصراف</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- =========== ساختار اصلی برنامه =========== -->
    <div id="main-app" class="hidden">
        <header class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-30">
            <div>
                <h1 id="header-store-name" class="text-xl font-bold text-blue-700">نام فروشگاه</h1>
                <p id="header-date" class="text-sm text-slate-500"></p>
            </div>
            <div class="flex items-center gap-2">
                 <button onclick="App.exportData()" class="bg-green-100 text-green-700 px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-green-200"><i class="fas fa-download"></i></button>
                 <span id="menu-toggle" class="md:hidden text-2xl cursor-pointer"><i class="fas fa-bars"></i></span>
            </div>
        </header>

        <div class="flex">
            <!-- منوی کنار (سایدبار) -->
            <aside id="sidebar" class="bg-slate-800 text-slate-200 w-64 min-h-screen fixed md:relative transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40">
                <nav class="p-4 space-y-2">
                    <a href="#" onclick="App.switchTab('pos')" class="tab-button flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-cash-register w-5"></i> فروش (POS)</a>
                    <a href="#" onclick="App.switchTab('products')" class="tab-button flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-boxes-stacked w-5"></i> محصولات و انبار</a>
                    <a href="#" onclick="App.switchTab('accounting')" class="tab-button flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-calculator w-5"></i> حسابداری</a>
                    <a href="#" onclick="App.switchTab('reports')" class="tab-button flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-chart-line w-5"></i> گزارشات</a>
                    <a href="#" onclick="App.switchTab('settings')" class="tab-button flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-slate-700 transition"><i class="fas fa-cogs w-5"></i> تنظیمات</a>
                </nav>
            </aside>
            <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden"></div>

            <!-- محتوای اصلی -->
            <main class="flex-1 p-4 sm:p-6 bg-slate-100">
                
                <!-- تب فروش (POS) -->
                <section id="tab-pos" class="tab-content hidden">
                    <!-- ... محتوای تب فروش در JS رندر می‌شود ... -->
                </section>

                <!-- تب محصولات و انبار -->
                <section id="tab-products" class="tab-content hidden">
                    <!-- ... محتوای تب محصولات در JS رندر می‌شود ... -->
                </section>

                <!-- تب حسابداری -->
                <section id="tab-accounting" class="tab-content hidden">
                    <!-- ... محتوای تب حسابداری در JS رندر می‌شود ... -->
                </section>

                 <!-- تب گزارشات -->
                <section id="tab-reports" class="tab-content hidden">
                    <!-- ... محتوای تب گزارشات در JS رندر می‌شود ... -->
                </section>

                <!-- تب تنظیمات -->
                <section id="tab-settings" class="tab-content hidden">
                    <!-- ... محتوای تب تنظیمات در JS رندر می‌شود ... -->
                </section>
            </main>
        </div>
    </div>
    
    <!-- =========== مودال‌ها (پنجره‌های پاپ‌آپ) =========== -->
    <div id="modal-container"></div>
    
    <!-- =========== منطقه مخفی برای ساخت عکس فاکتور =========== -->
    <div id="invoice-print-area">
        <div class="text-center border-b-2 border-black pb-4 mb-4">
            <h1 id="inv-store-name" class="text-3xl font-bold"></h1>
            <p id="inv-store-details" class="text-sm mt-2"></p>
            <div id="inv-status" class="mt-2 font-bold text-xl border-2 inline-block px-4 py-1 rounded"></div>
        </div>
        <div class="flex justify-between mb-4 text-sm">
            <div>
                <p>تاریخ: <span id="inv-date"></span></p>
                <p>ساعت: <span id="inv-time"></span></p>
            </div>
            <div>
                <p>خریدار: <span id="inv-buyer-name"></span></p>
                <p>شماره فاکتور: <span id="inv-id"></span></p>
            </div>
        </div>
        <table class="w-full border-collapse border border-black text-center mb-4 text-sm">
            <thead>
                <tr class="bg-gray-200"><th class="border border-black p-2">ردیف</th><th class="border border-black p-2">شرح کالا</th><th class="border border-black p-2">تعداد</th><th class="border border-black p-2">قیمت واحد</th><th class="border border-black p-2">تخفیف</th><th class="border border-black p-2">قیمت کل</th></tr>
            </thead>
            <tbody id="inv-items"></tbody>
        </table>
        <div id="inv-summary" class="flex flex-col items-end text-sm">
             <p>جمع کل: <span id="inv-subtotal"></span></p>
             <p>تخفیف کل: <span id="inv-total-discount"></span></p>
             <p class="font-bold text-lg border-t-2 border-black mt-2 pt-2">مبلغ قابل پرداخت: <span id="inv-total"></span></p>
        </div>
        <div class="mt-16 pt-8 flex justify-end">
            <div class="text-center w-64">
                <p class="mb-2">مهر و امضا</p>
                <img id="inv-signature-img" src="" class="mx-auto hidden" style="max-height: 80px;">
            </div>
        </div>
    </div>

    <!-- ================== اصل کد جاوا اسکریپت ================== -->
    <script>
        // IIFE برای جلوگیری از تداخل متغیرها
        (function() {

        /*
        =========================================
        1.  DB & State Management
            مدیریت دیتابیس IndexedDB و وضعیت کلی برنامه
        =========================================
        */

        const DB_CONFIG = {
            name: "SmartShopDB_V2",
            version: 1,
            stores: [
                { name: 'settings', key: 'id' },
                { name: 'products', key: 'id', indexes: ['name', 'category'] },
                { name: 'accounts', key: 'id', autoIncrement: true }, // صندوق‌ها و حساب‌ها
                { name: 'transactions', key: 'id', autoIncrement: true, indexes: ['type', 'date'] }, // فروش، هزینه، واریز، برداشت
                { name: 'partners', key: 'id', autoIncrement: true },
                { name: 'customers', key: 'phone' },
                { name: 'invoices', key: 'id', autoIncrement: true }
            ]
        };

        const AppState = {
            db: null,
            settings: null,
            products: [],
            accounts: [],
            pos: {
                cart: [],
                totalDiscount: { type: 'flat', value: 0 },
                customer: null,
                selectedAccountId: null
            }
        };

        const DB = {
            init: () => new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_CONFIG.name, DB_CONFIG.version);
                request.onupgradeneeded = e => {
                    const db = e.target.result;
                    DB_CONFIG.stores.forEach(s => {
                        if (!db.objectStoreNames.contains(s.name)) {
                            const store = db.createObjectStore(s.name, { keyPath: s.key, autoIncrement: s.autoIncrement });
                            if (s.indexes) s.indexes.forEach(idx => store.createIndex(idx, idx));
                        }
                    });
                };
                request.onsuccess = e => { AppState.db = e.target.result; resolve(); };
                request.onerror = e => reject(e.target.error);
            }),
            get: (storeName, key) => new Promise(resolve => {
                AppState.db.transaction(storeName).objectStore(storeName).get(key).onsuccess = e => resolve(e.target.result);
            }),
            getAll: (storeName) => new Promise(resolve => {
                AppState.db.transaction(storeName).objectStore(storeName).getAll().onsuccess = e => resolve(e.target.result);
            }),
            put: (storeName, data) => new Promise(resolve => {
                AppState.db.transaction(storeName, 'readwrite').objectStore(storeName).put(data).onsuccess = () => resolve();
            }),
            delete: (storeName, key) => new Promise(resolve => {
                AppState.db.transaction(storeName, 'readwrite').objectStore(storeName).delete(key).onsuccess = () => resolve();
            })
        };

        /*
        =========================================
        2.  Main App Logic & Initialization
            منطق اصلی برنامه، راه‌اندازی و مسیریابی
        =========================================
        */
        
        const App = {
            init: async () => {
                await DB.init();
                AppState.settings = await DB.get('settings', 'main');
                if (AppState.settings) {
                    document.getElementById('setup-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    App.startDashboard();
                } else {
                    document.getElementById('setup-screen').classList.remove('hidden');
                }
            },
            
            registerStore: async (e) => {
                e.preventDefault();
                const settings = {
                    id: 'main',
                    name: document.getElementById('reg-name').value,
                    phone: document.getElementById('reg-phone').value,
                    address: document.getElementById('reg-address').value,
                    nationalId: document.getElementById('reg-id').value,
                    currency: document.getElementById('reg-currency').value,
                    lastProductId: 9,
                    categories: ['عمومی'],
                    expiredItemBins: ['زباله‌دان', 'بازیافت']
                };
                await DB.put('settings', settings);
                // ایجاد صندوق پیش‌فرض
                await DB.put('accounts', { name: 'صندوق فروشگاه', balance: 0 });
                App.init();
            },

            startDashboard: async () => {
                App.setupMobileMenu();
                document.getElementById('header-store-name').innerText = AppState.settings.name;
                document.getElementById('header-date').innerText = new Intl.DateTimeFormat('fa-IR-u-nu-latn').format(new Date());
                
                // Load initial data
                await App.reloadData();

                App.switchTab('pos');
            },
            
            reloadData: async () => {
                // تمام داده‌های لازم را یکجا بارگذاری می‌کند
                [AppState.products, AppState.accounts] = await Promise.all([
                    DB.getAll('products'),
                    DB.getAll('accounts')
                ]);
            },

            switchTab: (tabId) => {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

                const tab = document.getElementById(`tab-${tabId}`);
                const button = document.querySelector(`.tab-button[onclick*="'${tabId}'"]`);
                
                tab.classList.remove('hidden');
                tab.innerHTML = '<div class="text-center p-10"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>'; // لودینگ
                if (button) button.classList.add('active');

                // رندر کردن محتوای تب مربوطه
                const renderFunction = `render${tabId.charAt(0).toUpperCase() + tabId.slice(1)}Tab`;
                if(typeof window.UI[renderFunction] === 'function') {
                    window.UI[renderFunction](tab);
                } else {
                    tab.innerHTML = `<p>محتوایی برای این بخش وجود ندارد.</p>`;
                }
                
                // بستن منوی موبایل
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            },

            setupMobileMenu: () => {
                const toggle = document.getElementById('menu-toggle');
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                
                toggle.onclick = () => {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                };
                overlay.onclick = () => {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                };
            },

            // سایر توابع اصلی مثل import/export
            exportData: async () => { /* ... */ },
            importData: async (event) => { /* ... */ }
        };
        
        window.App = App; // برای دسترسی از HTML

        /*
        =========================================
        3.  UI Rendering
            توابع مربوط به ساخت و نمایش رابط کاربری
        =========================================
        */
        
        const UI = {
            renderPosTab: (container) => {
                // این تابع ساختار کلی تب POS را می‌سازد
                // ... کد HTML برای ساختار POS
            },
            renderProductsTab: (container) => {
                // ...
            },
            renderAccountingTab: (container) => {
                 // ...
            },
            // ... توابع رندر برای سایر تب‌ها
        };
        
        window.UI = UI; // برای دسترسی در App

        // بقیه منطق کد ...
        // Product Logic, POS Logic, Accounting Logic, Modal Logic, etc.
        // به دلیل محدودیت طول پاسخ، تمام کد در یک بلاک قابل ارائه نیست.
        // یک نسخه کامل و اجرایی نیاز به تقسیم‌بندی به ماژول‌های منطقی دارد.
        // اما ساختار بالا چارچوب اصلی یک برنامه ماژولار و قابل مدیریت را نشان می‌دهد.

        // Event listener برای شروع برنامه
        document.addEventListener('DOMContentLoaded', App.init);

        // Helper function for setup screen views
        window.showView = (viewId) => {
            document.getElementById('initial-options').classList.add('hidden');
            document.getElementById('register-view').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        };

        })();
    </script>
</body>
</html>
