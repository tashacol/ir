    <style>
        :root {
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --primary: #2563eb;
            --card-bg: #ffffff;
            --card-radius: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at top right, #e0f2fe 0%, transparent 25%),
                radial-gradient(circle at bottom left, #f0fdf4 0%, transparent 25%);
        }

        .main-container { width: 100%; max-width: 800px; }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            text-align: right;
        }

        .logo-wrapper {
            width: 85px; height: 85px; background: white; border-radius: 22px; padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04); display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0;
        }
        .logo-wrapper img { width: 100%; height: 100%; object-fit: contain; }

        .header-text h1 { font-size: 2.2rem; font-weight: 900; color: var(--text-main); margin: 0; }
        .header-text p { margin: 8px 0 0 0; color: var(--text-sub); font-size: 1.1rem; }

        /* شبکه دو ستونه */
        .sitemap-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            padding: 35px 30px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -10px rgba(37, 99, 235, 0.15);
            border-color: #bfdbfe;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 100%; height: 100%;
            background: linear-gradient(225deg, rgba(255,255,255,0) 60%, rgba(37, 99, 235, 0.02) 100%);
            opacity: 0;
            transition: var(--transition);
            pointer-events: none;
        }
        .card:hover::after { opacity: 1; }

        .badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
            width: fit-content;
        }

        .bg-blue { background: #dbeafe; color: #1e40af; }
        .bg-purple { background: #f3e8ff; color: #7e22ce; }

        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #0f172a;
        }

        p.desc {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .btn-arrow {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-size: 1.1rem;
            transition: var(--transition);
            margin-top: auto;
            align-self: flex-start;
        }

        .card:hover .btn-arrow {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateX(-5px);
        }

        .visual {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 160px;
            margin-bottom: 15px;
        }

        .visual img {
            width: 140px;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.1));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover .visual img {
            transform: scale(1.15) rotate(-3deg) translateY(-6px);
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 25px;
        }

        @media (max-width: 650px) {
            .sitemap-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; text-align: center; gap: 15px; }
            .card { padding: 25px; }
            .visual img { width: 120px; }
            .visual { height: 140px; }
            h2 { font-size: 1.6rem; }
        }
    </style>

    <div class="main-container">

                </div>

                    <p class="desc">مجموعه کامل ابزارهای مدیریتی، برنامه‌ریزی، مالی و تولید محتوا.</p>
                    <div class="btn-arrow"><i class="fas fa-arrow-left"></i></div>
                </div>
            </a>

            <!-- کارت بازی‌ها -->

                </div>
                <div class="content">

                    <h2>بازی‌ها</h2>

                    <div class="btn-arrow"><i class="fas fa-arrow-left"></i></div>
                </div>
            </a>

        </div>

        <footer>
            <p>&copy; 1403 - کلیه حقوق متعلق به موسسه تعالی اندیشه و رشد می‌باشد.</p>
        </footer>

    </div>

</body>
