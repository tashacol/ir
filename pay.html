<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتال کاربری متربیان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap');
        :root { --primary: #0d6efd; --success: #198754; --danger: #dc3545; --bg: #f8f9fa; --card: #ffffff; }
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: #333; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Loading */
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Inputs & Buttons */
        .form-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 1.1rem; letter-spacing: 2px;}
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: #fff; font-size: 1rem; cursor: pointer; transition: 0.2s; font-weight: 600;}
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        /* Months Chips */
        .month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .month-chip { border: 1px solid #ddd; padding: 15px 10px; border-radius: 8px; text-align: center; }
        .month-chip.paid { background: #d1fae5; border-color: #34d399; color: #065f46; }
        .month-chip.unpaid { background: #fee2e2; border-color: #f87171; color: #991b1b; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: #e9ecef; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div id="loader" style="display: none;">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: bold;" id="loader-text">در حال ارتباط با سرور...</p>
</div>

<!-- Login Section -->
<div class="container" id="login-view">
    <div class="card" style="max-width: 400px; margin: 10vh auto; text-align: center;">
        <i class="fas fa-user-graduate" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>ورود به پورتال متربیان</h2>
        <p style="color: #666; font-size: 0.9rem;">برای مشاهده وضعیت کلاس‌ها، کد ملی خود را وارد کنید.</p>
        <input type="text" id="national-id" class="form-input" placeholder="کد ملی (۱۰ رقم)" maxlength="10">
        <button class="btn btn-primary" onclick="login()">ورود</button>
    </div>
</div>

<!-- Dashboard Section -->
<div class="container" id="dashboard-view" style="display: none;">
    <div class="header-bar">
        <h3 id="welcome-msg"><i class="fas fa-user-circle"></i> خوش آمدید</h3>
        <button class="btn" style="background:#dc3545; width:auto; padding:8px 15px;" onclick="logout()">خروج</button>
    </div>
    
    <div id="classes-container"></div>
</div>

<script>
    // ⚠️ آدرس وب‌اپ خود را اینجا بگذارید
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfy.../exec"; 

    // Helper: Show/Hide Loader
    const toggleLoader = (show, text = 'در حال پردازش...') => {
        document.getElementById('loader').style.display = show ? 'flex' : 'none';
        document.getElementById('loader-text').innerText = text;
    };

    // Date Logic (Same as Admin)
    function formatDateStr(dateStr) {
        if (!dateStr) return '';
        return String(dateStr).split('T')[0].replace(/-/g, '/');
    }
    
    function getMonthPeriods(startDateStr, endDateStr) {
        const periods = [];
        if(!startDateStr) return periods;
        
        let sp = formatDateStr(startDateStr).split('/');
        let startDaysCalc = parseInt(sp[0]) * 365 + parseInt(sp[1]) * 30 + parseInt(sp[2]);
        
        let endDaysCalc;
        if (endDateStr && endDateStr !== '') {
            let ep = formatDateStr(endDateStr).split('/');
            endDaysCalc = parseInt(ep[0]) * 365 + parseInt(ep[1]) * 30 + parseInt(ep[2]);
        } else {
            const today = new Date();
            const tp = new Intl.DateTimeFormat('fa-IR', { year: 'numeric', month: 'numeric', day: 'numeric' }).format(today).replace(/[۰-۹]/g, w => '۰۱۲۳۴۵۶۷۸۹'.indexOf(w)).split('/');
            endDaysCalc = parseInt(tp[0]) * 365 + parseInt(tp[1]) * 30 + parseInt(tp[2]);
        }

        let diffDays = endDaysCalc - startDaysCalc;
        if(diffDays < 0) diffDays = 0;
        
        let monthsPassed = Math.floor(diffDays / 30) + 1; 
        
        for(let i = 0; i < monthsPassed; i++) {
            let m = parseInt(sp[1]) + i;
            let y = parseInt(sp[0]);
            while(m > 12) { m -= 12; y += 1; }
            periods.push({
                index: i, label: `ماه ${i + 1}`, date: `${y}/${String(m).padStart(2,'0')}`
            });
        }
        return periods;
    }

    // Communication with GAS
    async function apiCall(action, payload = {}) {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, ...payload })
        });
        const result = await response.json();
        if (!result.success) throw new Error(result.message);
        return result;
    }

    // 1. Check Callback from ZarinPal on Page Load
    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const authority = urlParams.get('Authority');
        const status = urlParams.get('Status');
        
        if (authority && status) {
            // کاربر از درگاه برگشته است!
            document.getElementById('login-view').style.display = 'none';
            toggleLoader(true, 'در حال استعلام نتیجه پرداخت از بانک...');
            
            if (status === 'OK') {
                try {
                    const res = await apiCall('verifyPayment', { authority: authority });
                    alert(`✅ پرداخت با موفقیت ثبت شد!\nکد پیگیری: ${res.refId}`);
                } catch(e) {
                    alert(`❌ خطا: ${e.message}`);
                }
            } else {
                alert('❌ پرداخت توسط شما لغو شد یا ناموفق بود.');
            }
            
            // پاک کردن پارامترهای URL برای جلوگیری از رفرش و خطای مجدد
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        // چک لاگین قبلی
        if(localStorage.getItem('traineeId')) {
            loadDashboard();
        }
    };

    // 2. Login
    async function login() {
        const nId = document.getElementById('national-id').value.trim();
        if(nId.length !== 10) return alert('کد ملی باید ۱۰ رقم باشد.');
        
        toggleLoader(true, 'در حال احراز هویت...');
        try {
            const res = await apiCall('studentLogin', { nationalId: nId });
            localStorage.setItem('traineeId', res.traineeId);
            localStorage.setItem('traineeName', res.name);
            loadDashboard();
        } catch(e) {
            alert(e.message);
        } finally {
            toggleLoader(false);
        }
    }
    
    function logout() {
        localStorage.clear();
        location.reload();
    }

    // 3. Load Dashboard & Render Classes
    async function loadDashboard() {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('dashboard-view').style.display = 'block';
        document.getElementById('welcome-msg').innerHTML = `<i class="fas fa-user-circle"></i> سلام، ${localStorage.getItem('traineeName')}`;
        
        toggleLoader(true, 'در حال دریافت اطلاعات کلاس‌ها...');
        try {
            const res = await apiCall('getStudentDashboard', { traineeId: localStorage.getItem('traineeId') });
            renderClasses(res.classes);
        } catch(e) {
            alert('خطا در دریافت اطلاعات: ' + e.message);
        } finally {
            toggleLoader(false);
        }
    }

    function renderClasses(classes) {
        const container = document.getElementById('classes-container');
        if(classes.length === 0) {
            container.innerHTML = '<div class="card text-center text-muted">شما در هیچ کلاسی ثبت‌نام نشده‌اید.</div>';
            return;
        }

        let html = '';
        classes.forEach(cls => {
            const periods = getMonthPeriods(cls.startDate, cls.status === 'active' ? null : cls.endDate);
            const statusBadge = cls.status === 'active' ? '🟢 کلاس در حال برگزاری' : '🟡 پایان یافته / بایگانی';
            
            let monthsHtml = periods.map(p => {
                const isPaid = cls.myPayments.find(x => parseInt(x.periodIndex) === p.index);
                
                if (isPaid) {
                    return `
                    <div class="month-chip paid">
                        <strong>${p.label}</strong><br>
                        <small style="font-size:0.75rem">${p.date}</small><br>
                        <small>✅ پرداخت شده</small>
                    </div>`;
                } else {
                    return `
                    <div class="month-chip unpaid">
                        <strong>${p.label}</strong><br>
                        <small style="font-size:0.75rem">${p.date}</small><br>
                        <button class="btn btn-success" style="padding:6px; font-size:0.85rem; margin-top:8px;" 
                                onclick="payMonth('${cls.id}', ${p.index})">
                            💳 پرداخت شهریه
                        </button>
                    </div>`;
                }
            }).join('');
            
            if(periods.length === 0) monthsHtml = '<p style="text-align:center; width:100%; color:#666;">کلاس به تازگی شروع شده است.</p>';

            html += `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:15px; margin-bottom:15px;">
                    <h4 style="margin:0;"><i class="fas fa-clipboard-list"></i> ${cls.title}</h4>
                    <span class="badge">${statusBadge}</span>
                </div>
                <p style="font-size:0.9rem; color:#555;">مربی: <strong>${cls.trainerName}</strong> | تاریخ شروع: <span dir="ltr">${formatDateStr(cls.startDate)}</span></p>
                <h5 style="margin-top:20px; color:var(--primary);">وضعیت شهریه ماهانه:</h5>
                <div class="month-grid">
                    ${monthsHtml}
                </div>
            </div>`;
        });
        
        container.innerHTML = html;
    }

    // 4. Request Payment Link from Server
    async function payMonth(classId, periodIndex) {
        toggleLoader(true, 'در حال انتقال به درگاه پرداخت (زرین‌پال)...');
        try {
            const res = await apiCall('requestPayment', {
                traineeId: localStorage.getItem('traineeId'),
                classId: classId,
                periodIndex: periodIndex
            });
            
            // انتقال مستقیم کاربر به درگاه زرین پال
            window.location.href = res.paymentUrl;
        } catch(e) {
            alert('خطا در ایجاد فاکتور: ' + e.message);
            toggleLoader(false);
        }
    }
</script>
</body>
</html>
